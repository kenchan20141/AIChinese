<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>範文伴誦書僮</title>
    
    <script type="module">
        import ToJyutping from 'https://cdn.jsdelivr.net/npm/to-jyutping@3.1.1/+esm';
        window.ToJyutping = ToJyutping;
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #f7f6f2; /* 宣紙白 */
            --text-dark: #2c2b29; /* 墨黑 */
            --text-gray: #d1cfc7; /* 淡灰 */
            --text-light: #8c8a82; /* 註腳灰 */
            --accent-red: #b04332; /* 硃砂紅 */
        }

        body {
            font-family: 'Noto Serif TC', 'PMingLiU', 'MingLiU', serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            font-weight: 400;
            overflow-x: hidden;
        }

        /* 頂部極簡進度條 */
        .progress-bar-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 2px;
            background: transparent; z-index: 100;
        }
        .progress-bar {
            height: 100%; background: var(--accent-red); width: 0%;
            transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* 導航列與目錄按鈕 */
        .nav-bar {
            position: fixed; top: 20px; left: 25px; z-index: 1000;
        }
        .btn-menu {
            background: none; border: none; cursor: pointer; color: var(--text-dark);
            display: flex; align-items: center; gap: 10px; font-family: inherit;
            font-size: 0.95rem; letter-spacing: 0.1em; transition: color 0.3s;
        }
        .btn-menu:hover { color: var(--accent-red); }
        .btn-menu svg { width: 24px; height: 24px; }

        /* 全螢幕目錄覆蓋層 */
        .menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(247, 246, 242, 0.98); backdrop-filter: blur(10px);
            z-index: 999; display: flex; flex-direction: column;
            opacity: 0; pointer-events: none; transition: opacity 0.5s ease;
            overflow-y: auto; padding: 80px 40px; box-sizing: border-box;
        }
        .menu-overlay.active { opacity: 1; pointer-events: auto; }
        
        .menu-container { max-width: 900px; margin: 0 auto; width: 100%; display: flex; flex-wrap: wrap; gap: 60px; }
        .menu-section { flex: 1; min-width: 300px; }
        .menu-section h3 {
            font-size: 1.2rem; font-weight: 600; letter-spacing: 0.4em; color: var(--accent-red);
            border-bottom: 1px solid var(--text-gray); padding-bottom: 15px; margin-bottom: 25px;
        }
        .menu-list { list-style: none; padding: 0; margin: 0; }
        .menu-list li { margin-bottom: 18px; }
        .menu-list button {
            background: none; border: none; font-family: inherit; font-size: 1.1rem;
            color: var(--text-dark); cursor: pointer; letter-spacing: 0.15em;
            transition: all 0.3s ease; text-align: left; padding: 0;
        }
        .menu-list button:hover { color: var(--accent-red); transform: translateX(5px); }
        .menu-list button.active { color: var(--accent-red); font-weight: 600; }
        .menu-list span.author-name { font-size: 0.8rem; color: var(--text-light); margin-left: 10px; }

        /* 主體內容區 */
        .container {
            max-width: 760px; margin: 12vh auto; padding: 0 30px 120px 30px;
            transition: opacity 0.4s ease;
        }

        header { text-align: center; margin-bottom: 50px; }
        h1 {
            font-size: 2.2rem; font-weight: 400; letter-spacing: 0.5em;
            margin: 0 0 15px 0; margin-right: -0.5em; color: var(--text-dark);
        }
        .author { font-size: 0.95rem; color: var(--text-light); letter-spacing: 0.4em; margin-right: -0.4em; }

        /* 模式切換列 */
        .mode-controls { display: flex; justify-content: center; gap: 40px; margin-bottom: 70px; }
        .btn-mode {
            background: none; border: none; color: var(--text-light); cursor: pointer;
            font-family: inherit; font-size: 0.95rem; letter-spacing: 0.2em;
            padding: 5px 0; position: relative; transition: color 0.4s ease;
        }
        .btn-mode:hover { color: var(--text-dark); }
        .btn-mode.active { color: var(--text-dark); }
        .btn-mode.active::after {
            content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
            width: 3px; height: 3px; border-radius: 50%; background-color: var(--text-dark);
        }

        /* 語音即時字幕 (更低調半透明) */
        .speech-feedback-container {
            position: fixed; bottom: 95px; left: 50%; transform: translateX(-50%) translateY(10px);
            background: rgba(247, 246, 242, 0.55); 
            backdrop-filter: blur(12px); 
            color: rgba(44, 43, 41, 0.75); 
            padding: 8px 20px; border-radius: 30px;
            font-size: 0.9rem; pointer-events: none; opacity: 0;
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1); white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis; max-width: 80vw;
            z-index: 90; letter-spacing: 0.1em;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03); border: 1px solid rgba(0, 0, 0, 0.02);
        }
        .speech-feedback-container.show {
            opacity: 1; transform: translateX(-50%) translateY(0);
        }

        /* 懸浮動作列 */
        .action-bar {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; align-items: center;
            background: rgba(247, 246, 242, 0.85); backdrop-filter: blur(10px);
            padding: 12px 24px; border-radius: 50px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); border: 1px solid rgba(0, 0, 0, 0.03); z-index: 100;
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            width: auto; max-width: 100vw;
        }
        .action-bar.show-input {
            width: 90vw; max-width: 600px;
        }
        .icon-btn {
            width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
            background: transparent; border: 1px solid var(--text-gray);
            color: var(--text-dark); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.4s ease;
        }
        .icon-btn:hover:not(:disabled) { background: var(--text-dark); color: var(--bg-color); }
        .icon-btn:disabled { opacity: 0.3; cursor: wait; }
        .icon-btn svg { width: 20px; height: 20px; transition: transform 0.3s; }
        .icon-btn:hover:not(:disabled) svg { transform: scale(1.05); }

        .icon-btn.recording {
            border-color: var(--accent-red); color: var(--accent-red); background: transparent;
            animation: pulse-border 2s infinite cubic-bezier(0.4, 0, 0.6, 1);
        }
        @keyframes pulse-border {
            0%, 100% { box-shadow: 0 0 0 0 rgba(176, 67, 50, 0.4); border-color: var(--accent-red); }
            50% { box-shadow: 0 0 0 8px rgba(176, 67, 50, 0); border-color: rgba(176, 67, 50, 0.5); }
        }

        /* 打字輸入框設計 */
        .manual-input {
            flex: 0; width: 0; opacity: 0; border: none; background: transparent;
            font-family: inherit; font-size: 1.05rem; color: var(--text-dark);
            outline: none; transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            padding: 0; pointer-events: none; letter-spacing: 0.05em;
        }
        .action-bar.show-input .manual-input {
            flex: 1; width: auto; opacity: 1; padding: 0 10px; margin-left: 5px;
            border-left: 1px solid var(--text-gray); pointer-events: auto;
        }
        .manual-input::placeholder { color: var(--text-light); letter-spacing: 0.1em; font-weight: 300; font-size: 0.95rem; }

        /* 文本排版與段落設計 */
        .text-display { font-size: 1.45rem; line-height: 2.6; letter-spacing: 0.15em; text-align: justify; }
        
        .para-block {
            position: relative; border-radius: 8px; padding: 10px 15px; margin: 10px -15px;
            cursor: pointer; transition: all 0.5s ease;
        }
        .para-block:hover { background: rgba(176, 67, 50, 0.03); }
        .para-block.inactive { opacity: 0.25; filter: grayscale(100%); }
        .para-block.inactive:hover { opacity: 0.6; }

        .char { position: relative; display: inline-block; transition: all 0.4s ease; border-bottom: 2px solid transparent; padding-bottom: 2px; }
        .char:hover::after {
            content: attr(data-jp); position: absolute; top: -25px; left: 50%; transform: translateX(-50%);
            font-size: 0.65rem; color: var(--text-light); white-space: nowrap; letter-spacing: 0; font-weight: 400; text-shadow: none;
        }
        .punct { margin: 0 4px; transition: color 0.6s ease; }
        
        /* 整句提示：淡雅底線 */
        .char.current-sentence { border-bottom: 2px solid rgba(176, 67, 50, 0.25); }

        /* 模式切換 */
        .review-mode .char { color: var(--text-gray); }
        .review-mode .char.matched { color: var(--accent-red); font-weight: 600; }
        .review-mode .punct { color: var(--text-gray); }

        .challenge-mode .char:not(.matched) { color: transparent; }
        .challenge-mode .char.matched { color: var(--accent-red); font-weight: 600; text-shadow: 0 0 1px rgba(176,67,50,0.2); }
        .challenge-mode .punct { color: var(--text-gray); opacity: 0.5; }
        .challenge-mode .para-block.inactive .char { color: var(--text-gray); opacity: 0.8; text-shadow: none; }

        /* 錯誤微震與強制現形 */
        @keyframes elegantShake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-2px); } 75% { transform: translateX(2px); } }
        .shake-error { 
            animation: elegantShake 0.4s ease !important; border-bottom-color: var(--accent-red) !important; color: var(--accent-red) !important;
            opacity: 1 !important; text-shadow: none !important; font-weight: 600 !important;
        }

        /* 通關畫面 */
        .success-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(247, 246, 242, 0.95); backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center; z-index: 2000; flex-direction: column; text-align: center;
        }
        .success-content { animation: fadeIn 1.2s ease forwards; opacity: 0; transform: translateY(15px); }
        .success-content h2 { margin: 0 0 50px 0; font-size: 1.6rem; font-weight: 400; letter-spacing: 0.6em; margin-right: -0.6em; color: var(--text-dark); }
        .success-content button {
            background: none; border: 1px solid var(--text-gray); padding: 10px 30px; border-radius: 0; font-family: inherit;
            font-size: 0.95rem; letter-spacing: 0.2em; cursor: pointer; transition: all 0.3s;
        }
        .success-content button:hover { border-color: var(--text-dark); color: var(--bg-color); background: var(--text-dark); }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="progress-bar-container"><div id="progress-bar" class="progress-bar"></div></div>

<div class="nav-bar">
    <button class="btn-menu" onclick="toggleMenu()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25H12" />
        </svg>
        <span>目錄</span>
    </button>
</div>

<div id="menu-overlay" class="menu-overlay">
    <div class="menu-container" id="menu-container"></div>
</div>

<div id="main-container" class="container" style="opacity: 0;">
    <header>
        <h1 id="doc-title">載入中...</h1>
        <div class="author" id="doc-author"></div>
    </header>

    <div class="mode-controls">
        <button id="btn-mode-review" class="btn-mode active" onclick="setMode('review')">閱 讀</button>
        <button id="btn-mode-challenge" class="btn-mode" onclick="setMode('challenge')">默 誦</button>
    </div>

    <div id="text-display" class="text-display review-mode"></div>
</div>

<!-- 即時語音字幕顯示區 -->
<div id="speech-feedback" class="speech-feedback-container"></div>

<div class="action-bar" id="action-bar">
    <button id="btn-start" class="icon-btn" onclick="toggleRecording()" disabled title="開始/停止誦讀">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
            <line x1="12" y1="19" x2="12" y2="22"></line>
        </svg>
    </button>
    <button id="btn-keyboard" class="icon-btn" onclick="toggleKeyboard()" title="打字作答">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2" ry="2"></rect>
            <line x1="6" y1="8" x2="6" y2="8"></line>
            <line x1="10" y1="8" x2="10" y2="8"></line>
            <line x1="14" y1="8" x2="14" y2="8"></line>
            <line x1="18" y1="8" x2="18" y2="8"></line>
            <line x1="6" y1="12" x2="6" y2="12"></line>
            <line x1="10" y1="12" x2="10" y2="12"></line>
            <line x1="14" y1="12" x2="14" y2="12"></line>
            <line x1="18" y1="12" x2="18" y2="12"></line>
            <line x1="8" y1="16" x2="16" y2="16"></line>
        </svg>
    </button>
    <button class="icon-btn" onclick="resetAll()" title="重置進度">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
            <path d="M3 3v5h5"></path>
        </svg>
    </button>
    
    <input type="text" id="manual-input" class="manual-input" placeholder="可輸入文字作答..." autocomplete="off">
</div>

<div id="success-screen" class="success-screen" style="display: none;">
    <div class="success-content">
        <h2>功不唐捐，玉汝於成。</h2>
        <button onclick="closeSuccessScreen()">重 歸</button>
    </div>
</div>

<script>
    const TEXT_LIBRARY = {
        "文學": [
            { 
                title: "前赤壁賦", author: "蘇軾", 
                content: "壬戌之秋，七月既望，蘇子與客泛舟，遊於赤壁之下。清風徐來，水波不興。舉酒屬(zuk)客，誦明月之詩，歌窈窕之章。少焉，月出於東山之上，徘徊於斗牛之間。白露橫江，水光接天。縱一葦之所如，凌萬頃之茫然。浩浩乎如馮(pang)虛御風，而不知其所止，飄飄乎如遺世獨立，羽化而登仙。\n\n於是飲酒樂甚，扣舷而歌之。歌曰：「桂棹兮蘭槳，擊空明兮泝流光。渺渺兮予懷，望美人兮天一方。」客有吹洞簫者，倚歌而和之，其聲嗚嗚然，如怨如慕，如泣如訴。餘音嫋嫋，不絕如縷。舞幽壑(kok)之潛蛟，泣孤舟之嫠婦。蘇子愀然，正襟危坐，而問客曰：「何為其然也？」客曰：「『月明星稀，烏鵲南飛。』此非曹孟德之詩乎？西望夏口，東望武昌。山川相繆(mau)，鬱乎蒼蒼。此非孟德之困於周郎者乎？方其破荊州，下江陵，順流而東也，舳艫千里，旌旗蔽空，釃酒臨江，橫槊賦詩，固一世之雄也，而今安在哉？況吾與子漁樵於江渚之上，侶魚蝦而友麋鹿。駕一葉之扁(pin)舟，舉匏尊以相屬(zuk)。寄蜉蝣於天地，渺滄海之一粟。哀吾生之須臾，羨長江之無窮。挾飛仙以遨遊，抱明月而長終。知不可乎驟得，託遺響於悲風。」\n\n蘇子曰：「客亦知夫水與月乎？逝者如斯，而未嘗往也。盈虛者如彼，而卒莫消長(zoeng)也。蓋將自其變者而觀之，則天地曾不能以一瞬。自其不變者而觀之，則物與我皆無盡也，而又何羨乎？且夫天地之間，物各有主，苟非吾之所有，雖一毫而莫取。惟江上之清風，與山間之明月，耳得之而為聲，目遇之而成色。取之無禁，用之不竭。是造物者之無盡藏(zong)也，而吾與子之所共食。」客喜而笑，洗盞更酌，肴核既盡，杯盤狼藉(zik)乎舟中，不知東方之既白。"
            }
        ],
        "中文": [
            { title: "山居秋暝", author: "王維", content: "空山新雨後 ，天氣晚來秋。\n明月松間照，清泉石上流。\n竹喧歸浣女，蓮動下漁舟。 \n隨意春芳歇 ，王孫自可留 。" },
            { title: "月下獨酌", author: "李白", content: "花間一壺酒，獨酌無相親 。 \n舉杯邀明月，對影成三人 。\n月既不解 飲，影徒隨我身。\n暫伴月將 影，行樂須及春 。 \n我歌月徘徊 ，我舞影零亂 。 \n醒時同交歡 ，醉後各分散 。\n永結無情遊 ，相期邈雲漢 。" },
            { title: "登樓", author: "杜甫", content: "花近高樓傷客心， 萬方多難此登臨。 \n錦江春色來天地， 玉壘浮雲變古今。 \n北極朝廷終不改， 西山寇盜莫相侵。 \n可憐後主還祠廟， 日暮聊為〈梁甫吟〉。" },
            { title: "師說", author: "韓愈", content: "古之學者必有師。師者，所以傳道、受(sau)業 、解惑也。人非生而知之者 ，孰能無惑？惑而不從師，其為惑也終不解矣。\n\n生乎吾前，其聞道 也固 先乎吾，吾從而師之；生乎吾後，其聞道也亦先乎吾，吾從而師之。吾師道也，夫庸知 其年之先後生於吾乎？是故無貴無賤，無長無少，道之所存，師之所存也。\n\n嗟乎！師道之不傳也久矣！欲人之無惑也難矣！古之聖人，其出人也遠矣，猶且從師而問焉；今之眾人，其下聖人也亦遠矣，而恥學於師；是故聖益聖，愚益愚，聖人之所以為聖，愚人之所以為愚，其 皆出於此乎？\n\n愛其子，擇師而教之，於其身也，則恥師焉，惑矣！彼童子之師，授之書而習其句讀 者也，非吾所謂傳其道，解其惑者也。句讀之不知，惑之不解，或師焉，或不(fau)焉，小學而大遺，吾未見其明也。\n\n巫醫 、樂師，百工之人，不恥相師；士大夫之族，曰師、曰弟子云者，則群聚而笑之，問之，則曰：「彼與彼年相若也，道相似也。位卑則足羞，官盛則近諛 。」嗚呼！師道之不復可知矣。巫、醫、樂師、百工之人，君子 不齒 ，今其智乃反不能及，其可怪也歟！\n\n聖人無常師 ，孔子師郯子 、萇弘 、師襄 、老聃 。郯子之徒，其賢不及孔子。孔子曰：「三人行，則必有我師。」 是故弟子不必不如師，師不必賢於弟子，聞道有先後，術業有專攻，如是而已。\n\n李氏子蟠 ，年十七，好古文，六藝 經傳，皆通習之；不拘於時，學於余，余嘉其能行古道，作〈師說〉以貽之。" },
            { title: "岳陽樓記", author: "范仲淹", content: "慶曆四年春 ，滕子京 謫守巴陵郡 。越明年，政通人和，百廢具(keoi|geoi) 興。乃重修岳陽樓，增其舊制，刻唐賢、今人詩賦於其上；屬(zuk) 予作文以記之。\n\n予觀夫巴陵勝狀 ，在洞庭一湖。銜遠山，吞長江，浩浩湯(soeng)湯 ，橫無際涯；朝暉夕陰，氣象萬千。此則岳陽樓之大觀也，前人之述備 矣。然則北通巫峽 ，南極瀟湘 ，遷客騷人 ，多會於此，覽物之情，得無異乎？\n\n若夫霪雨霏霏 ，連月不開；陰風怒號 ，濁浪排空；日星隱耀，山岳潛形；商旅不行，檣傾楫摧 ；薄暮冥冥 ，虎嘯猿啼。登斯樓也，則有去國 懷鄉，憂讒畏譏，滿目蕭然 ，感極而悲者矣。\n\n至若春和景明 ，波瀾不驚 ，上下天光，一碧萬頃；沙鷗翔集 ，錦鱗游泳，岸芷汀蘭 ，郁郁青青 。而或長煙一空 ，皓月千里，浮光躍金 ，靜影沉璧 ；漁歌互答，此樂何極！登斯樓也，則有心曠神怡 ，寵辱 皆忘，把酒臨風 ，其喜洋洋 者矣。\n\n嗟夫！予嘗求古仁人之心，或異二者之為 。何哉？不以物喜，不以己悲 。居廟堂之高 ，則憂其民；處江湖之遠 ，則憂其君。是進亦憂，退亦憂，然則何時而樂耶？其必曰：「先天下之憂而憂，後天下之樂而樂」歟！噫！微斯人 ，吾誰與歸 ！" },
            { title: "始得西山宴遊記", author: "柳宗元", content: "自余為僇人 ，居是州，恒惴慄 。其隙也 ，則施施 而行，漫漫 而遊。日與其徒 上高山，入深林，窮迴溪 ，幽泉 怪石，無遠不到。到則披草 而坐，傾壺而醉。醉則更相枕 以臥，臥而夢。意有所極 ，夢亦同趣 。覺 而起，起而歸。以為凡是州之山有異態者，皆我有也，而未始知西山之怪特。\n\n今年九月二十八日，因坐法華西亭 ，望西山，始指異之 。遂命僕過湘江 ，緣染溪 ，斫榛莽 。焚茅茷 ，窮 山之高而止。\n\n攀援而登，箕踞而遨 ，則凡數州之土壤 ，皆在衽席 之下。其高下之勢，岈然窪然 ，若垤 若穴，尺寸千里 ，攢蹙累積 ，莫得遯隱 。縈青繚白 ，外與天際 ，四望如一。然後知是山之特出，不與培塿 為類。悠悠乎與顥氣 俱，而莫得其涯；洋洋 乎與造物者遊 ，而不知其所窮。\n\n引 觴滿酌，頹然 就醉，不知日之入。蒼然暮色 ，自遠而至，至無所見，而猶不欲歸。心凝形釋 ，與萬化冥合 。然後知吾嚮 之未始 遊，遊於是乎始，故為之文以志 。是歲元和四年 也。" },
            { title: "念奴嬌‧赤壁懷古", author: "蘇軾", content: "大江東去，浪淘盡、千古風流人物。故壘西邊，人道是、三國周郎 赤壁。亂石穿空，驚濤拍岸，捲起千堆雪。江山如畫，一時多少豪傑！\n\n遙想公瑾當年，小喬 初嫁了，雄姿英發。羽扇綸巾 ，談笑間、檣櫓 灰飛煙滅。故國 神遊，多情應笑我，早生華髮 。人間如夢，一尊 還酹 江月。" },
            { title: "青玉案", author: "辛棄疾", content: "東風夜放花千樹，更吹落，星如雨。寶馬雕車香滿路。鳳簫聲動，玉壺光轉，一夜魚龍舞。 \n\n蛾兒雪柳黃金縷，笑語盈盈暗香去。眾裏尋他千百度；驀然迴首，那人卻在，燈火闌珊處。" },
            { title: "聲聲慢", author: "李清照", content: "尋尋覓覓，冷冷清清，悽悽慘慘戚戚。乍暖還寒時候， 最難將息。 三杯兩盞淡酒，怎敵他，晚來風急？雁過也，正傷心，卻是舊時相識。\n\n滿地黃花堆積， 憔悴損，如今有誰堪摘？守著窗兒，獨自怎生得黑！梧桐更兼細雨，到黃昏、點點滴滴。這次第，怎一箇愁字了得！" },
            { title: "逍遙遊", author: "莊子", content: "惠子 謂莊子曰：「魏王貽我大瓠之種(zung) ，我樹之成而實五石(daan) 。以盛水漿，其堅不能自舉也 。剖之以為瓢 ，則瓠落無所容 。非不呺然 大也，吾為其無用而掊之 。」莊子曰：「夫子固拙於 用大矣！宋人有善為不龜(gwan)手之藥者 ，世世以洴澼絖為事 。客聞之，請買其方百金。聚族而謀曰：『我世 স্বল্প金；今一朝而鬻(zuk)技百金 ，請與之。』客得之，以說 吳王。越有難 ，吳王使之將 ，冬與越人水戰，大敗越人，裂地 而封之。能不龜手一也 ；或以封，或不免於洴澼絖，則所用之異也 。今子有五石之瓠，何不慮以為大樽而浮於江湖 ，而憂其瓠落無所容，則夫子猶有蓬之心也夫 ！」\n\n惠子謂莊子曰：「吾有大樹，人謂之樗 ；其大本擁(jung)腫而不中(zung)繩墨 ，其小枝卷曲而不中(zung)規矩 。立之塗 ，匠者不顧。今子之言，大而無用，衆所同去也 。」莊子曰：「子獨不見狸狌乎 ？卑身而伏，以候敖者 ；東西跳梁，不辟高下 ，中於機辟，死於罔罟 。今夫斄牛，其大若垂天之雲 ；此能為大矣，而不能執鼠 。今子有大樹，患其無用，何不樹之於無何有之鄉 ，廣莫之野 ，彷徨乎無為其側，逍遙乎寢臥其下 ；不夭斤斧，物無害者 。無所可用，安所困苦哉 ？」" },
            { title: "出師表", author: "諸葛亮", content: "先帝創業未半 ，而中道崩殂 ；今天下三分 ，益州疲弊 ，此誠危急存亡之秋也﹗然侍衞之臣，不懈於內；忠志之士，忘身於外者 ，蓋追先帝之殊遇，欲報之於陛下也 。誠宜開張聖聽 ，以光先帝遺德 ，恢弘志士之氣 ﹔不宜妄自菲薄 ，引喻失義 ，以塞忠諫之路也 。\n\n宮中、府中，俱為一體 ；陟罰臧否 ，不宜異同。若有作姦、犯科，及為忠善者 ，宜付有司，論其刑賞 ，以昭陛下平明之治 ；不宜偏私，使內外異法也 。\n\n侍中、侍郎郭攸之、費禕、董允等 ，此皆良實，志慮忠純 ，是以先帝簡拔以遺(wai)陛下 。愚以為宮中之事，事無大小，悉以咨之 ，然後施行，必能裨補闕漏，有所廣益 。\n\n將軍向寵，性行淑均 ，曉暢軍事，試用於昔日，先帝稱之曰「能」，是以眾議舉寵為督 。愚以為營中之事，悉以咨之，必能使行陣和睦，優劣得所 。\n\n親賢臣，遠小人 ，此先漢所以興隆也﹔親小人，遠賢臣，此後漢所以傾頹也。先帝在時，每與臣論此事，未嘗不歎息痛恨於桓、靈也 ！侍中、尚書、長史、參軍 ，此悉貞良死節之臣，願陛下親之、信之，則漢室之隆，可計日而待也。\n\n臣本布衣，躬耕於南陽 ，苟全性命於亂世，不求聞達於諸侯 。先帝不以臣卑鄙，猥自枉屈 ，三顧臣於草廬之中，諮臣以當世之事；由是感激，遂許先帝以驅馳 。後值傾覆 ，受任於敗軍之際，奉命於危難之間，爾來二十有一(jau)年矣 。先帝知臣謹慎，故臨崩寄臣以大事也 。受命以來，夙夜憂歎，恐託付不效，以傷先帝之明 。故五月渡瀘，深入不毛 。今南方已定，兵甲已足，當獎率三軍，北定中原，庶竭駑鈍，攘除姦凶 ，興復漢室，還於舊都 。此臣所以報先帝而忠陛下之職分也。至於斟酌損益，進盡忠言，則攸之、禕、允之任也 。\n\n願陛下託臣以討賊興復之效；不效，則治臣之罪，以告先帝之靈。若無興德之言，則責攸之、禕、允等之慢，以彰其咎 。陛下亦宜自謀，以諮諏善道，察納雅言 ，深追先帝遺詔。臣不勝受恩感激。今當遠離，臨表涕零 ，不知所言 ！" },
            { title: "六國論", author: "蘇洵", content: "六國破滅 ，非兵不利 ，戰不善 ，弊在賂秦 。賂秦而力虧 ，破滅之道 也。或曰：「六國互喪 ，率(seot) 賂秦耶？」曰：「不賂者以賂者喪。」蓋失強援 ，不能獨完 ，故曰「弊在賂秦」也。\n\n秦以攻取 之外，小則獲邑 ，大則得城，較秦之所得 與戰勝而得者，其實百倍；諸侯之所亡 與戰敗而亡者，其實亦百倍。則秦之所大欲，諸侯之所大患，固不在戰矣。思厥先祖父 ，暴(puk)霜露，斬荊棘 ，以有尺寸之地 。子孫視之不甚惜，舉以予人 ，如棄草芥 。今日割五城，明日割十城，然後得一夕安寢；起視四境，而秦兵又至矣。然則諸侯之地有限，暴秦之欲無厭 ，奉之彌 繁，侵之愈急，故不戰而強弱勝負已判 矣。至於顛覆 ，理固宜然。古人 云：「以地事秦，猶抱薪救火，薪不盡，火不滅。」 此言得之。 \n\n齊人未嘗賂秦，終繼五國遷滅 ，何哉？與嬴 而不助五國也。五國既喪，齊亦不免矣。燕趙之君，始有遠略 ，能守其土，義不賂秦 。是故燕雖小國而後亡，斯用兵之效 也。至丹以荊卿為計 ，始速禍 焉。趙嘗五戰于秦 ，二敗而三勝 ；後秦擊趙者再，李牧 連卻 之；洎牧以讒誅 ，邯鄲為郡 ，惜其用武而不終 也。\n\n且燕趙處秦革滅 殆盡之際，可謂智力孤危 ，戰敗而亡，誠不得已。向使三國各愛其地 ，齊人勿附於秦，刺客不行 ，良將 猶在，則勝負之數 ，存亡之理，當(dong) 與秦相較，或未易量 。\n\n嗚呼！以賂秦之地，封天下之謀臣；以事秦之心，禮 天下之奇才；幷力西嚮 ，則吾恐秦人食之不得下嚥 也。悲夫！有如此之勢，而為秦人積威 之所劫，日削月割，以趨於亡！為國者無使為積威之所劫哉！\n\n夫六國與秦皆諸侯，其勢弱於秦，而猶有可以不賂而勝之之勢；茍以天下之大，而從六國破亡之故事 ，是又在六國下矣！" },
            { title: "勸學", author: "荀子", content: "君子曰：學不可以已 。青，取之於藍 ，而青於藍 ；冰，水為之，而寒於水。木直中(zung)繩 ，輮(jau) 以為輪，其曲中(zung)規 ；雖有(jau)槁暴(puk) 、不復挺(ting) 者，輮使之然也。故木受繩則直 ，金就礪 則利，君子博學而日參省 乎己，則知(zi) 明而行 無過矣。\n\n吾嘗終日而思矣，不如須臾 之所學也；吾嘗跂 而望矣，不如登高之博見也。登高而招，臂非加長也，而見者遠。順風而呼，聲非加疾 也，而聞者彰 。假輿馬者 ，非利足 也，而致 千里；假舟楫 者，非能水 也，而絕江河 。君子生(sing)非異 也，善假於物 也。\n\n積土成山，風雨興焉；積水成淵 ，蛟龍 生焉；積善成德，而神明 自得，聖心 備焉。故不積跬步 ，無以至千里；不積小流，無以成江海。騏驥 一躍，不能十步；駑馬十駕 ，功在不舍 。鍥 而舍之，朽木不折；鍥而不舍，金石可鏤 。螾 無爪牙之利，筋骨之強，上食埃土 ，下飲黃泉，用心一也。蟹六跪而二螯 ，非蛇蟺 之穴無可寄託者，用心躁 也。" },
            { title: "論仁、論孝、論君子", author: "論語", content: "論仁\n子曰：「不仁者，不可以久處約 ，不可以長處樂。仁者安仁，知(zi)者利仁 。」\n子曰：「富與貴，是人之所欲也；不以其道得之，不處也 。貧與賤，是人之所惡也；不以其道得之 ，不去 也。君子去仁，惡(wu)乎成名 ？君子無終食之間違仁 ，造次必於是 ，顛沛必於是。」\n顏淵問仁。\n子曰：「克己復禮為仁 。一日克己復禮，天下歸仁焉。為仁由己，而由人乎哉 ？」\n顏淵曰：「請問其目 。」子曰：「非禮勿視，非禮勿聽，非禮勿言，非禮勿動 。」\n顏淵曰：「回雖不敏，請事斯語矣 。」\n子曰：「志士仁人，無求生以害仁，有殺身以成仁 。」\n\n論孝\n孟懿子 問孝。子曰：「無違 。」\n樊遲御 ，子告之曰：「孟孫問孝於我，我對曰，無違。」\n樊遲曰：「何謂也？」子曰：「生事之以禮 ；死葬之以禮，祭之以禮 。」\n子游 問孝。子曰：「今之孝者，是謂能養 。至於犬馬，皆能有養 ；不敬，何以別乎 ！」\n\n子曰：「事父母幾(gei)諫 ，見志不從，又敬不違，勞而不怨 。」\n子曰：「父母之年，不可不知也。一則以喜，一則以懼 。」\n\n論君子\n子曰：「君子不重則不威 ；學則不固 。主忠信 。無友不如己者 。過則勿憚改 。」\n子曰：「君子坦蕩蕩，小人長戚戚 。」\n司馬牛 問君子。子曰：「君子不憂不懼。」曰：「不憂不懼，斯謂之君子已乎 ？」子曰：「內省不疚，夫何憂何懼 ？」\n子曰：「君子成人之美，不成人之惡 。小人反是 。」\n子曰：「君子恥其言而過其行 。」\n子曰：「君子義以為質 ，禮以行之，孫以出之，信以成之 。君子哉！」\n子曰：「君子病無能焉，不病人之不己知也 。」\n子曰：「君子求諸己，小人求諸人 。」" },
            { title: "魚我所欲也", author: "孟子", content: "孟子曰：「魚，我所欲也，熊掌，亦我所欲也；二者不可得兼，舍魚而取熊掌 者也。生亦我所欲也，義亦我所欲也；二者不可得兼，舍生而取義者也。\n\n生亦我所欲，所欲有甚於生者，故不為苟得 也；死亦我所惡 ，所惡有甚於死者，故患有所不辟(bik) 也。如使人之所欲莫甚於生，則凡可以得生者，何不用也？使人之所惡莫甚於死者，則凡可以辟患者，何不為也？由是則生而有不用也，由是則可以辟患而有不為也，是故所欲有甚於生者，所惡有甚於死者。非獨賢者有是有心也，人皆有之，賢者能勿喪耳 。\n\n一簞食(zi) ，一豆羹 ，得之則生，弗(fat) 得則死。嘑(fu)爾而與之 ，行道之人弗受 ；蹴(cuk)爾而與之 ，乞人不屑也 ；萬鍾 則不辯(bin) 禮義而受之。萬鍾於我何加 焉？為宮室之美、妻妾之奉 、所識窮乏者得(dak)我與(jyu) ？鄉(hoeng) 為身死而不受，今為宮室之美為之；鄉為身死而不受，今為妻妾之奉為之；鄉為身死而不受，今為所識窮乏者得我而為之，是亦不可以已 乎？此之謂失其本心 。」" }
        ]

    let textNodes = [];
    let sentences = [];
    let ToJyutpingLib = null;

    let currentSentenceIdx = 0; 
    let partialTimeout = null;

    let currentCategory = "中文";
    let currentIndex = 0;
    let selectedParagraphs = new Set();
    
    // ==========================================
    // 本地儲存 (LocalStorage) 字典快取機制
    // ==========================================
    // ==========================================
    // 本地儲存 (LocalStorage) 字典快取機制
    // ==========================================
    const globalDictCache = new Map();
    const textJyutpingCache = new Map();
    let cacheUpdatedFlag = false;

    try {
        // 這裡的 _v2 改成 _v3
        const savedGlobal = localStorage.getItem('globalDictCache_v3');
        if (savedGlobal) {
            const parsed = JSON.parse(savedGlobal);
            for (const [k, v] of Object.entries(parsed)) globalDictCache.set(k, v);
        }
        // 這裡的 _v2 改成 _v3
        const savedText = localStorage.getItem('textJyutpingCache_v3');
        if (savedText) {
            const parsed = JSON.parse(savedText);
            for (const [k, v] of Object.entries(parsed)) textJyutpingCache.set(k, v);
        }
    } catch (e) {
        console.warn("讀取 LocalStorage 快取失敗", e);
    }

    let saveCacheTimeout;
    function requestSaveCache() {
        clearTimeout(saveCacheTimeout);
        saveCacheTimeout = setTimeout(() => {
            try {
                if (globalDictCache.size > 5000) {
                    const keys = Array.from(globalDictCache.keys());
                    for (let i = 0; i < keys.length - 5000; i++) globalDictCache.delete(keys[i]);
                }
                // 這裡的 _v2 也改成 _v3
                localStorage.setItem('textJyutpingCache_v3', JSON.stringify(Object.fromEntries(textJyutpingCache)));
                localStorage.setItem('globalDictCache_v3', JSON.stringify(Object.fromEntries(globalDictCache)));
            } catch (e) { }
        }, 1000);
    }

    // ==========================================
    // UI 控制與文字載入邏輯
    // ==========================================
    function renderMenu() {
        const menuContainer = document.getElementById('menu-container');
        let html = '';
        for (const [category, texts] of Object.entries(TEXT_LIBRARY)) {
            html += `<div class="menu-section"><h3>${category}</h3><ul class="menu-list">`;
            texts.forEach((item, idx) => {
                const isActive = (category === currentCategory && idx === currentIndex) ? 'active' : '';
                html += `<li><button class="${isActive}" onclick="selectText('${category}', ${idx})">${item.title} <span class="author-name">${item.author}</span></button></li>`;
            });
            html += `</ul></div>`;
        }
        menuContainer.innerHTML = html;
    }

    function toggleMenu() {
        const menu = document.getElementById('menu-overlay');
        if (menu.classList.contains('active')) {
            menu.classList.remove('active');
        } else {
            renderMenu();
            menu.classList.add('active');
        }
    }

    function selectText(category, idx) {
        if (isRecording) toggleRecording();
        currentCategory = category;
        currentIndex = idx;
        selectedParagraphs.clear();
        toggleMenu();
        loadCurrentText();
    }

    window.toggleParagraph = function(idx) {
        const hasProgress = textNodes.some(n => n.type === 'char' && n.matched);
        if (hasProgress) {
            if (!confirm("您目前已有背誦紀錄，選取或取消段落將會重置所有進度。確定要繼續嗎？")) return;
        }
        if (selectedParagraphs.has(idx)) selectedParagraphs.delete(idx);
        else selectedParagraphs.add(idx);
        loadCurrentText();
    };

    function loadCurrentText() {
        const data = TEXT_LIBRARY[currentCategory][currentIndex];
        document.getElementById('doc-title').innerText = data.title;
        document.getElementById('doc-author').innerText = data.author;
        document.getElementById('main-container').style.opacity = '0';

        setTimeout(() => {
            textNodes = []; sentences = [];
            let html = ''; let charCount = 0;
            let rawParagraphs = data.content.split(/\n+/).map(p => p.trim()).filter(p => p.length > 0);

            rawParagraphs.forEach((paraText, pIdx) => {
                let isActivePara = (selectedParagraphs.size === 0 || selectedParagraphs.has(pIdx));
                let paraClass = (selectedParagraphs.size > 0 && !isActivePara) ? 'inactive' : '';
                
                html += `<div class="para-block ${paraClass}" onclick="toggleParagraph(${pIdx})" title="${isActivePara && selectedParagraphs.size > 0 ? '點擊取消選取' : '點擊選取此段'}">`;
                
                let i = 0; let currentSentChars = [];
                let cleanText = paraText.replace(/\(\d+\)/g, '').replace(/（.*?）/g, '');

                while (i < cleanText.length) {
                    let char = cleanText[i];
                    if (char === ' ' || char === '\r') { i++; continue; }

                    if (/[，。：「」『』？、！；〈〉‧《》]/.test(char) || char === '﹗' || char === '﹔') {
                        if (isActivePara) textNodes.push({ type: 'punct', char: char });
                        html += `<span class="punct">${char}</span>`;
                        if (isActivePara && currentSentChars.length > 0) { 
                            sentences.push(currentSentChars); currentSentChars = []; 
                        }
                        i++; continue;
                    }

                    let jyutpings = []; let fuzzyBases = []; let isManualOverride = false;

                    if (cleanText[i + 1] === '(') {
                        let endIdx = cleanText.indexOf(')', i + 1);
                        if (endIdx !== -1) {
                            jyutpings = cleanText.substring(i + 2, endIdx).split('|'); 
                            i = endIdx + 1; isManualOverride = true;
                        } else { i++; }
                    } 
                    
                    if (isManualOverride) {
                        jyutpings = [...new Set(jyutpings)];
                        fuzzyBases = [...new Set(jyutpings.map(jp => fuzzyJyutping(jp)))];
                    } else {
                        if (textJyutpingCache.has(char)) {
                            let cached = textJyutpingCache.get(char);
                            jyutpings = cached.jyutpings; fuzzyBases = cached.fuzzyBases;
                            i++;
                        } else {
                            if (ToJyutpingLib && typeof ToJyutpingLib.getJyutpingCandidates === 'function') {
                                let cands = ToJyutpingLib.getJyutpingCandidates(char);
                                if (cands && cands.length > 0 && cands[0][1]) {
                                    jyutpings = cands[0][1].map(jp => jp.replace(/[0-9]/g, ''));
                                }
                            }
                            if (jyutpings.length === 0 && ToJyutpingLib && typeof ToJyutpingLib.getJyutpingList === 'function') {
                                let list = ToJyutpingLib.getJyutpingList(char);
                                if (list && list.length > 0) jyutpings = [list[0][1].replace(/[0-9]/g, '')];
                            }
                            if (jyutpings.length === 0) jyutpings = [char]; 
                            
                            jyutpings = [...new Set(jyutpings)];
                            fuzzyBases = [...new Set(jyutpings.map(jp => fuzzyJyutping(jp)))];
                            
                            textJyutpingCache.set(char, { jyutpings: jyutpings, fuzzyBases: fuzzyBases });
                            i++;
                        }
                    }

                    jyutpings = [...new Set(jyutpings)];
                    let node = { type: 'char', char: char, index: charCount, matched: false, jyutpings: jyutpings, isCurrentSentence: false };
                    
                    if (isActivePara) {
                        textNodes.push(node);
                        currentSentChars.push(node);
                    }
                    html += `<span class="char" id="char-${charCount}" data-jp="${jyutpings.join('/')}">${char}</span>`;
                    charCount++;
                }
                if (isActivePara && currentSentChars.length > 0) sentences.push(currentSentChars);
                html += `</div>`;
            });
            
            requestSaveCache();

            if (sentences.length > 0) sentences[0].forEach((n) => { n.isCurrentSentence = true; });

            document.getElementById('text-display').innerHTML = html;
            
            textNodes.forEach(node => {
                if (node.type === 'char') {
                    node.el = document.getElementById(`char-${node.index}`);
                    node.renderedMatched = false;
                    node.renderedCurrent = false;
                }
            });

            document.getElementById('main-container').style.opacity = '1';
            resetAll(false);
        }, 300);
    }

    let checkCount = 0;
    function checkLib() {
        if (window.ToJyutping && typeof window.ToJyutping.getJyutpingList === 'function') {
            ToJyutpingLib = window.ToJyutping;
            document.getElementById('btn-start').disabled = false;
            loadCurrentText(); 
        } else {
            checkCount++;
            if (checkCount > 20) { document.getElementById('btn-start').disabled = false; loadCurrentText(); } 
            else { setTimeout(checkLib, 300); }
        }
    }
    document.addEventListener('DOMContentLoaded', () => { checkLib(); });


    // ==========================================
    // 語音識別、效能最佳化緩衝與即時反饋
    // ==========================================
    let recognition;
    let isRecording = false;
    
    // 【全新設計】徹底解決越讀越慢的問題：不再使用無限增長的字串。
    // 我們將語音動態轉換為 Token 陣列，只要一句話配對成功，就立即將配對過的 Token 從記憶體刪除！
    let finalTokens = [];
    let consumedSttIdx = 0; 
    let sttTimeout = null;
    let feedbackTimeout;

    function showSpeechFeedback(text) {
        const el = document.getElementById('speech-feedback');
        if (!text) {
            el.classList.remove('show');
            return;
        }
        // 限制顯示長度，避免干擾畫面
        const displayLimit = 20;
        const displayText = text.length > displayLimit ? "..." + text.slice(-displayLimit) : text;
        el.innerText = "聽見：" + displayText;
        el.classList.add('show');
        
        clearTimeout(feedbackTimeout);
        feedbackTimeout = setTimeout(() => {
            el.classList.remove('show');
        }, 2000);
    }

    // 將任何文字轉化為可比對的 Token Array
    function getTokens(str) {
        let fixed = str.replace(/1/g, '一').replace(/2/g, '二').replace(/3/g, '三')
                       .replace(/4/g, '四').replace(/5/g, '五').replace(/6/g, '六')
                       .replace(/7/g, '七').replace(/8/g, '八').replace(/9/g, '九').replace(/0/g, '零');
        let matches = fixed.toLowerCase().match(/[\u4e00-\u9fa5]|[a-z]+/g) || [];
        let tokens = [];
        
        for (let token of matches) {
            if (globalDictCache.has(token)) {
                tokens.push({ char: token, bases: globalDictCache.get(token) });
                continue;
            }
            let fuzzyBases = [];
            if (/[a-z]+/.test(token)) {
                fuzzyBases.push(fuzzyJyutping(token));
            } else {
                try {
                    if (ToJyutpingLib && typeof ToJyutpingLib.getJyutpingCandidates === 'function') {
                        let cands = ToJyutpingLib.getJyutpingCandidates(token);
                        if (cands && cands[0] && cands[0][1]) {
                            cands[0][1].forEach(jp => {
                                let f = fuzzyJyutping(jp);
                                if (f && !fuzzyBases.includes(f)) fuzzyBases.push(f);
                            });
                        }
                    }
                    if (fuzzyBases.length === 0 && ToJyutpingLib && typeof ToJyutpingLib.getJyutpingList === 'function') {
                        let singleList = ToJyutpingLib.getJyutpingList(token);
                        if (singleList && singleList[0] && singleList[0][1]) {
                            let f = fuzzyJyutping(singleList[0][1]);
                            if (f && !fuzzyBases.includes(f)) fuzzyBases.push(f);
                        }
                    }
                } catch (e) {}
            }
            globalDictCache.set(token, fuzzyBases);
            cacheUpdatedFlag = true;
            tokens.push({ char: token, bases: fuzzyBases });
        }
        return tokens;
    }

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRec();
        recognition.lang = 'yue-Hant-HK'; 
        recognition.continuous = true;
        recognition.interimResults = true;

        recognition.onstart = function() { document.getElementById('btn-start').classList.add('recording'); };
        
        recognition.onresult = function(event) {
            let newFinalStr = '';
            let interimStr = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) newFinalStr += event.results[i][0].transcript;
                else interimStr += event.results[i][0].transcript;
            }
            
            if (newFinalStr) finalTokens.push(...getTokens(newFinalStr));
            let interimTokens = getTokens(interimStr);
            
            // 系統需要處理的數據只有「尚未被成功配對的字」加上「說話當下還在變動的字」
            // 永遠保持輕量，解決運算延遲！
            let currentSttData = [...finalTokens, ...interimTokens];
            
            if (cacheUpdatedFlag) { requestSaveCache(); cacheUpdatedFlag = false; }

            // 讓使用者第一時間看到未處理的字幕
            let display1 = currentSttData.slice(consumedSttIdx).map(t => t.char).join('');
            showSpeechFeedback(display1);

            clearTimeout(sttTimeout);
            sttTimeout = setTimeout(() => {
                matchAlgorithm(currentSttData);
                
                // 比對完成後，若有成功過關的字，字幕會立刻變更（逐句清空效果）
                let display2 = currentSttData.slice(consumedSttIdx).map(t => t.char).join('');
                if (display1 !== display2) showSpeechFeedback(display2);
                
                // 記憶體清理：立刻將剛才確認配對過關的 Token 從陣列徹底刪除，絕不殘留
                let safeToClear = Math.min(consumedSttIdx, finalTokens.length);
                if (safeToClear > 0) {
                    finalTokens.splice(0, safeToClear);
                    consumedSttIdx -= safeToClear;
                }
            }, 80); 
        };
        
        recognition.onerror = function(event) {
            if (event.error === 'not-allowed') {
                isRecording = false; document.getElementById('btn-start').classList.remove('recording');
                alert("未授權麥克風使用。");
            }
        };
        
        recognition.onend = function() {
            if (isRecording) { setTimeout(() => { if (isRecording) { try { recognition.start(); } catch(e) {} } }, 1000); } 
            else { document.getElementById('btn-start').classList.remove('recording'); }
        };
    } else {
        alert('此瀏覽器不支援語音識別，建議使用 Chrome 瀏覽器。');
    }

    function toggleRecording() {
        if (!recognition) return;
        if (isRecording) { 
            isRecording = false; recognition.stop(); 
            showSpeechFeedback('');
        } else { 
            isRecording = true; try { recognition.start(); } catch(e) {} 
        }
    }

    // ==========================================
    // 鍵盤輸入整合
    // ==========================================
    window.toggleKeyboard = function() {
        const bar = document.getElementById('action-bar');
        const input = document.getElementById('manual-input');
        const btn = document.getElementById('btn-keyboard');
        bar.classList.toggle('show-input');
        if (bar.classList.contains('show-input')) { input.focus(); btn.style.color = 'var(--accent-red)'; } 
        else { input.blur(); btn.style.color = ''; }
    };

    function handleManualInput(text) {
        if (!text) return;
        finalTokens.push(...getTokens(text));
        let currentSttData = [...finalTokens];
        
        let display1 = currentSttData.slice(consumedSttIdx).map(t => t.char).join('');
        showSpeechFeedback(display1);
        
        matchAlgorithm(currentSttData, true);
        
        let display2 = currentSttData.slice(consumedSttIdx).map(t => t.char).join('');
        if (display1 !== display2) showSpeechFeedback(display2);
        
        let safeToClear = Math.min(consumedSttIdx, finalTokens.length);
        if (safeToClear > 0) {
            finalTokens.splice(0, safeToClear);
            consumedSttIdx -= safeToClear;
        }
    }

    const manualInput = document.getElementById('manual-input');
    manualInput.addEventListener('compositionend', (e) => {
        if (e.data && e.data.trim() !== '') { handleManualInput(e.data); manualInput.value = ''; }
    });
    manualInput.addEventListener('input', (e) => {
        if (e.isComposing) return;
        const val = manualInput.value;
        if (val.trim() !== '') { handleManualInput(val); manualInput.value = ''; }
    });

    function setMode(mode) {
        const container = document.getElementById('text-display');
        document.getElementById('btn-mode-review').classList.remove('active');
        document.getElementById('btn-mode-challenge').classList.remove('active');
        if (mode === 'challenge') {
            container.className = 'text-display challenge-mode';
            document.getElementById('btn-mode-challenge').classList.add('active');
        } else {
            container.className = 'text-display review-mode';
            document.getElementById('btn-mode-review').classList.add('active');
        }
    }

    function resetAll(stopRec = true) {
        if (stopRec && isRecording) toggleRecording();
        clearTimeout(partialTimeout);
        
        // 清空所有緩衝與狀態
        finalTokens = []; consumedSttIdx = 0;
        document.getElementById('manual-input').value = '';
        showSpeechFeedback('');
        
        textNodes.forEach(n => { if (n.type === 'char') { n.matched = false; n.isCurrentSentence = false; } });
        if (sentences.length > 0) { sentences[0].forEach((n) => { n.isCurrentSentence = true; }); }
        updateRender();
    }

    // ==========================================
    // 核心比對邏輯 (DFS 動態規劃)
    // ==========================================
  function fuzzyJyutping(str) {
        if (!str) return '';
        let base = str.toLowerCase().replace(/[0-9\s]/g, ''); 
        
        // 聲母與主要母音容錯
        base = base.replace(/y/g, 'j').replace(/^ch/, 'c').replace(/^sh/, 's').replace(/ue/g, 'yu')
                   .replace(/ee/g, 'i').replace(/oo/g, 'u').replace(/ou/g, 'au');    
        if (base.startsWith('n') && !base.startsWith('ng')) base = 'l' + base.substring(1); 
        if (base.startsWith('ng') && base.length > 2) base = base.substring(2); 
        if (base === 'ng') base = 'm'; 
        if (base.startsWith('gw') && (base.includes('o') || base.includes('u'))) base = 'g' + base.substring(2);
        if (base.startsWith('kw') && (base.includes('o') || base.includes('u'))) base = 'k' + base.substring(2);
        
        if (base.endsWith('ing')) base = base.slice(0, -3) + 'eng';
        if (base.endsWith('ik')) base = base.slice(0, -2) + 'ek';
        
        // 🌟 【關鍵修改】：韻尾大一統
        // 將入聲韻尾 p, t 統一轉換為 k (讓「集 zaap」與「澤 zaak」完全相容)
        base = base.replace(/[pt]$/, 'k'); 
        // 將鼻音韻尾 m, ng 統一轉換為 n (讓「林 lam」、「冷 laang」與「蘭 laan」相容)
        base = base.replace(/(m|ng)$/, 'n'); 
        
        // 特殊拼音統一
        if (base === 'jut' || base === 'jyut' || base === 'jyuet' || base === 'jyuk') base = 'jyuk';
        
        return base;
    }

    function checkComboMatch(sttData, sttIdx, x, sentenceChars, targetIdx, y) {
        if (x === 1 && y === 1 && sttData[sttIdx].char === sentenceChars[targetIdx].char) return true;
        
        let targetCombos = [''];
        for (let k = 0; k < y; k++) {
            let node = sentenceChars[targetIdx + k];
            let newCombos = [];
            for (let jp of node.jyutpings) {
                let f = fuzzyJyutping(jp);
                for (let tc of targetCombos) newCombos.push(tc + f);
            }
            targetCombos = newCombos;
        }
        
        let sttCombos = [''];
        for (let k = 0; k < x; k++) {
            let item = sttData[sttIdx + k];
            let newCombos = [];
            let bases = item.bases.length > 0 ? item.bases : [fuzzyJyutping(item.char)];
            for (let b of bases) { for (let sc of sttCombos) newCombos.push(sc + b); }
            sttCombos = newCombos;
        }
        
        for (let tc of targetCombos) { if (sttCombos.includes(tc)) return true; }
        return false;
    }

    function triggerShakeReset(sentenceChars) {
        sentenceChars.forEach(n => {
            let el = document.getElementById(`char-${n.index}`);
            if (el) {
                el.classList.remove('shake-error');
                void el.offsetWidth; // 觸發 reflow 讓動畫可重新播放
                el.classList.add('shake-error');
                setTimeout(() => el.classList.remove('shake-error'), 400);
            }
        });
    }

    function matchAlgorithm(sttData, isTyping = false) {
        clearTimeout(partialTimeout); 
        let sentencePassed = false;
        
        do {
            sentencePassed = false;
            if (currentSentenceIdx >= sentences.length) break;

            let sentenceChars = sentences[currentSentenceIdx];
            let maxMatched = 0; let maxMatchEndStt = consumedSttIdx; let matchEndSttIdx = -1;
            let memo = new Map(); 

            function dfs(sIdx, tIdx) {
                if (sIdx - consumedSttIdx > tIdx * 3 + 12) return { success: false, endSttIdx: sIdx, maxT: tIdx };

                let key = `${sIdx}_${tIdx}`;
                if (memo.has(key)) return memo.get(key);
                
                if (tIdx === sentenceChars.length) return { success: true, endSttIdx: sIdx, maxT: tIdx };
                if (sIdx >= sttData.length) return { success: false, endSttIdx: sIdx, maxT: tIdx };

                let bestRes = { success: false, endSttIdx: sIdx, maxT: tIdx };

                for (let x = 1; x <= 3; x++) {
                    if (sIdx + x > sttData.length) continue;
                    for (let y = 1; y <= 3; y++) {
                        if (tIdx + y > sentenceChars.length) continue;
                        if (checkComboMatch(sttData, sIdx, x, sentenceChars, tIdx, y)) {
                            let next = dfs(sIdx + x, tIdx + y);
                            if (next.success) { memo.set(key, next); return next; }
                            if (next.maxT > bestRes.maxT) bestRes = next;
                            else if (next.maxT === bestRes.maxT && next.endSttIdx > bestRes.endSttIdx) bestRes = next;
                        }
                    }
                }
                memo.set(key, bestRes); return bestRes;
            }

            // 放寬搜索限制，讓中途有雜音時依然可以順暢匹配後續字元
            let searchLimit = Math.min(sttData.length, consumedSttIdx + 12);
            for (let i = consumedSttIdx; i < searchLimit; i++) {
                let res = dfs(i, 0);
                if (res.success) { matchEndSttIdx = res.endSttIdx; sentencePassed = true; break; } 
                else {
                    if (res.maxT > maxMatched) { maxMatched = res.maxT; maxMatchEndStt = res.endSttIdx; } 
                    else if (res.maxT === maxMatched && res.endSttIdx > maxMatchEndStt) maxMatchEndStt = res.endSttIdx;
                }
            }

        if (sentencePassed) {
                sentenceChars.forEach(n => { n.matched = true; n.isCurrentSentence = false; });
                currentSentenceIdx++; consumedSttIdx = matchEndSttIdx; 
                
                if (currentSentenceIdx < sentences.length) {
                    sentences[currentSentenceIdx].forEach((n) => { n.isCurrentSentence = true; });
                }
            } else {
                let currentMax = maxMatched;
                
                // 若有輸入但無法過關，只要停頓夠久就會觸發整句震動並重置
                if (currentMax > 0 || sttData.length > consumedSttIdx) {
                    if (!isTyping) {
                        partialTimeout = setTimeout(() => {
                            let chars = sentences[currentSentenceIdx];
                            triggerShakeReset(chars); // 觸發整句視覺震動
                            chars.forEach(n => n.matched = false);
                            updateRender();
                            finalTokens = []; consumedSttIdx = 0; showSpeechFeedback('');
                        }, 500); // 👈 關鍵修改：將這裡的 2500 改為 500 (0.5秒)
                    }
                }

                sentenceChars.forEach((n, idx) => { n.matched = (idx < maxMatched); n.isCurrentSentence = true; });
                
                for (let i = currentSentenceIdx + 1; i < sentences.length; i++) {
                    sentences[i].forEach(n => { n.matched = false; n.isCurrentSentence = false; });
                }
            }
        } while (sentencePassed); 

        updateRender();
    }
    function updateRender() {
        let matchedCount = 0;
        let totalChars = 0;

        textNodes.forEach(node => {
            if (node.type === 'char') {
                totalChars++;
                if (node.matched !== node.renderedMatched) {
                    if (node.matched) node.el.classList.add('matched');
                    else node.el.classList.remove('matched');
                    node.renderedMatched = node.matched;
                }
                if (node.isCurrentSentence !== node.renderedCurrent) {
                    if (node.isCurrentSentence) node.el.classList.add('current-sentence');
                    else node.el.classList.remove('current-sentence');
                    node.renderedCurrent = node.isCurrentSentence;
                }
                if (node.matched) matchedCount++;
            }
        });

        const progress = totalChars === 0 ? 0 : Math.round((matchedCount / totalChars) * 100);
        document.getElementById('progress-bar').style.width = progress + '%';
        
        if (progress === 100 && totalChars > 0) {
            if(isRecording) toggleRecording();
            clearTimeout(partialTimeout);
            document.getElementById('success-screen').style.display = 'flex';
        }
    }

    window.closeSuccessScreen = function() {
        document.getElementById('success-screen').style.display = 'none'; resetAll();
    };
</script>
