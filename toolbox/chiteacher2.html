<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中文老師的一生 - 序章</title>
    <style>
        /* 匯入高字重的黑體字型以增強漫畫標題與擬聲詞的視覺張力 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@700;900&display=swap');

        :root {
            --manga-black: #111;
            --manga-white: #fdfdfd;
            --manga-red: #E60012;
            --manga-yellow: #FFD700;
        }

        * {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--manga-black);
            overflow: hidden;
            font-family: 'Noto Sans TC', sans-serif;
            user-select: none;
            /* 加入 3D 透視，讓翻頁有真實的景深感 */
            perspective: 2500px; 
        }

        /* 第一層：啟動畫面 (漫畫封面) */
        #intro-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            background-color: var(--manga-white);
            /* 漫畫書脊設定在右側 (傳統右翻書) */
            transform-origin: right center; 
            transform-style: preserve-3d;
            /* 翻頁動畫時間與曲線設計 */
            transition: transform 1.2s cubic-bezier(0.645, 0.045, 0.355, 1), opacity 0.8s 0.4s;
            box-shadow: 0 0 0 rgba(0,0,0,0);
        }

        /* 漫畫書脊的陰影細節 (讓它看起來像一本書) */
        #intro-overlay::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 8%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(0,0,0,0.35));
            pointer-events: none;
            z-index: 20;
        }

        /* 觸發翻頁時的 Class */
        #intro-overlay.flip-open {
            /* 模擬從左往右翻開的效果 */
            transform: rotateY(105deg) scale(0.95);
            opacity: 0;
            box-shadow: -30px 0 50px rgba(0,0,0,0.8);
        }

        /* 漫畫網點背景 */
        .halftone-bg {
            position: absolute;
            top: -5%;
            left: -5%;
            width: 110%;
            height: 110%;
            background-image: radial-gradient(circle, var(--manga-black) 2px, transparent 2.5px);
            background-size: 8px 8px;
            background-color: var(--manga-white);
            z-index: 1;
            transition: transform 0.1s ease-out;
        }

        /* 集中線背景 (Speed Lines) */
        .speed-lines {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200vw;
            height: 200vw;
            transform: translate(-50%, -50%);
            background: repeating-conic-gradient(
                var(--manga-black) 0 1deg, 
                transparent 1deg 4deg, 
                var(--manga-black) 4deg 5deg, 
                transparent 5deg 10deg
            );
            opacity: 0.15;
            z-index: 2;
            pointer-events: none;
            animation: rotateLines 60s linear infinite;
        }

        @keyframes rotateLines {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* 中文漫畫擬聲詞背景 */
        .sfx-bg {
            position: absolute;
            font-size: clamp(6rem, 15vw, 15rem);
            font-weight: 900;
            color: transparent;
            -webkit-text-stroke: 3px var(--manga-black);
            opacity: 0.15;
            z-index: 3;
            pointer-events: none;
            letter-spacing: -10px;
            animation: tremble 0.4s infinite alternate;
        }

        @keyframes tremble {
            0% { transform: translate(2px, 2px) rotate(1deg); }
            100% { transform: translate(-2px, -2px) rotate(-1deg); }
        }

        /* 漫畫標題設計區塊 */
        .manga-title-container {
            position: relative;
            z-index: 4;
            text-align: center;
            width: 100%;
            padding: 0 15px;
        }

        .manga-subtitle {
            background: var(--manga-black);
            color: var(--manga-white);
            display: inline-block;
            padding: 5px 15px;
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            font-weight: 900;
            transform: skew(-10deg);
            margin-bottom: -10px;
            position: relative;
            z-index: 5;
            border: 3px solid var(--manga-white);
            letter-spacing: 2px;
        }

        /* 確保單行顯示與極致的響應式縮放 */
        .manga-title {
            font-size: clamp(2.2rem, 9vw, 6rem); 
            font-weight: 900;
            color: var(--manga-white);
            white-space: nowrap; /* 絕對不換行 */
            text-shadow: 
                -0.05em -0.05em 0 var(--manga-black),  
                 0.05em -0.05em 0 var(--manga-black),
                -0.05em  0.05em 0 var(--manga-black),
                 0.05em  0.05em 0 var(--manga-black),
                 0.15em 0.15em 0 var(--manga-black);
            letter-spacing: 0.1em;
            margin: 0;
            transform: skew(-5deg);
        }

        /* 漫畫分鏡風格的開始按鈕 */
        .start-panel {
            position: relative;
            margin-top: 6vw;
            background: var(--manga-white);
            border: clamp(4px, 1vw, 8px) solid var(--manga-black);
            padding: clamp(12px, 2vw, 20px) clamp(30px, 5vw, 60px);
            font-size: clamp(1.2rem, 3vw, 2rem);
            font-weight: 900;
            cursor: pointer;
            z-index: 5;
            transform: skew(-10deg);
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: clamp(5px, 1vw, 10px) clamp(5px, 1vw, 10px) 0 var(--manga-black);
            overflow: hidden;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: skew(-10deg) scale(1); }
            50% { transform: skew(-10deg) scale(1.02); }
        }

        .start-panel span {
            display: block;
            transform: skew(10deg); 
            transition: color 0.3s;
            letter-spacing: 2px;
        }

        .start-panel::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: var(--manga-red);
            transition: left 0.3s ease;
            z-index: -1;
        }

        .start-panel:hover {
            transform: skew(-10deg) scale(1.05) translate(-5px, -5px);
            box-shadow: clamp(10px, 2vw, 20px) clamp(10px, 2vw, 20px) 0 var(--manga-black);
            animation: none; 
        }

        .start-panel:hover::before {
            left: 0;
        }

        .start-panel:hover span {
            color: var(--manga-white);
        }

        /* 按鈕懸停時出現的中文擬聲詞 咚！ */
        .sfx-hover {
            position: absolute;
            right: -20%;
            top: -50%;
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 900;
            color: var(--manga-yellow);
            -webkit-text-stroke: 2px var(--manga-black);
            text-shadow: 4px 4px 0 var(--manga-black);
            opacity: 0;
            transform: scale(0) rotate(15deg);
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            pointer-events: none;
        }

        .start-panel:hover .sfx-hover {
            opacity: 1;
            transform: scale(1) rotate(15deg);
        }

        /* 滿版影片 */
        #intro-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        /* SKIP 按鈕 */
        #skip-btn {
            position: absolute;
            bottom: clamp(15px, 4vw, 30px);
            right: clamp(15px, 4vw, 30px);
            z-index: 25;
            opacity: 0;
            pointer-events: none;
            background: var(--manga-black);
            color: var(--manga-white);
            border: 3px solid var(--manga-white);
            padding: clamp(8px, 2vw, 10px) clamp(20px, 4vw, 30px);
            font-size: clamp(1rem, 2vw, 1.2rem);
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s ease;
            clip-path: polygon(0 0, 100% 0, 100% 100%, 15px 100%);
            box-shadow: -4px 4px 0 rgba(0,0,0,0.5);
            letter-spacing: 1px;
        }

        #skip-btn:hover {
            background: var(--manga-white);
            color: var(--manga-black);
            border-color: var(--manga-black);
            transform: translateX(-5px);
        }

        /* 轉場動畫：漫畫切線墨水黑屏 */
        .manga-transition-slice {
            position: absolute;
            top: 0;
            width: 100%;
            height: 50%;
            background: var(--manga-black);
            z-index: 20;
            transition: transform 0.6s cubic-bezier(0.77, 0, 0.175, 1);
        }

        #slice-top {
            left: 0;
            transform-origin: top;
            transform: scaleY(0);
        }

        #slice-bottom {
            bottom: 0;
            transform-origin: bottom;
            transform: scaleY(0);
        }

        /* 手機端微調 */
        @media (max-width: 768px) {
            .sfx-bg { -webkit-text-stroke: 1px var(--manga-black); }
            .sfx-hover { right: -10%; top: -60%; }
        }
    </style>
</head>
<body>

    <!-- 背景影片 -->
    <video id="intro-video" playsinline>
        <source src="過場動畫.mp4" type="video/mp4">
        您的瀏覽器不支援影片標籤。
    </video>

    <!-- 啟動畫面 (漫畫封面) -->
    <div id="intro-overlay">
        <!-- 網點與集中線背景 -->
        <div class="halftone-bg" id="parallax-bg"></div>
        <div class="speed-lines"></div>
        
        <!-- 中文擬聲詞背景 -->
        <div class="sfx-bg" style="top: 10%; left: -2%;">轟轟轟</div>
        <div class="sfx-bg" style="bottom: 5%; right: -2%;">轟轟轟</div>

        <!-- 標題區域 -->
        <div class="manga-title-container" id="parallax-title">
            <div class="manga-subtitle">序章 / INTRO</div>
            <!-- 強制單行顯示的標題 -->
            <h1 class="manga-title">中文老師的一生</h1>
        </div>

        <!-- 開始按鈕 (互動漫畫格) -->
        <button class="start-panel" id="start-btn">
            <span>調換身分 / START</span>
            <div class="sfx-hover">咚！</div>
        </button>
    </div>

    <!-- 轉場切割黑屏 -->
    <div class="manga-transition-slice" id="slice-top"></div>
    <div class="manga-transition-slice" id="slice-bottom"></div>

    <!-- Skip 按鈕 -->
    <button id="skip-btn">跳過 SKIP ⏭</button>

    <script>
        const startBtn = document.getElementById('start-btn');
        const skipBtn = document.getElementById('skip-btn');
        const video = document.getElementById('intro-video');
        const introOverlay = document.getElementById('intro-overlay');
        const sliceTop = document.getElementById('slice-top');
        const sliceBottom = document.getElementById('slice-bottom');

        let isFlipping = false; // 防止翻頁時視差效果干擾

        // --- 視差互動效果 (Parallax) ---
        const parallaxBg = document.getElementById('parallax-bg');
        const parallaxTitle = document.getElementById('parallax-title');

        if (window.matchMedia("(pointer: fine)").matches) {
            document.addEventListener('mousemove', (e) => {
                if (!isFlipping && introOverlay.style.display !== 'none') {
                    const x = (e.clientX / window.innerWidth - 0.5);
                    const y = (e.clientY / window.innerHeight - 0.5);
                    parallaxBg.style.transform = `translate(${x * -30}px, ${y * -30}px)`;
                    parallaxTitle.style.transform = `translate(${x * 20}px, ${y * 20}px)`;
                }
            });
        }

        // --- 進入下一頁的函數 (切換分鏡黑屏過場) ---
        function goToNextPage() {
            sliceTop.style.transform = 'scaleY(1)';
            sliceBottom.style.transform = 'scaleY(1)';
            
            setTimeout(() => {
                window.location.href = 'chiteacher.html'; 
            }, 600);
        }

        // --- 點擊 Start 觸發「漫畫翻頁」動畫 ---
        startBtn.addEventListener('click', () => {
            isFlipping = true; // 關閉視差
            
            // 加上 flip-open 觸發 3D 翻書效果
            introOverlay.classList.add('flip-open');
            
            // 等待翻頁動畫即將結束時 (1.2秒) 播放影片
            setTimeout(() => {
                introOverlay.style.display = 'none';
                
                // 播放影片
                video.play();
                
                // 顯示 SKIP 按鈕
                skipBtn.style.opacity = '1';
                skipBtn.style.pointerEvents = 'auto';
            }, 1200); 
        });

        // 事件監聽：點擊 SKIP 按鈕
        skipBtn.addEventListener('click', goToNextPage);

        // 事件監聽：影片播放完畢
        video.addEventListener('ended', goToNextPage);
    </script>
</body>
</html>
