<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chinese - Intro</title>
    <style>
        /* 匯入黑體字型以增強動漫標題感 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@700;900&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Noto Sans TC', sans-serif;
            user-select: none;
        }

        /* 滿版背景影片 */
        #intro-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1s ease;
            z-index: 1;
        }

        /* 第一層：啟動畫面 (解決瀏覽器音效阻擋問題) */
        #intro-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1a2e 0%, #000000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        /* 動漫風 Glitch 標題 */
        .anime-title {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 8px;
            color: #fff;
            text-transform: uppercase;
            /* 霓虹錯位效果 */
            text-shadow: 4px 4px 0px #ff0055, -4px -4px 0px #00f0ff;
            margin-bottom: 3rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* 開始按鈕 */
        #start-btn {
            background: transparent;
            border: 2px solid #fff;
            color: #fff;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px); /* 斜角切割 */
        }

        #start-btn:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 25px #fff;
            transform: scale(1.05);
        }

        /* SKIP 按鈕 (動漫 HUD 風格) */
        #skip-btn {
            position: absolute;
            bottom: 40px;
            right: 40px;
            z-index: 5;
            opacity: 0;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            border: none;
            border-left: 4px solid #00f0ff; /* 側邊霓虹強調線 */
            padding: 10px 25px;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            /* 機甲風斜切角 */
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }

        #skip-btn:hover {
            background: #00f0ff;
            color: #000;
            transform: translateX(-5px);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.6);
        }

        /* 頁面跳轉時的黑屏淡出過渡 */
        #fade-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease;
        }
    </style>
</head>
<body>

    <!-- 啟動畫面 -->
    <div id="intro-overlay">
        <h1 class="anime-title">中文老師的一生</h1>
        <button id="start-btn">調換身分 / START</button>
    </div>

    <!-- 過場動畫 -->
    <video id="intro-video" playsinline>
        <source src="過場動畫.mp4" type="video/mp4">
        您的瀏覽器不支援影片標籤。
    </video>

    <!-- Skip 按鈕 -->
    <button id="skip-btn">SKIP ⏭</button>

    <!-- 轉場用黑屏 -->
    <div id="fade-overlay"></div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const skipBtn = document.getElementById('skip-btn');
        const video = document.getElementById('intro-video');
        const introOverlay = document.getElementById('intro-overlay');
        const fadeOverlay = document.getElementById('fade-overlay');

        // 進入主畫面的函數 (加入黑屏轉場)
        function goToNextPage() {
            fadeOverlay.style.opacity = '1'; // 觸發黑屏淡出
            
            // 延遲 800 毫秒等待畫面全黑後，跳轉至 index2.html
            setTimeout(() => {
                window.location.href = 'chiteacher.html'; 
            }, 800);
        }

        // 點擊 Start 播放影片
        startBtn.addEventListener('click', () => {
            // 隱藏啟動畫面
            introOverlay.style.opacity = '0';
            
            setTimeout(() => {
                introOverlay.style.display = 'none';
                
                // 顯示並播放影片
                video.style.opacity = '1';
                video.play();
                
                // 顯示 SKIP 按鈕
                skipBtn.style.opacity = '1';
                skipBtn.style.pointerEvents = 'auto';
            }, 500); // 等待淡出動畫結束
        });

        // 事件監聽：點擊 SKIP 按鈕
        skipBtn.addEventListener('click', goToNextPage);

        // 事件監聽：影片播放完畢
        video.addEventListener('ended', goToNextPage);
    </script>
</body>
</html>
