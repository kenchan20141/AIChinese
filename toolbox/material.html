<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Content Security Policy (CSP) 防護 -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://script.google.com https://script.googleusercontent.com https://*.google.com https://*.googleusercontent.com; img-src * data: blob:;">
  
  <title>DSE 寫作素材報</title>
  <style>
    :root {
      --bg-paper: #F5F3ED;
      --bg-content: #FCFBF9;
      --text-main: #2C2C2C;
      --text-gray: #6B6B6B;
      --border-thin: 1px solid #D6D2C4;
      --border-thick: 3px solid #3A4042;
      --font-serif: 'PMingLiU', 'MingLiU', 'Times New Roman', serif;
      --font-sans: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      
      --color-1: #647672; 
      --color-2: #866B64; 
      --color-3: #586875; 
      --color-4: #8B7E74; 
    }

    body {
      font-family: var(--font-serif);
      background-color: var(--bg-paper);
      color: var(--text-main);
      margin: 0; padding: 0;
      line-height: 1.8;
    }

    .container {
      max-width: 1200px; margin: 30px auto;
      background: var(--bg-content);
      padding: 40px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.03);
      border-radius: 4px;
    }

    .masthead { text-align: center; margin-bottom: 30px; }
    .masthead h1 {
      font-size: clamp(36px, 5vw, 48px); margin: 0;
      letter-spacing: 8px; color: var(--text-main);
    }
    .subtitle { font-family: var(--font-sans); color: var(--text-gray); font-size: 14px; letter-spacing: 2px; margin-top: 10px; }

    .tab-container {
      display: flex; justify-content: center; gap: 20px;
      margin-bottom: 30px; border-bottom: var(--border-thick); padding-bottom: 15px;
    }
    .tab-btn {
      font-family: var(--font-sans); font-size: 18px; font-weight: bold;
      background: none; border: none; cursor: pointer;
      color: var(--text-gray); padding: 5px 15px;
      transition: all 0.3s;
    }
    .tab-btn.active { color: var(--color-2); border-bottom: 3px solid var(--color-2); }
    .tab-btn:hover { color: var(--color-1); }

    .layout-grid {
      display: grid; grid-template-columns: 2.5fr 1fr; gap: 40px;
    }

    .article-box {
      margin-bottom: 50px; padding-bottom: 30px; border-bottom: 1px dashed #CCC;
    }
    .article-box:last-child { border-bottom: none; }

    /* 極簡主義收藏按鈕佈局 */
    .article-header-row {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
    }
    
    .article-meta { font-family: var(--font-sans); font-size: 12px; color: var(--text-gray); }
    
    .bookmark-btn {
      background: none; border: none; cursor: pointer;
      color: #A3A3A3; padding: 0; display: inline-flex; align-items: center;
      transition: all 0.25s ease; outline: none;
    }
    .bookmark-btn:hover { color: var(--text-main); transform: translateY(-2px); }
    .bookmark-btn.saved { color: var(--color-2); }
    .bookmark-btn svg {
      width: 22px; height: 22px; fill: none; stroke: currentColor;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }
    .bookmark-btn.saved svg { fill: currentColor; }

    .article-tag { padding: 3px 8px; color: white; font-size: 12px; font-family: var(--font-sans); margin-right: 10px; border-radius: 2px; }
    
    .article-title {
      font-size: 26px; font-weight: bold; margin: 5px 0 20px 0;
      color: var(--text-main); text-decoration: none; display: inline-block;
    }
    .article-title:hover { text-decoration: underline; }

    .article-img {
      width: 100%; max-height: 400px; object-fit: cover;
      margin-bottom: 20px; border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .theme-bar {
      font-family: var(--font-sans); font-weight: bold; font-size: 15px;
      padding: 8px 15px; margin-bottom: 15px; border-left: 5px solid;
      background: rgba(0,0,0,0.02);
    }
    
    .question-box {
      font-size: 18px; font-weight: bold; color: var(--text-main);
      margin-bottom: 15px; padding: 10px; border: var(--border-thin);
      text-align: left;
    }
    
    .content-label {
      font-weight: bold; font-family: var(--font-sans); 
      display: block; margin-bottom: 5px;
    }
    .content-body { font-size: 16px; text-align: justify; }

    .drop-cap {
      float: left; font-size: 3.5em; line-height: 0.8;
      padding-top: 4px; padding-right: 8px; font-weight: bold;
    }

    .sidebar { border-left: var(--border-thin); padding-left: 25px; }
    .sidebar-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; }
    
    .date-picker {
      width: 100%; padding: 10px; font-family: var(--font-sans);
      border: 1px solid #CCC; border-radius: 4px; outline: none;
      margin-bottom: 25px; cursor: pointer;
    }

    .archive-item { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px dotted #E0E0E0; }
    .archive-cat { font-family: var(--font-sans); font-size: 11px; padding: 2px 5px; background: #EEE; border-radius: 2px; margin-bottom: 5px; display: inline-block;}
    .archive-title { font-size: 15px; color: var(--text-main); text-decoration: none; font-weight: bold; display: block;}
    .archive-title:hover { color: var(--color-2); }
    .archive-empty { color: #888; font-style: italic; font-size: 14px; text-align: center; margin-top: 30px;}

    .hidden { display: none !important; }
    .loading { text-align: center; padding: 50px; color: var(--text-gray); }

    @media (max-width: 800px) {
      .layout-grid { grid-template-columns: 1fr; }
      .sidebar { border-left: none; border-top: var(--border-thick); padding-left: 0; padding-top: 20px; }
      .container { padding: 20px; margin: 0; }
    }

.copyright-footer {
    position: fixed;
    bottom: 0;
    right: 0;
    padding: 5px 10px;
    background-color: #f1f1f1;
}

.copyright-footer p {
    margin: 0;
    font-size: 14px;
}

@media (max-width: 600px) {
    .copyright-footer p {
        font-size: 12px;
    }
}


    
  </style>
</head>
<body>

  <div class="container">
    <header class="masthead">
      <h1>DSE 寫作素材報</h1>
      <div class="subtitle">每日更新 · 議論典故 · 抒情選材</div>
    </header>

    <div class="tab-container" id="tabs">
      <button class="tab-btn active" onclick="switchTab('議論')">議論文</button>
      <button class="tab-btn" onclick="switchTab('抒情')">敘事抒情</button>
      <!-- 新增：我的收藏按鈕 -->
      <button class="tab-btn" onclick="switchTab('收藏')">我的收藏</button>
    </div>

    <div id="loading-area" class="loading">資料加載中，正在連接伺服器...</div>

    <div id="content-area" class="layout-grid hidden">
      <main id="main-content"></main>
      <aside class="sidebar">
        <div class="sidebar-title">昔日檔案檢索</div>
        <input type="date" id="date-picker" class="date-picker" onchange="filterByDate(this.value)">
        <div id="archive-results"></div>
      </aside>
    </div>
  </div>

  <script>
    // ==========================================
    // 【極度重要設定】請將你的 GAS API 網址貼在下方
    // ==========================================
    const API_URL = "https://script.google.com/macros/s/AKfycbzzzXgxRR2lVa2qknKHSTX9DRNpk-xtPCit9yZHFBLGvF2g1ClRiLPoHVQ2HgmO8eDF/exec";

    const morandiColors = ['var(--color-1)', 'var(--color-2)', 'var(--color-3)', 'var(--color-4)'];
    let allRecords = [];
    let currentCategory = '議論';
    let currentDateFilter = null; 
    
    // 初始化讀取 Local Storage 中的收藏資料
    let savedRecords = JSON.parse(localStorage.getItem('dse_bookmarks')) || [];

    window.onload = function() {
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('date-picker').max = today;

      fetch(API_URL, {
        method: 'GET',
        redirect: 'follow'
      })
      .then(response => {
        if (!response.ok) throw new Error(`伺服器回應錯誤 (狀態碼: ${response.status})`);
        return response.json();
      })
      .then(data => initData(data.data || data)) // 兼容舊版與新版 API 回傳格式
      .catch(error => {
        console.error("Fetch Error:", error);
        document.getElementById('loading-area').innerHTML = `<span style="color:red;">載入失敗：${error.message}</span><br><br><small>開發者提示：請確認 API_URL 結尾為 /exec，且部署權限設為「所有人」。</small>`;
      });
    };

    function initData(records) {
      allRecords = records;
      document.getElementById('loading-area').classList.add('hidden');
      document.getElementById('content-area').classList.remove('hidden');
      
      if (allRecords.length > 0) {
        currentDateFilter = allRecords[0][0]; 
        document.getElementById('date-picker').value = currentDateFilter;
      }
      
      renderMain();
      renderArchiveList();
    }

    function switchTab(category) {
      currentCategory = category;
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      
      // 當進入收藏區時，自動清除日期過濾，讓用家能看到全部收藏
      if (category === '收藏') {
        currentDateFilter = null;
        document.getElementById('date-picker').value = '';
      }
      
      renderMain();
    }

    function filterByDate(dateVal) {
      currentDateFilter = dateVal;
      renderMain();
      renderArchiveList();
    }

    // 收藏 / 取消收藏 邏輯
    function toggleBookmark(encodedId) {
      const rawId = decodeURIComponent(encodedId);
      
      // 檢查是否已在收藏清單中 (以 日期+標題 作為唯一識別碼)
      const savedIndex = savedRecords.findIndex(r => (r[0] + r[1]) === rawId);
      
      if (savedIndex > -1) {
        // 已存在 -> 取消收藏
        savedRecords.splice(savedIndex, 1);
      } else {
        // 不存在 -> 從 allRecords 中找出這筆並加入收藏
        const record = allRecords.find(r => (r[0] + r[1]) === rawId);
        if (record) savedRecords.push(record);
      }
      
      // 更新至 Local Storage 並重新渲染畫面
      localStorage.setItem('dse_bookmarks', JSON.stringify(savedRecords));
      renderMain();
    }

    function parseAIText(rawText, category) {
      let cleanText = (rawText || "").replace(/[*#]/g, ''); 
      let theme = "未分類", question = "暫無題目", paragraph = cleanText;
      
      if (category === '議論') {
        const tMatch = cleanText.match(/(?:適用主題|主題)[：:]\s*(.*?)(?=\n|$)/);
        const qMatch = cleanText.match(/(?:仿DSE題目|擬題|題目)[：:]\s*(.*?)(?=\n|$)/);
        const pMatch = cleanText.match(/(?:論述示範|示範段落|示範)[：:]\s*([\s\S]*)/);
        
        if (tMatch) theme = tMatch[1].trim();
        if (qMatch) question = qMatch[1].trim();
        if (pMatch) paragraph = pMatch[1].trim();
      } else {
        const tMatch = cleanText.match(/(?:適用情感|情感)[：:]\s*(.*?)(?=\n|$)/);
        const qMatch = cleanText.match(/(?:仿DSE擬題|擬題|題目)[：:]\s*(.*?)(?=\n|$)/);
        const pMatch = cleanText.match(/(?:選材轉化|情節設計|指導|示範)[：:]\s*([\s\S]*)/);
        
        if (tMatch) theme = tMatch[1].trim();
        if (qMatch) question = qMatch[1].trim();
        if (pMatch) paragraph = pMatch[1].trim();
      }
      return { theme, question, paragraph };
    }

    function renderMain() {
      const container = document.getElementById('main-content');
      container.innerHTML = '';

      let displayRecords = [];

      // 判斷當前是顯示「收藏」還是「一般報紙」
      if (currentCategory === '收藏') {
        displayRecords = savedRecords;
        if (currentDateFilter) displayRecords = displayRecords.filter(r => r[0] === currentDateFilter);
      } else {
        displayRecords = allRecords.filter(r => r[5] === currentCategory);
        if (currentDateFilter) displayRecords = displayRecords.filter(r => r[0] === currentDateFilter);
        else displayRecords = displayRecords.slice(0, 5);
      }

      if (displayRecords.length === 0) {
        const emptyMsg = currentCategory === '收藏' ? '📜 你的書房目前空空如也，點擊右上角書籤加入收藏吧！' : `此日期沒有「${currentCategory}」相關的紀錄。`;
        container.innerHTML = `<p class="archive-empty">${emptyMsg}</p>`;
        return;
      }

      displayRecords.forEach((row, index) => {
        const [date, rawTitle, link, aiText, imgUrl, cat] = row;
        const color = morandiColors[index % morandiColors.length];
        const { theme, question, paragraph } = parseAIText(aiText, cat);

        // 產生唯一辨識碼，供按鈕使用
        const uniqueId = date + rawTitle;
        const encodedId = encodeURIComponent(uniqueId);
        const isSaved = savedRecords.some(r => (r[0] + r[1]) === uniqueId);

        let tag = cat === '議論' ? '觀點' : '素材';
        let title = rawTitle;
        const tagMatch = rawTitle.match(/^【(.*?)】/);
        if (tagMatch) { tag = tagMatch[1]; title = rawTitle.replace(/^【.*?】/, '').trim(); }

        const imgHtml = imgUrl ? `<img src="${imgUrl}" class="article-img">` : '';
        const dropCapHtml = paragraph.length > 0 
          ? `<span class="drop-cap" style="color:${color}">${paragraph.charAt(0)}</span>${paragraph.slice(1)}`
          : paragraph;
          
        const sectionLabel = cat === '議論' ? '【論述示範】' : '【選材轉化建議】';

        // 加入極簡的 SVG 書籤按鈕
        const html = `
          <div class="article-box">
            <div class="article-header-row">
              <div class="article-meta">${date} 採集 · 分類：${cat}</div>
              <button class="bookmark-btn ${isSaved ? 'saved' : ''}" onclick="toggleBookmark('${encodedId}')" title="${isSaved ? '移除收藏' : '加入收藏'}">
                <svg viewBox="0 0 24 24">
                  <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                </svg>
              </button>
            </div>
            
            <span class="article-tag" style="background:${color}">${tag}</span>
            <a href="${link}" target="_blank" class="article-title">${title}</a>
            ${imgHtml}
            
            <div class="theme-bar" style="border-color:${color}; color:${color}">
              ${cat === '議論' ? '核心價值：' : '適用情感：'} ${theme}
            </div>
            
            <div class="question-box">${question}</div>
            
            <div class="content-body">
              <span class="content-label" style="color:${color}">${sectionLabel}</span>
              ${dropCapHtml}
            </div>
          </div>
        `;
        container.innerHTML += html;
      });
    }

    function renderArchiveList() {
      const container = document.getElementById('archive-results');
      container.innerHTML = '';

      if (!currentDateFilter) return;

      const filtered = allRecords.filter(r => r[0] === currentDateFilter);
      if (filtered.length === 0) {
        container.innerHTML = '<div class="archive-empty">該日無存檔。</div>';
        return;
      }

      filtered.forEach(row => {
        const [date, rawTitle, link, aiText, imgUrl, cat] = row;
        let title = rawTitle.replace(/^【.*?】/, '').trim();
        
        container.innerHTML += `
          <div class="archive-item">
            <span class="archive-cat">${cat}</span>
            <a href="${link}" target="_blank" class="archive-title">${title}</a>
          </div>
        `;
      });
    }
  </script>

<footer class="copyright-footer">
<p>Copyright © 2025 陳冠健. All rights reserved.</p>
</footer>

  
</body>
</html>
