<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Content Security Policy (CSP) 防護 -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://script.google.com https://script.googleusercontent.com https://*.google.com https://*.googleusercontent.com; img-src * data: blob: https://*;">
  
  <!-- 引入 Noto Serif TC (思源宋體) 與 Noto Sans TC -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">
  
  <title>素材日報 | 每日經典選讀</title>
  <style>
    :root {
      /* 經典報紙配色 */
      --bg-paper: #F4F1EA;       /* 暖米色紙質背景 */
      --bg-content: #FCFBF8;     /* 稍微提亮的閱讀區 */
      --text-main: #1C1C1C;      /* 深墨色 */
      --text-gray: #5A5A5A;      /* 鉛灰色 */
      --border-thin: 1px solid #D1CFC7;
      --border-thick: 3px solid #1C1C1C;
      --border-double: 4px double #1C1C1C;
      
      --font-serif: 'Noto Serif TC', 'PMingLiU', 'MingLiU', 'Times New Roman', serif;
      --font-sans: 'Noto Sans TC', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      
      /* 莫蘭迪點綴色 */
      --color-1: #647672; 
      --color-2: #8A4B42; /* 經典印泥紅 */
      --color-3: #586875; 
      --color-4: #6E5C53; 
    }

    body {
      font-family: var(--font-serif);
      background-color: var(--bg-paper);
      color: var(--text-main);
      margin: 0; padding: 0;
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
      background-image: radial-gradient(#e5e1d8 1px, transparent 1px);
      background-size: 32px 32px; /* 極淡的紙質紋理感 */
    }

    .container {
      max-width: 840px; 
      margin: 40px auto 80px auto;
      background: var(--bg-content);
      padding: 60px 70px;
      border: 1px solid #E0DCD1;
      box-shadow: 0 10px 30px rgba(0,0,0,0.04), inset 0 0 40px rgba(230,225,215,0.3);
      position: relative;
    }

    /* 報頭設計 */
    .masthead { 
      text-align: center; 
      margin-bottom: 30px; 
      padding-bottom: 20px;
      border-bottom: var(--border-double);
      position: relative;
    }
    .masthead-date {
      font-family: var(--font-sans);
      font-size: 13px;
      color: var(--text-gray);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
      border-bottom: var(--border-thin);
      padding-bottom: 8px;
    }
    .masthead h1 {
      font-size: clamp(40px, 6vw, 56px); 
      margin: 15px 0 5px 0;
      letter-spacing: 16px; 
      color: var(--text-main);
      font-weight: 900;
      text-indent: 16px; 
    }
    .subtitle { 
      font-family: var(--font-serif); 
      color: var(--text-gray); 
      font-size: 16px; 
      letter-spacing: 6px; 
      margin-top: 10px;
      font-style: italic;
    }

    /* 編輯室導航與工具列 */
    .editorial-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: var(--border-thick);
      padding-bottom: 12px;
      margin-bottom: 35px;
    }

    .tab-container {
      display: flex; 
      gap: 30px;
    }
    .tab-btn {
      font-family: var(--font-serif); 
      font-size: 19px; 
      background: none; border: none; cursor: pointer;
      color: var(--text-gray); padding: 5px 0;
      position: relative;
      transition: color 0.3s;
    }
    .tab-btn::after {
      content: ''; position: absolute; bottom: -15px; left: 0; width: 100%; height: 3px;
      background-color: var(--text-main); transform: scaleX(0); transition: transform 0.3s ease;
    }
    .tab-btn.active { color: var(--text-main); font-weight: 700; }
    .tab-btn.active::after { transform: scaleX(1); }
    .tab-btn:hover { color: var(--text-main); }

    /* SVG 工具列 */
    .tools-container { display: flex; gap: 20px; align-items: center; }
    .tool-icon {
      position: relative; color: var(--text-gray); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.3s ease;
    }
    .tool-icon:hover { color: var(--text-main); }
    .tool-icon svg {
      width: 20px; height: 20px; fill: none; stroke: currentColor;
      stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
    }
    .date-picker-overlay {
      position: absolute; left: 0; top: 0; width: 100%; height: 100%;
      opacity: 0; cursor: pointer;
    }
    .search-wrapper { display: flex; align-items: center; position: relative; }
    .search-input {
      width: 0; border: none; border-bottom: 1px solid transparent; background: transparent; padding: 0;
      font-family: var(--font-serif); font-size: 15px; color: var(--text-main);
      outline: none; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: absolute; right: 25px;
    }
    .search-input.active { width: 160px; padding: 2px 5px; border-bottom-color: var(--text-main); }

    /* 文藝風狀態提示與墨跡進度條 */
    .literary-status {
      text-align: center; font-family: var(--font-serif); font-size: 15px;
      color: var(--text-gray); margin-bottom: 15px; font-style: italic;
      letter-spacing: 2px; min-height: 25px; transition: opacity 0.3s ease;
    }
    
    .progress-wrapper {
      width: 100%; height: 2px; background: transparent;
      margin: 0 auto 40px auto; position: relative; overflow: hidden;
      opacity: 0; transition: opacity 0.4s ease;
    }
    .progress-wrapper.active { opacity: 1; }
    .progress-ink {
      height: 100%; width: 0%; background: var(--text-main);
      box-shadow: 0 0 8px rgba(28, 28, 28, 0.5); 
      transition: width 0.1s linear;
    }

    /* ================= 文章排版 ================= */
    .article-box {
      margin-bottom: 60px; padding-bottom: 50px;
      position: relative;
      scroll-margin-top: 40px; /* 給予平滑跳轉時上方緩衝空間 */
      border-radius: 4px;
    }
    /* 復古分隔線 */
    .article-box::after {
      content: '◆'; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      font-size: 12px; color: #CCC; letter-spacing: 20px; padding-left: 20px;
    }
    .article-box::before {
      content: ''; position: absolute; bottom: 7px; left: 20%; right: 20%;
      height: 1px; background: #E0DCD1;
    }
    .article-box:last-child::after, .article-box:last-child::before { display: none; }

    .article-meta-row {
      display: flex; justify-content: space-between; align-items: center; 
      margin-bottom: 15px; font-family: var(--font-sans); font-size: 13px; 
      color: var(--text-gray); border-bottom: 1px solid #EAEAEA; padding-bottom: 8px;
    }
    
    .bookmark-btn {
      background: none; border: none; cursor: pointer; color: #CCC; padding: 0; 
      display: inline-flex; align-items: center; transition: all 0.3s ease; outline: none;
    }
    .bookmark-btn:hover { color: var(--text-main); transform: scale(1.1); }
    .bookmark-btn.saved { color: var(--color-2); } 
    .bookmark-btn svg {
      width: 20px; height: 20px; fill: none; stroke: currentColor;
      stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
    }
    .bookmark-btn.saved svg { fill: currentColor; }

    /* ================= 剪報精緻 CSS 動畫 ================= */
    /* 主體：紙張下壓 -> 懸浮傾斜 -> 歸位 */
    @keyframes paperLiftEffect {
      0% { transform: scale(1) translateY(0); box-shadow: none; filter: brightness(1); }
      15% { transform: scale(0.99) translateY(2px); filter: brightness(0.97); }
      50% { transform: scale(1.02) translateY(-6px) rotate(-0.5deg); box-shadow: 0 15px 35px rgba(0,0,0,0.08), 0 5px 15px rgba(0,0,0,0.04); filter: brightness(1.02); }
      80% { transform: scale(1) translateY(1px) rotate(0.2deg); box-shadow: 0 5px 10px rgba(0,0,0,0.03); }
      100% { transform: scale(1) translateY(0) rotate(0); box-shadow: none; filter: brightness(1); }
    }
    /* 裁切軌跡：虛線框瞬間畫出並消散 */
    @keyframes scissorCutTrace {
      0% { clip-path: inset(0 100% 0 0); opacity: 0; }
      20% { clip-path: inset(0 0 0 0); opacity: 1; }
      70% { opacity: 1; transform: scale(1.01); }
      100% { opacity: 0; transform: scale(1.04); }
    }
    .clip-anim {
      animation: paperLiftEffect 0.9s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
      z-index: 10;
    }
    .clip-anim::after {
      content: ''; position: absolute;
      top: -10px; left: -10px; right: -10px; bottom: -10px;
      border: 2px dashed var(--color-2); border-radius: 4px;
      pointer-events: none; opacity: 0;
      animation: scissorCutTrace 0.9s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
      z-index: 11;
    }

    /* 從列表跳轉時的高光閃動特效 */
    @keyframes highlightFlash {
      0% { background-color: transparent; box-shadow: 0 0 0 0 transparent; }
      20% { background-color: #EFEBE0; box-shadow: 0 0 0 15px #EFEBE0; }
      100% { background-color: transparent; box-shadow: 0 0 0 0 transparent; }
    }
    .highlight-flash {
      animation: highlightFlash 1.5s ease-out forwards;
    }

    .article-header { margin-bottom: 25px; }
    
    .article-tag { 
      display: inline-block; font-family: var(--font-serif); font-size: 13px; 
      color: var(--text-main); padding: 2px 8px; border: 1px solid var(--text-main); 
      margin-bottom: 12px; font-weight: 600; letter-spacing: 2px;
    }
    
    .article-title {
      font-size: 32px; font-weight: 900; margin: 0; line-height: 1.3;
      color: var(--text-main); text-decoration: none; display: block;
      transition: opacity 0.3s;
    }
    .article-title:hover { opacity: 0.7; }

    .article-img {
      width: 100%; max-height: 400px; object-fit: cover; 
      margin-bottom: 25px; border: 1px solid #D1CFC7; padding: 4px;
      background-color: #FFF; 
      filter: sepia(0.2) contrast(0.95); 
      transition: filter 0.5s ease;
    }
    .article-img:hover { filter: sepia(0) contrast(1); }

    /* ==== 探討主題與擬題區塊 ==== */
    .theme-bar {
      font-family: var(--font-serif); font-weight: bold; font-size: 16px;
      padding: 12px 18px; margin-bottom: 20px; border-left: 6px solid;
      background: #EAE6D9; /* 稍微深一點的紙張色，凸顯層次 */
      letter-spacing: 1px; color: var(--text-main);
    }
    
    .question-box {
      font-family: var(--font-serif); font-size: 21px; font-weight: normal; 
      color: var(--text-main); margin-bottom: 30px; padding: 18px 20px; 
      border: 1px solid #D1CFC7; text-align: left; background: transparent; 
      line-height: 1.6;
    }

    /* 內文排版 */
    .content-label {
      font-weight: bold; font-family: var(--font-serif); letter-spacing: 1px;
      display: block; margin-bottom: 15px; font-size: 16px;
    }
    
    .content-body { 
      font-size: 17px; text-align: justify; line-height: 2.1; color: #2C2C2C;
      text-justify: inter-ideograph;
    }

    /* 首字放大：經典報紙排版 */
    .drop-cap {
      float: left; font-size: 4.2em; line-height: 0.8;
      padding: 8px 12px 0 0; font-weight: 900; color: var(--text-main);
      font-family: var(--font-serif);
    }

    .archive-empty { color: var(--text-gray); font-style: italic; font-size: 16px; text-align: center; margin-top: 60px; letter-spacing: 1px;}
    .hidden { display: none !important; }

    /* ================= 頁底素材清單區塊 (基礎佈局) ================= */
    .recommend-section {
      margin-top: 60px;
      border-top: var(--border-double);
      padding-top: 40px;
      display: none; /* 預設隱藏，由 JS 控制顯示 */
    }
    .recommend-header {
      font-family: var(--font-serif);
      font-size: 24px;
      font-weight: 900;
      margin-bottom: 25px;
      letter-spacing: 4px;
      text-align: center;
      transition: color 0.3s ease;
    }
    .recommend-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .recommend-item {
      padding: 20px;
      border: 1px solid;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: block;
      position: relative;
    }
    .recommend-item-meta {
      font-family: var(--font-sans);
      font-size: 13px;
      color: var(--text-gray);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .recommend-item-title {
      font-family: var(--font-serif);
      font-size: 20px;
      font-weight: 700;
      color: var(--text-main);
      margin: 0;
      line-height: 1.4;
    }

    /* ======== 莫蘭迪雙色系：昨日 vs 今日 ======== */
    /* 1. 昨日素材 (莫蘭迪灰藍色調 - 沉穩、過去) */
    .theme-yesterday .recommend-header { color: #5A6B6E; }
    .theme-yesterday .recommend-item { background: #F0F3F4; border-color: #D5DCDD; }
    .theme-yesterday .recommend-item:hover { background: #E2E8E9; border-color: #889CA0; transform: translateX(5px); }

    /* 2. 今日素材 (莫蘭迪暖褐粉調 - 溫暖、當下) */
    .theme-today .recommend-header { color: #8A6B66; }
    .theme-today .recommend-item { background: #F8F2F1; border-color: #E2D5D3; }
    .theme-today .recommend-item:hover { background: #EBE0DE; border-color: #A48581; transform: translateX(5px); }

    /* RWD 響應式 */
    @media (max-width: 768px) {
      .container { padding: 40px 25px; margin: 0; border: none; box-shadow: none; }
      .masthead h1 { font-size: 36px; letter-spacing: 10px; text-indent: 10px;}
      .masthead-date { font-size: 11px; }
      .editorial-bar { flex-direction: column; gap: 20px; align-items: stretch; border-bottom: none;}
      .tab-container { justify-content: space-between; border-bottom: var(--border-thick); padding-bottom: 10px;}
      .tools-container { justify-content: flex-end; }
      .search-input.active { width: 130px; }
      .article-title { font-size: 26px; }
      .question-box { font-size: 19px; padding: 15px; }
      .content-body { font-size: 16px; line-height: 1.9;}
      .recommend-item-title { font-size: 18px; }
    }

    /* 用戶指定的 Footer 樣式 */
    .copyright-footer { position: fixed; bottom: 0; right: 0; padding: 5px 10px; background-color: #f1f1f1; z-index: 1000; }
    .copyright-footer p { margin: 0; font-size: 14px; }
    @media (max-width: 600px) { .copyright-footer p { font-size: 12px; } }
  </style>
</head>
<body>

  <div class="container">
    <header class="masthead">
      <div class="masthead-date">
        <span id="display-date">DAILY EDITION</span>
        <span>SANSI</span>
      </div>
      <h1>素材日報</h1>
      <div class="subtitle">每日更新 · 議論典故 · 抒情選材</div>
    </header>

    <!-- 編輯室導航與工具列 -->
    <div class="editorial-bar">
      <div class="tab-container" id="tabs">
        <button class="tab-btn active" id="tab-議論" onclick="switchTab('議論')">議論文</button>
        <button class="tab-btn" id="tab-抒情" onclick="switchTab('抒情')">敘事抒情</button>
        <button class="tab-btn" id="tab-收藏" onclick="switchTab('收藏')">我的剪報</button>
      </div>

      <div class="tools-container">
        <!-- 搜尋 -->
        <div class="search-wrapper" id="search-wrapper">
          <input type="text" id="search-input" class="search-input" placeholder="檢索庫藏..." oninput="handleRealTimeSearch(event)">
          <div class="tool-icon" onclick="toggleSearch()" title="展開檢索">
            <svg viewBox="0 0 24 24">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
          </div>
        </div>
        
        <!-- 日曆 -->
        <div class="tool-icon" title="昔日報刊">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
          </svg>
          <input type="date" id="date-picker" class="date-picker-overlay" onchange="filterByDate(this.value)">
        </div>
      </div>
    </div>

    <!-- 文藝風狀態提示與墨跡進度條 -->
    <div id="status-area" class="literary-status"></div>
    <div class="progress-wrapper" id="progress-wrapper">
      <div class="progress-ink" id="progress-ink"></div>
    </div>

    <div id="content-area" class="hidden">
      <main id="main-content"></main>
      
      <!-- 頁底推薦閱讀區塊 (昨日/今日素材列表) -->
      <div id="recommend-section" class="recommend-section">
        <div id="recommend-header" class="recommend-header">昨日素材</div>
        <div id="recommend-list" class="recommend-list"></div>
      </div>
    </div>
  </div>

  <footer class="copyright-footer">
    <p>Copyright © 2026 陳冠健. All rights reserved.</p>
  </footer>

  <script>
    // ==========================================
    // 【GAS API 網址設定】
    // ==========================================
    const API_URL = "https://script.google.com/macros/s/AKfycbzzzXgxRR2lVa2qknKHSTX9DRNpk-xtPCit9yZHFBLGvF2g1ClRiLPoHVQ2HgmO8eDF/exec";

    const accentColors = ['var(--color-1)', 'var(--color-2)', 'var(--color-3)', 'var(--color-4)'];
    let allRecords = [];
    let currentCategory = '議論';
    let currentDateFilter = null; 
    let currentSearchKeyword = "";
    let searchTimeout = null; 
    let progressInterval = null;
    
    // 用於記錄資料庫中最新(今日)與次新(昨日)的實質日期字串
    let dbTodayStr = "";
    let dbYesterdayStr = "";
    
    let savedRecords = JSON.parse(localStorage.getItem('dse_bookmarks')) || [];

    // 取得日曆所需的格式
    function getLocalDateStr(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    window.onload = function() {
      // 解除昨日限制：現在用戶可以自由在日曆上點選真正的「今日」
      const todayDate = new Date();
      document.getElementById('date-picker').max = getLocalDateStr(todayDate);

      const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
      document.getElementById('display-date').innerText = todayDate.toLocaleDateString('zh-HK', options);

      updateStatus("主編正在排版中...");
      startProgress();
      fetchData(""); 
    };

    function toggleSearch() {
      const input = document.getElementById('search-input');
      input.classList.toggle('active');
      if (input.classList.contains('active')) {
        input.focus();
      }
    }

    // 實時進度條：墨跡動畫控制
    function startProgress() {
      const wrapper = document.getElementById('progress-wrapper');
      const ink = document.getElementById('progress-ink');
      wrapper.classList.add('active');
      ink.style.transition = 'none';
      ink.style.width = '0%';
      
      setTimeout(() => {
        ink.style.transition = 'width 0.2s ease-out';
        let width = 0;
        clearInterval(progressInterval);
        progressInterval = setInterval(() => {
          width += (90 - width) * 0.08; 
          ink.style.width = width + '%';
        }, 100);
      }, 50);
    }

    function finishProgress() {
      clearInterval(progressInterval);
      const wrapper = document.getElementById('progress-wrapper');
      const ink = document.getElementById('progress-ink');
      ink.style.transition = 'width 0.3s ease-in';
      ink.style.width = '100%'; 
      setTimeout(() => {
        wrapper.classList.remove('active'); 
      }, 400);
    }

    function hideProgress() {
      clearInterval(progressInterval);
      document.getElementById('progress-wrapper').classList.remove('active');
    }

    function updateStatus(message) {
      document.getElementById('status-area').innerHTML = message;
    }

    // 實時全庫檢索邏輯
    function handleRealTimeSearch(event) {
      const keyword = event.target.value.trim();
      currentSearchKeyword = keyword; 
      
      clearTimeout(searchTimeout);

      if (keyword === "") {
        updateStatus("");
        hideProgress();
        currentDateFilter = null; 
        switchTab(currentCategory);
        document.getElementById('content-area').classList.add('hidden');
        startProgress();
        fetchData("");
        return;
      }

      updateStatus(`「${keyword}」—— 檔案室檢索中...`);
      document.getElementById('content-area').classList.add('hidden');
      startProgress();

      searchTimeout = setTimeout(() => {
        fetchData(keyword);
      }, 800);
    }

    function fetchData(keyword) {
      const targetUrl = keyword ? API_URL + "?keyword=" + encodeURIComponent(keyword) : API_URL;

      fetch(targetUrl, { method: 'GET', redirect: 'follow' })
      .then(response => {
        if (!response.ok) throw new Error(`伺服器回應錯誤`);
        return response.json();
      })
      .then(data => initData(data.data || data, keyword)) 
      .catch(error => {
        hideProgress();
        updateStatus(`<span style="color:red;">印刷中斷：${error.message}</span>`);
      });
    }

    function initData(records, keyword) {
      allRecords = records;
      
      // 動態抓取資料庫中真實存在的日期
      if (allRecords.length > 0) {
        const availableDates = [...new Set(allRecords.map(r => r[0]))].sort((a,b) => b.localeCompare(a));
        dbTodayStr = availableDates[0] || "";
        dbYesterdayStr = availableDates[1] || availableDates[0] || ""; 
      }
      
      finishProgress();
      updateStatus(""); 
      document.getElementById('content-area').classList.remove('hidden');
      
      if (keyword) {
        currentDateFilter = null;
        document.getElementById('date-picker').value = '';
      } else if (allRecords.length > 0) {
        if (!currentDateFilter) {
          currentDateFilter = dbTodayStr; 
          document.getElementById('date-picker').value = dbTodayStr; // 預設顯示真正的最新日期
        } else {
          document.getElementById('date-picker').value = currentDateFilter;
        }
      }
      
      renderMain();
    }

    function switchTab(category) {
      currentCategory = category;
      currentSearchKeyword = document.getElementById('search-input').value.trim();
      
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      const activeBtn = document.getElementById('tab-' + category);
      if(activeBtn) activeBtn.classList.add('active');
      
      if (category === '收藏') {
        currentDateFilter = null;
        document.getElementById('date-picker').value = '';
      }
      
      renderMain();
    }

    // 日期過濾
    function filterByDate(dateVal) {
      currentDateFilter = dateVal;

      if (currentSearchKeyword !== "") {
        document.getElementById('search-input').value = "";
        currentSearchKeyword = "";
        currentCategory = '議論'; 
        
        document.getElementById('content-area').classList.add('hidden');
        startProgress();
        updateStatus("正在調閱該日報刊...");
        fetchData(""); 
        return;
      }
      
      if (currentCategory === '收藏') {
        switchTab('議論');
      } else {
        renderMain();
      }
    }

    // 點擊清單跳轉到特定日子的素材，並平滑捲動到該文章位置
    function viewSpecificDate(dateStr, category, targetId) {
      document.getElementById('date-picker').value = dateStr;
      currentDateFilter = dateStr;
      
      // 切換分頁 (switchTab 內部會自動呼叫 renderMain)
      if (category) {
        switchTab(category); 
      } else {
        renderMain();
      }
      
      // 確保 DOM 渲染完畢後，執行平滑捲動與高光效果
      if (targetId) {
        setTimeout(() => {
          const targetEl = document.getElementById(`article-${targetId}`);
          if (targetEl) {
            targetEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
            // 添加高光閃動效果
            targetEl.classList.add('highlight-flash');
            setTimeout(() => {
              targetEl.classList.remove('highlight-flash');
            }, 1500);
          }
        }, 100);
      } else {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    // 收藏/移除，並觸發「剪報」動畫
    function toggleBookmark(encodedId, btnElement) {
      const rawId = decodeURIComponent(encodedId);
      const savedIndex = savedRecords.findIndex(r => (r[0] + r[1]) === rawId);
      
      if (savedIndex > -1) {
        savedRecords.splice(savedIndex, 1);
        localStorage.setItem('dse_bookmarks', JSON.stringify(savedRecords));
        renderMain();
      } else {
        const record = allRecords.find(r => (r[0] + r[1]) === rawId);
        if (record) {
          savedRecords.push(record);
          localStorage.setItem('dse_bookmarks', JSON.stringify(savedRecords));
          
          if (btnElement) {
            const articleBox = btnElement.closest('.article-box');
            if (articleBox) {
              articleBox.classList.add('clip-anim');
              // 等待剪報動畫結束後再重新渲染頁面 (更新按鈕的書籤實心狀態)
              setTimeout(() => {
                renderMain(); 
              }, 950); 
              return; 
            }
          }
          renderMain();
        }
      }
    }

    function parseAIText(rawText) {
      let cleanText = (rawText || "").replace(/[*#]/g, ''); 
      let theme = "未分類", question = "暫無題目", paragraph = cleanText;
      
      const tMatch = cleanText.match(/(?:適用主題|適用情感|主題|情感)[：:]\s*(.*?)(?=\n|$)/);
      const qMatch = cleanText.match(/(?:仿DSE題目|仿DSE擬題|擬題|題目)[：:]\s*(.*?)(?=\n|$)/);
      const pMatch = cleanText.match(/(?:論述示例|選材轉化|情節設計|示範段落|示範|指導)[：:]\s*([\s\S]*)/);
      
      if (tMatch) theme = tMatch[1].trim();
      if (qMatch) question = qMatch[1].trim();
      if (pMatch) paragraph = pMatch[1].trim();

      return { theme, question, paragraph };
    }

    // 提取第一個有效文字作為 Drop Cap
    function generateDropCapHtml(text, color) {
      if(!text) return "";
      let firstChar = "";
      let remainingText = "";
      
      const match = text.match(/^[\s\S]*?([\u4e00-\u9fa5a-zA-Z])/);
      if(match){
        const index = text.indexOf(match[1]);
        firstChar = text.substring(0, index + 1); 
        remainingText = text.substring(index + 1);
        return `<span class="drop-cap" style="color:${color}">${firstChar}</span>${remainingText}`;
      }
      return text;
    }

    function renderMain() {
      const container = document.getElementById('main-content');
      container.innerHTML = '';

      let displayRecords = [];

      if (currentSearchKeyword) {
        displayRecords = allRecords; 
      } else if (currentCategory === '收藏') {
        displayRecords = savedRecords;
        if (currentDateFilter) {
          displayRecords = displayRecords.filter(r => r[0] === currentDateFilter);
        }
      } else {
        displayRecords = allRecords.filter(r => r[5] === currentCategory);
        if (currentDateFilter) {
          displayRecords = displayRecords.filter(r => r[0] === currentDateFilter);
        }
      }

      // 文章區域渲染
      if (displayRecords.length === 0) {
        let emptyMsg = `今日報刊尚無此類文章。`;
        if (currentSearchKeyword) emptyMsg = `檔案室查無「${currentSearchKeyword}」相關卷宗。`;
        else if (currentCategory === '收藏') emptyMsg = '✂️ 你的剪報目前空空如也，點擊文章右上角書籤加入收藏。';
        
        container.innerHTML = `<p class="archive-empty">${emptyMsg}</p>`;
      } else {
        displayRecords.forEach((row, index) => {
          const [date, rawTitle, link, aiText, imgUrl, cat] = row;
          const color = accentColors[index % accentColors.length]; 
          const { theme, question, paragraph } = parseAIText(aiText);

          const uniqueId = date + rawTitle;
          const encodedId = encodeURIComponent(uniqueId);
          const isSaved = savedRecords.some(r => (r[0] + r[1]) === uniqueId);

          let tag = cat === '議論' ? '觀點' : '素材';
          let title = rawTitle;
          const tagMatch = rawTitle.match(/^【(.*?)】/);
          if (tagMatch) { tag = tagMatch[1]; title = rawTitle.replace(/^【.*?】/, '').trim(); }

          const fallbackImg = 'https://upload.wikimedia.org/wikipedia/commons/thumb/a/ac/No_image_available.svg/600px-No_image_available.svg.png';
          const imgHtml = imgUrl 
            ? `<img src="${imgUrl}" class="article-img" onerror="this.onerror=null; this.src='${fallbackImg}';">` 
            : '';

          let formattedParagraph = paragraph.replace(/\n+/g, '<br><br>');
          const dropCapHtml = generateDropCapHtml(formattedParagraph, color);
            
          const sectionLabel = cat === '議論' ? '【論述示例】' : '【選材轉化建議】';

          const html = `
            <div class="article-box" id="article-${encodedId}">
              <div class="article-meta-row">
                <span>採集日期：${date} ｜ 專欄：${cat}</span>
                <button class="bookmark-btn ${isSaved ? 'saved' : ''}" onclick="toggleBookmark('${encodedId}', this)" title="${isSaved ? '移除剪報' : '加入剪報'}">
                  <svg viewBox="0 0 24 24">
                    <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                  </svg>
                </button>
              </div>
              
              <div class="article-header">
                <span class="article-tag" style="border-color:${color}; color:${color}">${tag}</span>
                <a href="${link}" target="_blank" class="article-title">${title}</a>
              </div>
              
              ${imgHtml}
              
              <div class="theme-bar" style="border-left-color:${color}; color:${color}">
                ${theme}
              </div>
              
              <div class="question-box">${question}</div>
              
              <div class="content-body">
                <span class="content-label" style="color:${color}">${sectionLabel}</span>
                ${dropCapHtml}
              </div>
            </div>
          `;
          container.innerHTML += html;
        });
      }

      // -----------------------------------------------------------
      // 處理頁底的推薦閱讀清單 (昨日/今日素材) 搭配莫蘭迪色系
      // -----------------------------------------------------------
      const recommendSection = document.getElementById('recommend-section');
      const recommendHeader = document.getElementById('recommend-header');
      const recommendList = document.getElementById('recommend-list');

      // 搜尋狀態或是收藏分頁時，隱藏推薦區塊
      if (currentSearchKeyword !== "" || currentCategory === '收藏') {
        recommendSection.style.display = 'none';
      } else {
        recommendSection.style.display = 'block';
        let targetDate = "";
        let headerText = "";

        // 判斷當前是今日還是其他日子
        const isToday = (!currentDateFilter || currentDateFilter === dbTodayStr);

        // 賦予不同的莫蘭迪色系 Class
        if (isToday) {
          targetDate = dbYesterdayStr;
          headerText = "昨日素材";
          recommendSection.className = "recommend-section theme-yesterday";
        } else {
          targetDate = dbTodayStr;
          headerText = "今日素材";
          recommendSection.className = "recommend-section theme-today";
        }

        if (targetDate) {
          recommendHeader.innerText = headerText;
          
          // 篩選出目標日期的所有文章
          const recRecords = allRecords.filter(r => r[0] === targetDate);

          if (recRecords.length > 0) {
            let recHtml = '';
            recRecords.forEach((row, index) => {
              const [date, rawTitle, link, aiText, imgUrl, cat] = row;
              let tag = cat === '議論' ? '觀點' : '素材';
              let title = rawTitle;
              const tagMatch = rawTitle.match(/^【(.*?)】/);
              if (tagMatch) { tag = tagMatch[1]; title = rawTitle.replace(/^【.*?】/, '').trim(); }
              const color = accentColors[index % accentColors.length];
              
              // 取得文章專屬 ID
              const uniqueId = date + rawTitle;
              const encodedId = encodeURIComponent(uniqueId);

              // 點擊事件：跳轉日期、切換標籤並平滑捲動到該文章 ID 位置
              recHtml += `
                <div class="recommend-item" onclick="viewSpecificDate('${targetDate}', '${cat}', '${encodedId}')">
                  <div class="recommend-item-meta">
                     <span class="article-tag" style="border-color:${color}; color:${color}; padding: 1px 6px; font-size: 11px; margin-bottom: 0;">${tag}</span>
                     <span>｜ 專欄：${cat}</span>
                  </div>
                  <h3 class="recommend-item-title">${title}</h3>
                </div>
              `;
            });
            recommendList.innerHTML = recHtml;
          } else {
            recommendList.innerHTML = `<p style="text-align:center; color: var(--text-gray); font-size: 15px; font-style: italic;">該日暫無素材。</p>`;
          }
        } else {
          recommendSection.style.display = 'none';
        }
      }
    }
  </script>
</body>
</html>
