<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Content Security Policy (CSP) 防護 -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://script.google.com https://script.googleusercontent.com https://*.google.com https://*.googleusercontent.com; img-src * data: blob:;">
  
  <!-- 引入 Noto Serif TC 字體 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
  
  <title>素材日報</title>
  <style>
    :root {
      var(--bg-paper): #F5F3ED;
      --bg-paper: #F5F3ED;
      --bg-content: #FCFBF9;
      --text-main: #2C2C2C;
      --text-gray: #6B6B6B;
      --border-thin: 1px solid #D6D2C4;
      --border-thick: 2px solid #3A4042;
      
      --font-serif: 'Noto Serif TC', 'PMingLiU', 'MingLiU', 'Times New Roman', serif;
      --font-sans: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      
      --color-1: #647672; 
      --color-2: #866B64; 
      --color-3: #586875; 
      --color-4: #8B7E74; 
    }

    body {
      font-family: var(--font-serif);
      background-color: var(--bg-paper);
      color: var(--text-main);
      margin: 0; padding: 0;
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 800px; margin: 40px auto 80px auto;
      background: var(--bg-content);
      padding: 50px 60px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.03);
      border-radius: 4px;
    }

    .masthead { text-align: center; margin-bottom: 40px; }
    .masthead h1 {
      font-size: clamp(36px, 5vw, 48px); margin: 0;
      letter-spacing: 12px; color: var(--text-main);
      font-weight: normal;
    }
    .subtitle { 
      font-family: var(--font-sans); color: var(--text-gray); 
      font-size: 15px; letter-spacing: 4px; margin-top: 15px; 
    }

    /* 導航列 */
    .tab-container {
      display: flex; justify-content: center; gap: 40px;
      margin-bottom: 25px; border-bottom: var(--border-thick); padding-bottom: 0;
    }
    .tab-btn {
      font-family: var(--font-serif); font-size: 22px; 
      background: none; border: none; cursor: pointer;
      color: var(--text-gray); padding: 10px 15px;
      margin-bottom: -2px; 
      border-bottom: 3px solid transparent;
      transition: all 0.3s;
    }
    .tab-btn.active { 
      color: var(--color-2); 
      border-bottom: 3px solid var(--color-2); 
      font-weight: bold;
    }
    .tab-btn:hover { color: var(--color-1); }

    /* SVG 工具列 */
    .tools-container {
      display: flex; justify-content: center; align-items: center; gap: 30px;
      margin-bottom: 30px; height: 35px;
    }
    .tool-icon {
      position: relative; color: #A0A0A0; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.3s ease;
    }
    .tool-icon:hover { color: var(--text-main); }
    .tool-icon svg {
      width: 22px; height: 22px; fill: none; stroke: currentColor;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    .date-picker-overlay {
      position: absolute; left: 0; top: 0; width: 100%; height: 100%;
      opacity: 0; cursor: pointer;
    }

    .search-wrapper {
      display: flex; align-items: center; border-bottom: 1px solid transparent;
      transition: border-color 0.4s ease;
    }
    .search-wrapper.active { border-bottom-color: var(--text-main); }
    .search-input {
      width: 0; border: none; background: transparent; padding: 0;
      font-family: var(--font-serif); font-size: 16px; color: var(--text-main);
      outline: none; transition: width 0.4s ease, padding 0.4s ease;
    }
    .search-input.active { width: 180px; padding: 0 10px; }

    /* 文藝風狀態提示與墨跡進度條 */
    .literary-status {
      text-align: center; font-family: var(--font-serif); font-size: 16px;
      color: var(--color-2); margin-bottom: 10px; font-style: italic;
      letter-spacing: 1px; min-height: 25px; transition: opacity 0.3s ease;
    }
    
    .progress-wrapper {
      width: 100%; max-width: 280px; height: 1px;
      background: rgba(134, 107, 100, 0.15); /* 淺莫蘭迪褐 */
      margin: 0 auto 35px auto; position: relative; overflow: hidden;
      opacity: 0; transition: opacity 0.4s ease;
    }
    .progress-wrapper.active { opacity: 1; }
    
    .progress-ink {
      height: 100%; width: 0%; background: var(--color-2);
      box-shadow: 0 0 4px var(--color-2); /* 微光墨暈效果 */
      transition: width 0.15s linear;
    }

    /* ================= 文章排版 ================= */
    .article-box {
      margin-bottom: 60px; padding-bottom: 40px; border-bottom: 1px dashed #CCC;
    }
    .article-box:last-child { border-bottom: none; }

    .article-header-row {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;
    }
    .article-meta { font-family: var(--font-sans); font-size: 13px; color: var(--text-gray); }
    
    .bookmark-btn {
      background: none; border: none; cursor: pointer;
      color: #C0C0C0; padding: 0; display: inline-flex; align-items: center;
      transition: all 0.25s ease; outline: none;
    }
    .bookmark-btn:hover { color: var(--text-main); transform: translateY(-2px); }
    .bookmark-btn.saved { color: var(--color-2); }
    .bookmark-btn svg {
      width: 24px; height: 24px; fill: none; stroke: currentColor;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }
    .bookmark-btn.saved svg { fill: currentColor; }

    .article-tag { 
      padding: 4px 10px; color: white; font-size: 13px; 
      font-family: var(--font-sans); margin-right: 12px; border-radius: 2px; 
      vertical-align: middle;
    }
    
    .article-title {
      font-size: 28px; font-weight: bold; margin: 0 0 25px 0;
      color: var(--text-main); text-decoration: none; display: inline-block;
      vertical-align: middle;
    }
    .article-title:hover { text-decoration: underline; }

    .article-img {
      width: 100%; max-height: 450px; object-fit: cover; background-color: #eee;
      margin-bottom: 25px; border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .theme-bar {
      font-family: var(--font-serif); font-weight: bold; font-size: 16px;
      padding: 12px 18px; margin-bottom: 20px; border-left: 6px solid;
      background: #F4F4F4; letter-spacing: 1px; color: var(--text-main);
    }
    
    .question-box {
      font-family: var(--font-serif); font-size: 21px; font-weight: normal; 
      color: var(--text-main); margin-bottom: 25px; padding: 18px 20px; 
      border: 1px solid #D6D2C4; text-align: left; background: transparent; 
      line-height: 1.6;
    }
    
    .content-label {
      font-weight: bold; font-family: var(--font-serif); 
      display: block; margin-bottom: 10px; font-size: 16px;
    }
    
    .content-body { font-size: 18px; text-align: justify; line-height: 1.9; color: #333;}

    .drop-cap {
      float: left; font-size: 3.8em; line-height: 0.8;
      padding-top: 6px; padding-right: 10px; font-weight: bold;
    }

    .archive-empty { color: #888; font-style: italic; font-size: 15px; text-align: center; margin-top: 40px;}
    .hidden { display: none !important; }

    /* RWD 響應式 */
    @media (max-width: 700px) {
      .container { padding: 30px 20px; margin: 0; border-radius: 0; }
      .tab-btn { font-size: 18px; padding: 8px 10px; }
      .tab-container { gap: 15px; }
      .search-input.active { width: 130px; }
      .article-title { font-size: 24px; display: block; margin-top: 10px;}
      .question-box { font-size: 19px; padding: 15px; }
    }

    .copyright-footer {
        position: fixed; bottom: 0; right: 0;
        padding: 5px 10px; background-color: rgba(241, 241, 241, 0.9);
    }
    .copyright-footer p { margin: 0; font-size: 13px; font-family: var(--font-sans); color: #888;}
    @media (max-width: 600px) { .copyright-footer p { font-size: 11px; } }
  </style>
</head>
<body>

  <div class="container">
    <header class="masthead">
      <h1>素材日報</h1>
      <div class="subtitle">每日更新 · 議論典故 · 抒情選材</div>
    </header>

    <!-- 頂部導航列 -->
    <div class="tab-container" id="tabs">
      <button class="tab-btn active" id="tab-議論" onclick="switchTab('議論')">議論文</button>
      <button class="tab-btn" id="tab-抒情" onclick="switchTab('抒情')">敘事抒情</button>
      <button class="tab-btn" id="tab-收藏" onclick="switchTab('收藏')">我的收藏</button>
    </div>

    <!-- SVG 工具列 -->
    <div class="tools-container">
      
      <!-- 昔日素材 -->
      <div class="tool-icon" title="昔日素材">
        <svg viewBox="0 0 24 24">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="16" y1="2" x2="16" y2="6"></line>
          <line x1="8" y1="2" x2="8" y2="6"></line>
          <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
        <input type="date" id="date-picker" class="date-picker-overlay" onchange="filterByDate(this.value)">
      </div>

      <!-- 檢索 -->
      <div class="search-wrapper" id="search-wrapper">
        <div class="tool-icon" onclick="toggleSearch()" title="展開檢索">
          <svg viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </div>
        <input type="text" id="search-input" class="search-input" oninput="handleRealTimeSearch(event)">
      </div>

    </div>

    <!-- 文藝風狀態提示與墨跡進度條 -->
    <div id="status-area" class="literary-status"></div>
    <div class="progress-wrapper" id="progress-wrapper">
      <div class="progress-ink" id="progress-ink"></div>
    </div>

    <div id="content-area" class="hidden">
      <main id="main-content"></main>
    </div>
  </div>

  <footer class="copyright-footer">
    <p>Copyright © 2025 陳冠健. All rights reserved.</p>
  </footer>

  <script>
    // ==========================================
    // 【GAS API 網址設定】
    // ==========================================
    const API_URL = "https://script.google.com/macros/s/AKfycbzzzXgxRR2lVa2qknKHSTX9DRNpk-xtPCit9yZHFBLGvF2g1ClRiLPoHVQ2HgmO8eDF/exec";

    const morandiColors =['var(--color-1)', 'var(--color-2)', 'var(--color-3)', 'var(--color-4)'];
    let allRecords =[];
    let currentCategory = '議論';
    let currentDateFilter = null; 
    let currentSearchKeyword = "";
    let searchTimeout = null; 
    let progressInterval = null;
    
    let savedRecords = JSON.parse(localStorage.getItem('dse_bookmarks')) ||[];

    window.onload = function() {
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('date-picker').max = today;
      updateStatus("正在讀取...");
      startProgress();
      fetchData(""); 
    };

    function toggleSearch() {
      const wrapper = document.getElementById('search-wrapper');
      const input = document.getElementById('search-input');
      wrapper.classList.toggle('active');
      input.classList.toggle('active');
      if (input.classList.contains('active')) {
        input.focus();
      }
    }

    // 實時進度條：墨跡動畫控制
    function startProgress() {
      const wrapper = document.getElementById('progress-wrapper');
      const ink = document.getElementById('progress-ink');
      wrapper.classList.add('active');
      ink.style.transition = 'none';
      ink.style.width = '0%';
      
      setTimeout(() => {
        ink.style.transition = 'width 0.2s ease-out';
        let width = 0;
        clearInterval(progressInterval);
        progressInterval = setInterval(() => {
          width += (90 - width) * 0.08; // 隨時間平滑減速，最高停滯在 90%
          ink.style.width = width + '%';
        }, 100);
      }, 50);
    }

    function finishProgress() {
      clearInterval(progressInterval);
      const wrapper = document.getElementById('progress-wrapper');
      const ink = document.getElementById('progress-ink');
      ink.style.transition = 'width 0.3s ease-in';
      ink.style.width = '100%'; // 瞬間填滿
      setTimeout(() => {
        wrapper.classList.remove('active'); // 淡出隱藏
      }, 400);
    }

    function hideProgress() {
      clearInterval(progressInterval);
      document.getElementById('progress-wrapper').classList.remove('active');
    }

    function updateStatus(message) {
      document.getElementById('status-area').innerHTML = message;
    }

    // 實時全庫檢索邏輯
    function handleRealTimeSearch(event) {
      const keyword = event.target.value.trim();
      currentSearchKeyword = keyword; // 更新全域檢索狀態
      
      clearTimeout(searchTimeout);

      if (keyword === "") {
        updateStatus("");
        hideProgress();
        currentDateFilter = null; // 清空檢索時，還原到最新日期
        switchTab(currentCategory);
        document.getElementById('content-area').classList.add('hidden');
        startProgress();
        fetchData("");
        return;
      }

      updateStatus(`「${keyword}」—— 尋覓中...`);
      document.getElementById('content-area').classList.add('hidden');
      startProgress();

      // 防抖動延遲 800 毫秒
      searchTimeout = setTimeout(() => {
        fetchData(keyword);
      }, 800);
    }

    function fetchData(keyword) {
      const targetUrl = keyword ? API_URL + "?keyword=" + encodeURIComponent(keyword) : API_URL;

      fetch(targetUrl, { method: 'GET', redirect: 'follow' })
      .then(response => {
        if (!response.ok) throw new Error(`伺服器回應錯誤`);
        return response.json();
      })
      .then(data => initData(data.data || data, keyword)) 
      .catch(error => {
        hideProgress();
        updateStatus(`<span style="color:red;">載入中斷：${error.message}</span>`);
      });
    }

    function initData(records, keyword) {
      allRecords = records;
      
      finishProgress();
      updateStatus(""); 
      document.getElementById('content-area').classList.remove('hidden');
      
      if (keyword) {
        // 若為檢索狀態，無視日期篩選
        currentDateFilter = null;
        document.getElementById('date-picker').value = '';
      } else if (allRecords.length > 0) {
        // 修訂：如果當前沒有指定日期，才預設顯示最新一天 (防止手動選日後被強制蓋掉)
        if (!currentDateFilter) {
          currentDateFilter = allRecords[0][0]; 
          document.getElementById('date-picker').value = currentDateFilter;
        } else {
          document.getElementById('date-picker').value = currentDateFilter;
        }
      }
      
      renderMain();
    }

    function switchTab(category) {
      currentCategory = category;
      currentSearchKeyword = document.getElementById('search-input').value.trim();
      
      // 更新視覺上的分頁按鈕狀態
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      const activeBtn = document.getElementById('tab-' + category);
      if(activeBtn) activeBtn.classList.add('active');
      
      if (category === '收藏') {
        currentDateFilter = null;
        document.getElementById('date-picker').value = '';
      }
      
      renderMain();
    }

    function filterByDate(dateVal) {
      currentDateFilter = dateVal;

      // 修訂：若正在搜尋狀態下點擊了日期，需清空搜尋並「重新拉取」該日期的原始資料庫
      if (currentSearchKeyword !== "") {
        document.getElementById('search-input').value = "";
        currentSearchKeyword = "";
        currentCategory = '議論'; 
        
        document.getElementById('content-area').classList.add('hidden');
        startProgress();
        updateStatus("正在讀取該日素材...");
        fetchData(""); // 重新 Fetch 原始資料
        return;
      }
      
      if (currentCategory === '收藏') {
        switchTab('議論');
      } else {
        renderMain();
      }
    }

    function toggleBookmark(encodedId) {
      const rawId = decodeURIComponent(encodedId);
      const savedIndex = savedRecords.findIndex(r => (r[0] + r[1]) === rawId);
      
      if (savedIndex > -1) {
        savedRecords.splice(savedIndex, 1);
      } else {
        const record = allRecords.find(r => (r[0] + r[1]) === rawId);
        if (record) savedRecords.push(record);
      }
      
      localStorage.setItem('dse_bookmarks', JSON.stringify(savedRecords));
      renderMain();
    }

    // 修訂：強化正則表達式防呆，合併邏輯以防 AI 生成錯誤的標籤
    function parseAIText(rawText) {
      let cleanText = (rawText || "").replace(/[*#]/g, ''); 
      let theme = "未分類", question = "暫無題目", paragraph = cleanText;
      
      const tMatch = cleanText.match(/(?:適用主題|適用情感|主題|情感)[：:]\s*(.*?)(?=\n|$)/);
      const qMatch = cleanText.match(/(?:仿DSE題目|仿DSE擬題|擬題|題目)[：:]\s*(.*?)(?=\n|$)/);
      const pMatch = cleanText.match(/(?:論述示範|選材轉化|情節設計|示範段落|示範|指導)[：:]\s*([\s\S]*)/);
      
      if (tMatch) theme = tMatch[1].trim();
      if (qMatch) question = qMatch[1].trim();
      if (pMatch) paragraph = pMatch[1].trim();

      return { theme, question, paragraph };
    }

    function renderMain() {
      const container = document.getElementById('main-content');
      container.innerHTML = '';

      let displayRecords =[];

      // 核心判斷邏輯：如果正在檢索，無視分類與日期，直接顯示全庫檢索的結果
      if (currentSearchKeyword) {
        displayRecords = allRecords; 
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      } 
      // 收藏區塊邏輯
      else if (currentCategory === '收藏') {
        displayRecords = savedRecords;
        if (currentDateFilter) {
          displayRecords = displayRecords.filter(r => r[0] === currentDateFilter);
        }
      } 
      // 一般分類區塊邏輯
      else {
        displayRecords = allRecords.filter(r => r[5] === currentCategory);
        if (currentDateFilter) {
          displayRecords = displayRecords.filter(r => r[0] === currentDateFilter);
        }
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        const activeBtn = document.getElementById('tab-' + currentCategory);
        if(activeBtn) activeBtn.classList.add('active');
      }

      // 無資料處理
      if (displayRecords.length === 0) {
        let emptyMsg = `此日期並無採集紀錄。`;
        if (currentSearchKeyword) emptyMsg = `落花無言，找不到符合「${currentSearchKeyword}」的結果。`;
        else if (currentCategory === '收藏') emptyMsg = '📜 你的書房目前空空如也，點擊文章右上角書籤加入收藏吧！';
        
        container.innerHTML = `<p class="archive-empty">${emptyMsg}</p>`;
        return;
      }

      displayRecords.forEach((row, index) => {
        const [date, rawTitle, link, aiText, imgUrl, cat] = row;
        const color = morandiColors[index % morandiColors.length]; 
        const { theme, question, paragraph } = parseAIText(aiText);

        const uniqueId = date + rawTitle;
        const encodedId = encodeURIComponent(uniqueId);
        const isSaved = savedRecords.some(r => (r[0] + r[1]) === uniqueId);

        let tag = cat === '議論' ? '觀點' : '素材';
        let title = rawTitle;
        const tagMatch = rawTitle.match(/^【(.*?)】/);
        if (tagMatch) { tag = tagMatch[1]; title = rawTitle.replace(/^【.*?】/, '').trim(); }

        // 修訂：加入 onerror 圖片容錯保護機制
        const fallbackImg = 'https://upload.wikimedia.org/wikipedia/commons/thumb/a/ac/No_image_available.svg/600px-No_image_available.svg.png';
        const imgHtml = imgUrl 
          ? `<img src="${imgUrl}" class="article-img" onerror="this.onerror=null; this.src='${fallbackImg}';">` 
          : '';

        // 修訂：確保 AI 如果吐出多段落，會正確保留換行，不會擠成一團
        let formattedParagraph = paragraph.replace(/\n+/g, '<br><br>');
        const dropCapHtml = formattedParagraph.length > 0 
          ? `<span class="drop-cap" style="color:${color}">${formattedParagraph.charAt(0)}</span>${formattedParagraph.slice(1)}`
          : formattedParagraph;
          
        const sectionLabel = cat === '議論' ? '【論述示範】' : '【選材轉化建議】';

        const html = `
          <div class="article-box">
            <div class="article-header-row">
              <div class="article-meta">${date} 採集 · 分類：${cat}</div>
              <button class="bookmark-btn ${isSaved ? 'saved' : ''}" onclick="toggleBookmark('${encodedId}')" title="${isSaved ? '移除收藏' : '加入收藏'}">
                <svg viewBox="0 0 24 24">
                  <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                </svg>
              </button>
            </div>
            
            <span class="article-tag" style="background:${color}">${tag}</span>
            <a href="${link}" target="_blank" class="article-title">${title}</a>
            ${imgHtml}
            
            <div class="theme-bar" style="border-left-color:${color}; color:${color}">
              ${theme}
            </div>
            
            <div class="question-box">${question}</div>
            
            <div class="content-body">
              <span class="content-label" style="color:${color}">${sectionLabel}</span>
              ${dropCapHtml}
            </div>
          </div>
        `;
        container.innerHTML += html;
      });
    }
  </script>
</body>
</html>
