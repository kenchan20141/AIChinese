<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DSE範文漫畫館</title>
    
    <!-- 引入 PageFlip 翻頁庫 -->
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>

    <style>
        /* =========================================
           漫畫風 CSS 變數與全域設定
           ========================================= */
        :root {
            --comic-black: #111;
            --comic-white: #fdfdfd;
            --comic-grey: #e0e0e0;
            --comic-yellow: #ffcc00;
            --comic-red: #e63946;
            --comic-blue: #3a86ff;
            --comic-cyan: #48cae4;  /* 白色按鈕懸浮時的青色 */
            --comic-green: #06d6a0; /* 模式切換按鈕的綠色 */
            --comic-border: 4px solid var(--comic-black);
            --comic-shadow: 6px 6px 0px var(--comic-black);
            --comic-shadow-hover: 12px 12px 0px var(--comic-black);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "PingFang HK", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
            background-color: var(--comic-white);
            background-image: radial-gradient(#ccc 15%, transparent 16%), radial-gradient(#ccc 15%, transparent 16%);
            background-size: 10px 10px;
            background-position: 0 0, 5px 5px;
            color: var(--comic-black);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* =========================================
           SVG 按鈕與共用元件
           ========================================= */
        .btn {
            background-color: var(--comic-white);
            color: var(--comic-black);
            border: 3px solid var(--comic-black);
            padding: 8px 15px;
            font-size: 16px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 4px 4px 0px var(--comic-black);
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        /* 白色按鈕懸浮改為青藍色 */
        .btn:hover { background-color: var(--comic-cyan); transform: translate(-2px, -2px); box-shadow: 6px 6px 0px var(--comic-black); }
        .btn:active { transform: translate(3px, 3px); box-shadow: 0px 0px 0px var(--comic-black); }
        .btn svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }

        /* 顏色按鈕類別 */
        .btn-yellow { background-color: var(--comic-yellow); }
        .btn-yellow:hover { background-color: #fca311; }
        
        .btn-green { background-color: var(--comic-green); }
        .btn-green:hover { background-color: #05b586; }

        #btn-update { padding: 8px; width: 42px; height: 42px; }

        /* =========================================
           頂部導航欄
           ========================================= */
        header {
            background-color: var(--comic-white);
            border-bottom: var(--comic-border);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 0px rgba(0,0,0,1);
            position: sticky;
            top: 0;
            z-index: 100;
            gap: 15px;
        }

        .logo {
            font-size: 26px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: var(--comic-black);
            color: var(--comic-white);
            padding: 8px 20px;
            transform: skew(-5deg);
            cursor: pointer;
        }

        .header-actions { display: flex; align-items: center; gap: 15px; flex: 1; justify-content: flex-end; }

        /* --- 搜尋列 UI --- */
        #search-container { position: relative; display: flex; align-items: center; width: 220px; transition: width 0.3s; }
        #search-container:focus-within { width: 280px; }
        .search-icon { position: absolute; left: 12px; pointer-events: none; width: 16px; height: 16px; stroke: var(--comic-black); stroke-width: 3; fill: none; }
        
        #search-input {
            width: 100%; padding: 8px 15px 8px 35px; font-size: 16px; font-weight: 900;
            border: 3px solid var(--comic-black); border-radius: 20px; outline: none;
            box-shadow: 2px 2px 0 var(--comic-black); transition: all 0.3s;
            background: var(--comic-white); box-sizing: border-box;
        }
        #search-input:focus { box-shadow: 4px 4px 0 var(--comic-black); transform: translate(-2px, -2px); background: #fffde7; }

        #search-results {
            position: absolute; top: 45px; right: 0; width: 320px; background: var(--comic-white);
            border: 3px solid var(--comic-black); box-shadow: 4px 4px 0 var(--comic-black); border-radius: 8px;
            display: none; z-index: 1000; max-height: 60vh; overflow-y: auto; text-align: left;
        }
        .search-item { padding: 12px 15px; border-bottom: 2px solid var(--comic-black); cursor: pointer; font-size: 15px; line-height: 1.4; color: #333; }
        .search-item:last-child { border-bottom: none; }
        .search-item:hover { background: var(--comic-cyan); color: var(--comic-black); }
        .search-item strong { display: block; margin-bottom: 5px; font-size: 16px; color: var(--comic-black); }
        .highlight { color: var(--comic-red); background: var(--comic-yellow); padding: 0 2px; border-radius: 3px; font-weight: bold; }

        /* =========================================
           主視圖與重構的漫畫風書櫃 (分類設計)
           ========================================= */
        main { flex-grow: 1; display: flex; flex-direction: column; align-items: center; width: 100%; box-sizing: border-box; }

        #catalog-view { 
            display: flex; 
            flex-direction: column;
            gap: 50px; 
            width: 100%; max-width: 1200px; padding: 50px 20px; 
            box-sizing: border-box;
        }

        .genre-section { width: 100%; display: flex; flex-direction: column; }
        
        .genre-header { 
            margin-bottom: 30px; 
            border-bottom: 6px solid var(--comic-black); 
            padding-bottom: 5px;
        }

        .genre-title {
            font-size: 24px; font-weight: 900; margin: 0;
            display: inline-block; padding: 8px 25px;
            border: 4px solid var(--comic-black);
            box-shadow: 4px 4px 0 var(--comic-black);
            transform: skew(-5deg);
        }

        .genre-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 60px 0;
            width: 100%;
        }

        /* 2D 扁平漫畫風層板 (取代舊的 THREE.JS 偽 3D) */
        .shelf-slot {
            display: flex; justify-content: center; align-items: flex-end;
            position: relative; padding-bottom: 12px;
            border-bottom: 8px solid var(--comic-black); /* 粗黑線體現漫畫感 */
        }
        
        /* 網點陰影點綴 */
        .shelf-slot::after {
            content: ''; position: absolute; bottom: -16px; left: 0; right: 0; height: 8px;
            background-image: radial-gradient(var(--comic-black) 40%, transparent 40%);
            background-size: 4px 4px; z-index: 0;
        }

        /* 3D 實體書設計 (完全保留) */
        .comic-book {
            position: relative; z-index: 5; cursor: pointer; perspective: 1200px;
            margin: 0 15px; max-width: 85%;
        }

        .comic-book-inner {
            position: relative; display: inline-block; transform-style: preserve-3d;
            --thickness: 24px; /* 書本預設厚度 */
            transform: rotateY(-25deg);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .comic-book:hover:not(.disabled) .comic-book-inner {
            transform: rotateY(-5deg) translateZ(30px) translateY(-10px);
        }
        .comic-book.disabled .comic-book-inner { filter: grayscale(100%); cursor: not-allowed; }

        /* 封面圖片 (嚴格鎖定比例) */
        .comic-cover-img {
            display: block; width: auto; height: auto;
            max-width: 100%; max-height: 250px;
            border: 3px solid var(--comic-black); background: var(--comic-white); box-sizing: border-box;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        /* 書脊 (動態貼合左側) */
        .comic-spine {
            position: absolute; top: 0; bottom: 0; right: 100%; width: var(--thickness);
            background: var(--comic-yellow); border: 3px solid var(--comic-black); border-right: none;
            transform-origin: right; transform: rotateY(-90deg); box-sizing: border-box;
            display: flex; align-items: center; justify-content: center;
        }
        .spine-text {
            writing-mode: vertical-rl; text-orientation: upright;
            font-weight: 900; font-size: 14px; letter-spacing: 2px; padding: 10px 0;
        }

        /* 書頁厚度邊緣 (動態貼合右側與頂部) */
        .comic-pages-edge {
            position: absolute; top: 3px; bottom: 3px; left: 100%; width: var(--thickness);
            background: #fff; border: 3px solid var(--comic-black); border-left: none;
            transform-origin: left; transform: rotateY(90deg);
            background-image: repeating-linear-gradient(to bottom, transparent, transparent 2px, #ccc 2px, #ccc 3px);
        }
        .comic-pages-top {
            position: absolute; bottom: 100%; left: 3px; right: 3px; height: var(--thickness);
            background: #fff; border: 3px solid var(--comic-black); border-bottom: none;
            transform-origin: bottom; transform: rotateX(89.9deg);
            background-image: repeating-linear-gradient(to right, transparent, transparent 2px, #ccc 2px, #ccc 3px);
        }

        /* 分類書脊顏色 */
        .genre-shi .comic-spine { background: var(--comic-blue); color: #fff;}
        .genre-ci .comic-spine { background: var(--comic-red); color: #fff;}
        .genre-wen .comic-spine { background: var(--comic-yellow); color: #000;}

        .badge {
            position: absolute; top: -15px; right: -15px; background: var(--comic-yellow); border: 3px solid var(--comic-black);
            padding: 5px 10px; font-weight: 900; font-size: 14px; box-shadow: 3px 3px 0 var(--comic-black); z-index: 10;
            transform: translateZ(10px) rotate(15deg); color: var(--comic-black);
        }
        .badge.coming-soon { background: var(--comic-grey); color: #555; }

        /* =========================================
           閱讀器 UI (雙模式與進度對話框)
           ========================================= */
        #reader-view { width: 100%; display: none; flex-direction: column; align-items: center; padding-top: 20px;}
        
        .reader-top-bar {
            display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%; max-width: 1400px;
            margin-bottom: 20px; background: var(--comic-white); padding: 15px 20px;
            border: 3px solid var(--comic-black); box-shadow: 4px 4px 0 var(--comic-black); box-sizing: border-box;
        }
        /* 篇章標題置頂居中 */
        .reader-title { font-size: 26px; font-weight: 900; margin: 0; text-align: center; }
        /* 返回與切換模式放在同一行 */
        .reader-actions { display: flex; justify-content: center; align-items: center; gap: 20px; width: 100%; }

        /* 模式 1：翻頁模式 */
        #book-wrapper { position: relative; display: flex; justify-content: center; align-items: center; width: 100%; max-width: 1400px; }
        .page { background-color: var(--comic-white); border: 2px solid var(--comic-black); box-shadow: inset 0 0 10px rgba(0,0,0,0.1); overflow: hidden; display: flex; box-sizing: border-box; position: relative; }
        
        /* 模式 2：條漫捲動模式 */
        #scroll-wrapper { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 800px; gap: 40px; margin-bottom: 30px; }
        .scroll-panel { width: 100%; background: var(--comic-white); border: var(--comic-border); box-shadow: var(--comic-shadow); display: flex; flex-direction: column; }

        /* 共用內容 */
        .page-content { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background-color: var(--comic-white); }
        .page-content img { width: 100%; flex-grow: 1; min-height: 0; object-fit: contain; user-select: none; -webkit-user-drag: none; cursor: zoom-in; padding: 10px; box-sizing: border-box; }
        .page-text { width: 100%; background: var(--comic-white); border-top: 3px solid var(--comic-black); padding: 12px 20px; font-size: 16px; font-weight: 900; line-height: 1.5; text-align: justify; z-index: 5; box-sizing: border-box; }

        /* 底部控制欄 */
        .controls {
            margin-top: 30px; margin-bottom: 40px; display: flex; align-items: center; justify-content: center; flex-wrap: nowrap; white-space: nowrap; gap: 15px;
            background: var(--comic-white); padding: 12px 25px; border: var(--comic-border); box-shadow: var(--comic-shadow); z-index: 10;
        }
        .page-info { font-size: 18px; font-weight: 900; display: flex; align-items: center; gap: 5px; }
        #page-input { width: 50px; text-align: center; font-size: 18px; font-weight: 900; border: 2px solid var(--comic-black); border-radius: 4px; padding: 4px; outline: none; background-color: var(--comic-white); }
        #page-input:focus { background-color: var(--comic-cyan); }

        /* =========================================
           漫畫風格提示視窗 (恢復閱讀進度)
           ========================================= */
        .comic-dialog-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85); z-index: 10000;
            display: flex; justify-content: center; align-items: center;
        }
        .comic-dialog {
            background: var(--comic-white); border: 5px solid var(--comic-black);
            box-shadow: 12px 12px 0 var(--comic-yellow); padding: 30px;
            max-width: 420px; width: 85%; text-align: center;
            transform: rotate(-2deg);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { 0% { transform: scale(0.5) rotate(-10deg); opacity: 0; } 100% { transform: scale(1) rotate(-2deg); opacity: 1; } }
        .comic-dialog-title {
            font-size: 24px; font-weight: 900; margin-bottom: 20px;
            background: var(--comic-black); color: var(--comic-white);
            display: inline-block; padding: 5px 20px; transform: skew(-5deg); box-shadow: 4px 4px 0 var(--comic-red);
        }
        .comic-dialog-content { font-size: 18px; font-weight: bold; margin-bottom: 30px; line-height: 1.6; }
        .comic-dialog-actions { display: flex; justify-content: center; gap: 15px; }

        /* =========================================
           特效與雜項
           ========================================= */
        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: rgba(0, 0, 0, 0.85); z-index: 9999; justify-content: center; align-items: center; cursor: zoom-out; }
        #lightbox img { max-width: 95%; max-height: 95%; object-fit: contain; border: 5px solid var(--comic-white); box-shadow: 0 0 20px rgba(0,0,0,0.8); background: white; }

        #loading {
            position: fixed; font-size: 24px; font-weight: bold; background: var(--comic-yellow); border: var(--comic-border);
            padding: 20px 40px; box-shadow: var(--comic-shadow); z-index: 1000; display: none; transform: rotate(-3deg); top: 30%; left: 50%; margin-left: -120px;
        }

        .copyright-footer { position: fixed; bottom: 0; right: 0; padding: 5px 10px; background-color: #f1f1f1; z-index: 50;}
        .copyright-footer p { margin: 0; font-size: 14px; }

        /* =========================================
           響應式設計 (手機優化，一排兩封面)
           ========================================= */
        @media (max-width: 768px) {
            header { flex-direction: column; gap: 15px; padding: 15px 10px; align-items: center; }
            .logo { font-size: 20px; padding: 5px 15px; transform: skew(0); }
            .header-actions { width: 100%; justify-content: space-between; gap: 10px; }
            #search-container { width: 100%; flex: 1; }
            #search-input { width: 100%; max-width: 100%; }
            #search-results { width: 95vw; left: 50%; transform: translateX(-50%); right: auto; top: 45px; }

            .genre-grid { grid-template-columns: repeat(2, 1fr); gap: 40px 0; }
            .genre-title { font-size: 20px; }
            
            .comic-book-inner { --thickness: 16px; transform: rotateY(-15deg); }
            .comic-book:hover:not(.disabled) .comic-book-inner { transform: rotateY(0deg) translateZ(10px) translateY(-5px); }
            .comic-cover-img { max-height: 160px; }
            .spine-text { font-size: 11px; letter-spacing: 1px; }
            .badge { font-size: 11px; padding: 3px 6px; top: -10px; right: -10px; }
            
            .reader-top-bar { padding: 10px; gap: 10px; margin-bottom: 10px;}
            .reader-title { font-size: 20px; }
            .reader-actions { gap: 10px; flex-wrap: wrap;}
            .btn { padding: 6px 10px; font-size: 14px; }
            .page-text { font-size: 14px; padding: 8px 10px; }
            .controls { padding: 10px; gap: 10px; width: 100%; box-sizing: border-box; }
            .copyright-footer p { font-size: 12px; }
        }


#search-results { width: 100%; left: 0; transform: none; right: auto; top: 45px; box-sizing: border-box; }
        
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="showCatalog()">DSE 範文漫畫館</div>
        <div class="header-actions">
            <div id="search-container">
                <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="search-input" placeholder="搜尋內文..." autocomplete="off">
                <div id="search-results"></div>
            </div>
            <!-- 去除更新字眼，只留圖示與 Title 提示 -->
            <button id="btn-update" class="btn" title="清理快取並更新資料">
                <svg viewBox="0 0 24 24"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.32-9.83l.98 2.26"/></svg>
            </button>
        </div>
    </header>

    <main>
        <div id="loading">載入中...</div>

        <!-- 主頁：重構後的漫畫書櫃 UI -->
        <div id="catalog-view"></div>

        <!-- 內頁：漫畫閱讀器 -->
        <div id="reader-view">
            <div class="reader-top-bar">
                <!-- 標題置頂居中 -->
                <h2 class="reader-title" id="reader-title">漫畫標題</h2>
                <!-- 返回目錄與切換模式放在同一行 -->
                <div class="reader-actions">
                    <button class="btn" id="btn-back">
                        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg> 返回目錄
                    </button>
                    <!-- 切換按鈕，顏色由 JS 動態控制 -->
                    <button class="btn btn-yellow" id="btn-toggle-mode">
                        <span id="mode-icon"></span> 
                        <span id="mode-text">切換模式</span>
                    </button>
                </div>
            </div>

            <!-- 模式 1：翻頁模式 -->
            <div id="book-wrapper">
                <div id="book"></div>
            </div>

            <!-- 模式 2：捲動模式 (條漫) -->
            <div id="scroll-wrapper"></div>

            <!-- 底部控制列 -->
            <div class="controls" id="controls-bottom">
                <button class="btn" id="btn-prev">
                    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg> 上一頁
                </button>
                <div class="page-info">
                    第 <input type="number" id="page-input" value="1" min="1"> / <span id="total-pages">1</span> 頁
                </div>
                <button class="btn" id="btn-next">
                    下一頁 <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
                </button>
            </div>
        </div>

        <!-- 翻頁音效 -->
        <audio id="flip-sound" src="翻頁.MP3" preload="auto"></audio>
    </main>

    <!-- 漫畫風進度確認對話框 -->
    <div id="resume-dialog" class="comic-dialog-overlay" style="display: none;">
        <div class="comic-dialog">
            <div class="comic-dialog-title">繼續閱讀？</div>
            <div class="comic-dialog-content">
                系統記錄你上次讀到第 <span id="resume-page-num" class="highlight"></span> 幅圖，<br>要從這裡繼續嗎？
            </div>
            <div class="comic-dialog-actions">
                <button class="btn" id="btn-resume-no">從頭開始</button>
                <button class="btn btn-yellow" id="btn-resume-yes">繼續閱讀</button>
            </div>
        </div>
    </div>

    <div id="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" src="" alt="放大觀看">
    </div>

    <footer class="copyright-footer">
        <p>Copyright © 2026 陳冠健. All rights reserved.</p>
    </footer>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwvrHGW-m-UpVfvhc-rg2Rjo_tySA8XML5pGovWgGOdNvds83OihWlCOAh0Qte1GumHFA/exec"; 

        // ==========================================
        // 1. 完整保留的漫畫資料庫 (無任何刪減)
        // ==========================================
        const comicDatabase = {
            "chushibiao": {
                title: "《出師表》", author: "諸葛亮", genre: "wen", folderId: "1AxZlN3nY_NkaJD3EBfrF1N31mYiK2pnx", folder: "《出師表》", totalPages: 36,
                texts:[
                    "先帝創業未半而中道崩殂，", "今天下三分，益州疲弊，此誠危急存亡之秋也。", "然侍衛之臣不懈於內，忠志之士忘身於外者，",
                    "蓋追先帝之殊遇，欲報之於陛下也。", "誠宜開張聖聽，以光先帝遺德，恢弘志士之氣，", "不宜妄自菲薄，引喻失義，以塞忠諫之路也。",
                    "宮中府中，俱為一體，陟罰臧否，不宜異同。", "若有作姦犯科及為忠善者，宜付有司論其刑賞，", "以昭陛下平明之理，不宜偏私，使內外異法也。",
                    "侍中、侍郎郭攸之、費禕、董允等，此皆良實，志慮忠純，", "是以先帝簡拔以遺陛下。", "愚以為宮中之事，事無大小，悉以咨之，然後施行，",
                    "必能裨補闕漏，有所廣益。", "將軍向寵，性行淑均，曉暢軍事，", "試用於昔日，先帝稱之曰能，是以眾議舉寵為督。",
                    "愚以為營中之事，悉以咨之，必能使行陣和睦，", "優劣得所。", "親賢臣，遠小人，此先漢所以興隆也；親小人，遠賢臣，此後漢所以傾頹也。",
                    "先帝在時，每與臣論此事，未嘗不歎息痛恨於桓、靈也。", "侍中、尚書、長史、參軍，此悉貞良死節之臣，", "願陛下親之信之，則漢室之隆，可計日而待也。",
                    "臣本布衣，躬耕於南陽，苟全性命於亂世，不求聞達於諸侯。", "先帝不以臣卑鄙，猥自枉屈，三顧臣於草廬之中，", "咨臣以當世之事，由是感激，遂許先帝以驅馳。",
                    "後值傾覆，受任於敗軍之際，", "奉命於危難之間，爾來二十有一年矣。", "先帝知臣謹慎，故臨崩寄臣以大事也。",
                    "受命以來，夙夜憂歎，恐託付不效，以傷先帝之明，", "故五月渡瀘，深入不毛。今南方已定，兵甲已足，", "當獎率三軍，北定中原，庶竭駑鈍，攘除奸凶，",
                    "興復漢室，還于舊都。此臣所以報先帝，而忠陛下之職分也。", "至於斟酌損益，進盡忠言，則攸之、禕、允之任也。", "願陛下託臣以討賊興復之效，不效則治臣之罪，以告先帝之靈。",
                    "若無興德之言，則責攸之、禕、允等之慢，以彰其咎。", "陛下亦宜自謀，以咨諏善道，察納雅言，深追先帝遺詔。", "臣不勝受恩感激。今當遠離，臨表涕零，不知所言。"
                ]
            },
            "xiaoyaoyou": { 
                title: "《逍遙遊》", author: "《莊子》", genre: "wen", folderId: "11746a1sOL6Kr61HRKyuGPmsQU4tk2T-K", folder: "《逍遙遊》", totalPages: 29, 
                texts:[
                    "惠子謂莊子曰：「魏王貽我大瓠之種，", "我樹之成而實五石。", "以盛水漿，其堅不能自舉也。",
                    "剖之以為瓢，則瓠落無所容。", "非不呺然大大也，吾為其無用而掊之。」", "莊子曰：「夫子固拙於用大矣。",
                    "宋人有善為不龜手之藥者，世世以洴澼絖為事。", "客聞之，請買其方百金。", "聚族而謀曰：『我世世為洴澼絖，不過數金。",
                    "今一朝而鬻技百金，請與之。』", "客得之，以說吳王。", "越有難，吳王使之將。冬，與越人水戰，大敗越人，",
                    "裂地而封之。", "能不龜手一也，或以封，或不免於洴澼絖，則所用之異也。", "今子有五石之瓠，何不慮以為大樽而浮乎江湖，",
                    "而憂其瓠落無所容？則夫子猶有蓬之心也夫！」", "惠子謂莊子曰：「吾有大樹，人謂之樗。", "其大本擁腫而不中繩墨，",
                    "其小枝卷曲而不中規矩。", "立之塗，匠者不顧。", "今子之言，大而無用，眾所同棄也。」",
                    "莊子曰：「子獨不見狸狌乎？卑身而伏，以候敖者；", "東西跳梁，不辟高下；中於機辟，死於罔罟。", "今夫斄牛，其大若垂天之雲。",
                    "此能為大矣，而不能執鼠。", "今子有大樹，患其無用，何不樹之於無何有之鄉，廣莫之野，", "彷徨乎無為其側，逍遙乎寢臥其下。",
                    "不夭斤斧，物無害者，", "無所可用，安所困苦哉！」"
                ] 
            },
            "shishu": { 
                title: "《師說》", author: "韓愈", genre: "wen", folderId: "1m0eXAjQ4tb_jivjcz_cVwzrRJIUeYWs7", folder: "《師說》", totalPages: 21, 
                texts:[
                    "古之學者必有師。師者，所以傳道受業解惑也。", "人非生而知之者，孰能無惑？惑而不從師，其為惑也，終不解矣。", 
                    "生乎吾前，其聞道也固先乎吾，吾從而師之；", "生乎吾後，其聞道也亦先乎吾，吾從而師之。", 
                    "吾師道也，夫庸知其年之先後生於吾乎？是故無貴無賤，無長無少，道之所存，師之所存也。", "嗟乎！師道之不傳也久矣！欲人之無惑也難矣！", 
                    "古之聖人，其出人也遠矣，猶且從師而問焉；", "今之眾人，其下聖人也亦遠矣，而恥學於師。", 
                    "是故聖益聖，愚益愚。聖人之所以為聖，愚人之所以為愚，其皆出於此乎？", "愛其子，擇師而教之；於其身也，則恥師焉，惑矣。", 
                    "彼童子之師，授之書而習其句讀者，非吾所謂傳其道解其惑者也。", "句讀之不知，惑之不解，或師焉，或不焉，小學而大遺，吾未見其明也。", 
                    "巫醫樂師百工之人，不恥相師。", "士大夫之族，曰師、曰弟子云者，則群聚而笑之。", 
                    "問之，則曰：「彼與彼年相若也，道相似也。位卑則足羞，官盛則近諛。」", "嗚呼！師道之不復可知矣。巫醫樂師百工之人，君子不齒，今其智乃反不能及，其可怪也歟！", 
                    "聖人無常師。孔子師郯子、萇弘、師襄、老聃。郯子之徒，其賢不及孔子。", "孔子曰：「三人行，則必有我師。」", 
                    "是故弟子不必不如師，師不必賢於弟子，聞道有先後，術業有專攻，如是而已。", "李氏子蟠，年十七，好古文，六藝經傳皆通習之，", 
                    "不拘於時，學於余。余嘉其能行古道，作《師說》以貽之。"
                ] 
            },
            "xishanyanyouji": { 
                title: "《始得西山宴遊記》", author: "柳宗元", genre: "wen", folderId: "1KSgikNxXETfe5R7IuymXom-4ODoGXcCS", folder: "《始得西山宴遊記》", totalPages: 21, 
                texts:[
                    "自余為僇人，居是州，恆惴慄。", "其隟也，則施施而行，漫漫而遊。日與其徒上高山，入深林，", "窮迴溪，幽泉怪石，無遠不到。", 
                    "到則披草而坐，傾壺而醉。", "醉則更相枕以臥，臥而夢。", "意有所極，夢亦同趣。覺而起，起而歸。", 
                    "以為凡是州之山水有異態者，皆我有也，而未始知西山之怪特。", "今年九月二十八日，因坐法華西亭，望西山，始指異之。", 
                    "遂命僕人過湘江，緣染溪，斫榛莽，焚茅茷，窮山之高而止。", "攀援而登，箕踞而遨，則凡數州之土壤，皆在衽席之下。", 
                    "其高下之勢，岈然窪然，若垤若穴，", "尺寸千里，攢蹙累積，莫得遯隱。", "縈青繚白，外與天際，四望如一。", 
                    "然後知是山之特立，不與培塿為類。", "悠悠乎與顥氣俱，而莫得其涯；", "洋洋乎與造物者遊，而不知其所窮。", 
                    "引觴滿酌，頹然就醉，不知日之入。", "蒼然暮色，自遠而至，至無所見，而猶不欲歸。", "心凝形釋，與萬化冥合。", 
                    "然後知吾嚮之未始遊，遊於是乎始。故為之文以志。", "是歲，元和四年也。"
                ] 
            },
            "yueyanglouji": { 
                title: "《岳陽樓記》", author: "范仲淹", genre: "wen", folderId: "1ZIW5BsMvthRxr0ecWxXMrHXu6F2exV83", folder: "《岳陽樓記》", totalPages: 33, 
                texts:[
                    "慶曆四年春，滕子京謫守巴陵郡。", "越明年，政通人和，百廢具興。", "乃重修岳陽樓，增其舊制，", "刻唐賢今人詩賦於其上，", "屬予作文以記之。", 
                    "予觀夫巴陵勝狀，在洞庭一湖。", "銜遠山，吞長江，浩浩湯湯，橫無際涯；", "朝暉夕陰，氣象萬千。", "此則岳陽樓之大觀也，前人之述備矣。", 
                    "然則北通巫峽，南極瀟湘，", "遷客騷人，多會於此，", "覽物之情，得無異乎？", "若夫霪雨霏霏，連月不開；", "陰風怒號，濁浪排空；", 
                    "日星隱曜，山岳潛形；", "商旅不行，檣傾楫摧；", "薄暮冥冥，虎嘯猿啼。", "登斯樓也，則有去國懷鄉，憂讒畏譏，", "滿目蕭然，感極而悲者矣。", 
                    "至若春和景明，波瀾不驚，上下天光，一碧萬頃；", "沙鷗翔集，錦鱗游泳，", "岸芷汀蘭，郁郁青青。", "而或長煙一空，皓月千里，", 
                    "浮光躍金，靜影沉璧；", "漁歌互答，此樂何極！", "登斯樓也，則有心曠神怡，寵辱皆忘，", "把酒臨風，其喜洋洋者矣。", 
                    "嗟夫！予嘗求古仁人之心，或異二者之為。", "何哉？不以物喜，不以己悲。", "居廟堂之高，則憂其民；處江湖之遠，則憂其君。", 
                    "是進亦憂，退亦憂，然則何時而樂耶？", "其必曰：「先天下之憂而憂，後天下之樂而樂」乎！", "噫！微斯人，吾誰與歸？"
                ] 
            },
            "yuwosuoyuye": { 
                title: "《魚我所欲也》", author: "《孟子》", genre: "wen", folderId: "1jLzHK1ibMoBcEURYj1RAZW-It5Vg5zpO", folder: "《魚我所欲也》", totalPages: 19, 
                texts:[
                    "魚，我所欲也；熊掌，亦我所欲也。二者不可得兼，舍魚而取熊掌者也。", "生，亦我所欲也；義，亦我所欲也。二者不可得兼，舍生而取義者也。", 
                    "生亦我所欲，所欲有甚於生者，故不為苟得也；", "死亦我所惡，所惡有甚於死者，故患有所不辟也。", 
                    "如使人之所欲莫甚於生，則凡可以得生者何不用也？", "使人之所惡莫甚於死者，則凡可以辟患者何不為也？", 
                    "由是則生而有不用也，由是則可以辟患而有不為也。", "是故所欲有甚於生者，所惡有甚於死者。", 
                    "非獨賢者有是心也，人皆有之，賢者能勿喪耳。", "一簞食，一豆羹，得之則生，弗得則死。", "嘑爾而與之，行道之人弗受；", 
                    "蹴爾而與之，乞人不屑也。", "萬鍾則不辯禮義而受之，", "萬鍾於我何加焉！", "為宮室之美，妻妾之奉，所識窮乏者得我與？", 
                    "鄉為身死而不受，今為宮室之美為之；", "鄉為身死而不受，今為妻妾之奉為之；", "鄉為身死而不受，今為所識窮乏者得我而為之：", 
                    "是亦不可以已乎？此之謂失其本心。"
                ] 
            },
            "quanxue": {
                title: "《勸學》", author: "《荀子》", genre: "wen", folderId: "1v7HLwNI5adR3AZ_SFna92ZAbQGG-2dGh", folder: "《勸學》", totalPages: 20,
                texts:[
                    "君子曰：學不可以已。", "青，取之於藍，而青於藍；冰，水為之，而寒於水。", "木直中繩，輮以為輪，其曲中規；雖有槁暴，不復挺者，輮使之然也。", 
                    "故木受繩則直，金就礪則利，", "君子博學而日參省乎己，則知明而行無過矣。", "吾嘗終日而思矣，不如須臾之所學也；", 
                    "吾嘗跂而望矣，不如登高之博見也。", "登高而招，臂非加長也，而見者遠；", "順風而呼，聲非加疾也，而聞者彰。", 
                    "假輿馬者，非利足也，而致千里；", "假舟楫者，非能水也，而絕江河。", "君子生非異也，善假於物也。", 
                    "積土成山，風雨興焉；", "積水成淵，蛟龍生焉；", "積善成德，而神明自得，聖心備焉。", 
                    "故不積跬步，無以至千里；不積小流，無以成江海。", "騏驥一躍，不能十步；駑馬十駕，功在不舍。", 
                    "鍥而舍之，朽木不折；鍥而不舍，金石可鏤。", "蚓無爪牙之利，筋骨之強，上食埃土，下飲黃泉，用心一也。", 
                    "蟹六跪而二螯，非蛇蟺之穴無可寄託者，用心躁也。"
                ]
            },
            "lunrenlunxiaolunjunzi": {
                title: "《論仁、論孝、論君子》", author: "《論語》", genre: "wen", folderId: "1oUsRn7RhHnapMRr9IQqUv2ocZ5FlKZIL", folder: "《論仁、論孝、論君子》", totalPages: 27,
                texts:[
                    "子曰：「不仁者，不可以久處約 ，不可以長處樂。仁者安仁，知者利仁 。」（《里仁》第四）",
                    "子曰：「富與貴，是人之所欲也；不以其道得之，不處也 。", "貧與賤，是人之所惡也；不以其道得之 ，不去也。",
                    "君子去仁，惡乎成名？", "君子無終食之間違仁 ，造次必於是 ，顛沛必於是。」（《里仁》第四）",
                    "顏淵問仁。子曰：「克己復禮為仁 。", "一日克己復禮，天下歸仁焉。為仁由己，而由人乎哉 ？」",
                    "顏淵曰：「請問其目 。」子曰：「非禮勿視，非禮勿聽，非禮勿言，非禮勿動 。」", "顏淵曰：「回雖不敏，請事斯語矣 。」（《顏淵》第十二）",
                    "子曰：「志士仁人，無求生以害仁，有殺身以成仁 。」", "孟懿子問孝。子曰：「無違。」",
                    "樊遲御 ，子告之曰：「孟孫問孝於我，我對曰，無違。」", "樊遲曰：「何謂也？」子曰：「生事之以禮；死葬之以禮，祭之以禮 。」（《為政》第二）",
                    "子游問孝。子曰：「今之孝者，是謂能養。", "至於犬馬，皆能有養 ；不敬，何以別乎！」（《為政》第二）",
                    "子曰：「事父母幾諫，見志不從，又敬不違，勞而不怨。」（《里仁》第四）", "子曰：「父母之年，不可不知也。一則以喜，一則以懼。」（《里仁》第四）",
                    "子曰：「君子不重則不威；學則不固。", "主忠信。無友不如己者。過則勿憚改。」（《學而》第一）",
                    "子曰：「君子坦蕩蕩，小人長戚戚。」（《述而》第七）", "司馬牛問君子。子曰：「君子不憂不懼。」",
                    "曰：「不憂不懼，斯謂之君子矣乎？」子曰：「內省不疚，夫何憂何懼？」（《顏淵》第十二）",
                    "子曰：「君子成人之美，不成人之惡。小人反是。」（《顏淵》第十二）", "子曰：「君子恥其言而過其行。」（《憲問》第十四）",
                    "子曰：「君子義以為質，禮以行之，孫以出之，信以成之。君子哉！」（《衛靈公》第十五）", "子曰：「君子病無能焉，不病人之不己知也。」（《衛靈公》第十五）",
                    "子曰：「君子求諸己，小人求諸人。」（《衛靈公》第十五）"
                ]
            },
            "liuguolun": {
                title: "《六國論》", author: "蘇洵", genre: "wen", folderId: "1MiCDqr7cdyPEB1dfeg4evcXMaRi_-xOn", folder: "《六國論》", totalPages: 29,
                texts:[
                    "六國破滅，非兵不利，戰不善，弊在賂秦。", "賂秦而力虧，破滅之道也。", "或曰：「六國互喪，率賂秦耶？」",
                    "曰：「不賂者以賂者喪。蓋失強援，不能獨完。故曰弊在賂秦也。」", "秦以攻取之外，小則獲邑，大則得城。",
                    "較秦之所得，與戰勝而得者，其實百倍；", "諸侯之所亡，與戰敗而亡者，其實亦百倍。", "則秦之所大欲，諸侯之所大患，固不在戰矣。",
                    "思厥先祖父，暴霜露，斬荊棘，以有尺寸之地。", "子孫視之不甚惜，舉以予人，如棄草芥。", "今日割五城，明日割十城，然後得一夕安寢。",
                    "起視四境，而秦兵又至矣。", "然則諸侯之地有限，暴秦之欲無厭，奉之彌繁，侵之愈急。", "故不戰而強弱勝負已判矣。",
                    "至於顛覆，理固宜然。", "古人云：「以地事秦，猶抱薪救火，薪不盡，火不滅。」", "此言得之。",

        // ==========================================
        // 2. IndexedDB 圖片快取系統
        // ==========================================
        const DB_NAME = "DSEComicDB";
        const STORE_NAME = "ImageCache";
        const sessionBlobUrls = new Map();

        const dbPromise = new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME, { keyPath: "url" });
            };
            request.onsuccess = (e) => resolve(e.target.result);
            request.onerror = (e) => reject(e.target.error);
        });

        async function getCachedImageURL(url) {
            if (sessionBlobUrls.has(url)) return sessionBlobUrls.get(url);
            try {
                const db = await dbPromise;
                const tx = db.transaction(STORE_NAME, "readonly");
                const store = tx.objectStore(STORE_NAME);
                const cached = await new Promise(resolve => {
                    const req = store.get(url);
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => resolve(null);
                });

                if (cached && cached.blob) {
                    const objUrl = URL.createObjectURL(cached.blob);
                    sessionBlobUrls.set(url, objUrl);
                    return objUrl;
                }

                const response = await fetch(url, { mode: 'cors', cache: 'reload' });
                if (!response.ok) throw new Error("Network response not ok");
                
                const blob = await response.blob();
                const txWrite = db.transaction(STORE_NAME, "readwrite");
                txWrite.objectStore(STORE_NAME).put({ url, blob });
                
                const objUrl = URL.createObjectURL(blob);
                sessionBlobUrls.set(url, objUrl);
                return objUrl;
            } catch (error) { return url; }
        }

            const fetchPromise = fetch(`${GAS_URL}?folderId=${encodeURIComponent(folderId || "")}&folder=${encodeURIComponent(folder || "")}`)
                .then(res => res.json())
                .then(fileMap => {
                    if (!fileMap.error) localStorage.setItem(cacheKey, JSON.stringify(fileMap));
                    return fileMap;
                }).catch(() => { return { error: "Network error" }; });
            return parsedData || await fetchPromise;
        }

                            <div class="comic-pages-top"></div>
                            <img id="${imgId}" class="comic-cover-img" src="${placeholderImg}" alt="${data.title}">
                            <div class="comic-pages-edge"></div>
                            ${badgeHtml}
                        </div>
                    `;

                    if (isAvailable) {
                        book.onclick = () => loadComic(key);
                        fetchCoverImage(data.folderId, data.folder, imgId);
                    }
                    
                    slot.appendChild(book);
                    grid.appendChild(slot);
                }
            }
        }

        async function fetchCoverImage(folderId, folder, imgId) {
            try {
                const fileMap = await getFileMap(folderId, folder);
                if (!fileMap.error) {
                    const coverKey = Object.keys(fileMap).find(name => parseInt(name.match(/\d+/) ||[-1], 10) === 0);
                    if (coverKey) {
                        const imgVer = parseInt(localStorage.getItem('dse_img_ver') || '0');
                        const driveUrl = `https://drive.google.com/thumbnail?id=${fileMap[coverKey]}&sz=w${600 + imgVer}`;
                        const localUrl = await getCachedImageURL(driveUrl);
                        const imgEl = document.getElementById(imgId);
                        if(imgEl) imgEl.src = localUrl;
                    }
                }
            } catch (e) {}
        }

        function showCatalog() {
            readerView.style.display = 'none';
            catalogView.style.display = 'flex';
            if (pageFlip) { pageFlip.destroy(); pageFlip = null; }
            bookWrapper.innerHTML = '<div id="book"></div>';
            bookElement = document.getElementById('book');
            scrollWrapper.innerHTML = '';
            currentComicKey = null;
        }

        document.getElementById('btn-back').addEventListener('click', showCatalog);

        // ==========================================
        // 4. UI 渲染：漫畫內頁與進度系統
        // ==========================================
        async function loadComic(comicKey) {
            currentComicData = comicDatabase[comicKey];
            if (!currentComicData || currentComicData.totalPages === 0) return;

            currentComicKey = comicKey;
            catalogView.style.display = 'none';
            readerView.style.display = 'flex';
            loading.style.display = 'block';
            readerTitle.innerText = currentComicData.title;

            try {
                const fileMap = await getFileMap(currentComicData.folderId, currentComicData.folder);
                if (fileMap.error) throw new Error(fileMap.error);

                currentFilesArray = Object.keys(fileMap)
                    .map(name => ({ name: name, id: fileMap[name] }))
                    .filter(file => parseInt(file.name.match(/\d+/) || [-1], 10) !== 0)
                    .sort((a, b) => parseInt(a.name.match(/\d+/) || [0], 10) - parseInt(b.name.match(/\d+/) ||[0], 10));

                updateModeButtonUI();

                // 檢查是否有儲存的閱讀進度
                let savedProgress = localStorage.getItem(`comic_progress_${comicKey}`);
                if (savedProgress) {
                    savedProgress = parseInt(savedProgress, 10);
                    if (savedProgress > 1 && savedProgress <= currentComicData.totalPages) {
                        loading.style.display = 'none';
                        showResumeDialog(comicKey, savedProgress);
                        return; // 等待用家回應
                    }
                }

                startReading(comicKey, 1);

            } catch (error) {
                alert("獲取漫畫資料失敗。");
                showCatalog();
                loading.style.display = 'none';
            }
        }

        function showResumeDialog(comicKey, pageNum) {
            document.getElementById('resume-page-num').innerText = pageNum;
            const dialog = document.getElementById('resume-dialog');
            dialog.style.display = 'flex';
            
            document.getElementById('btn-resume-yes').onclick = () => {
                dialog.style.display = 'none';
                loading.style.display = 'block';
                setTimeout(() => startReading(comicKey, pageNum), 50);
            };
            document.getElementById('btn-resume-no').onclick = () => {
                dialog.style.display = 'none';
                loading.style.display = 'block';
                setTimeout(() => startReading(comicKey, 1), 50);
            };
        }

        function startReading(comicKey, startPage) {
            renderCurrentMode(startPage);
            loading.style.display = 'none';
        }

        // --- 動態改變模式切換按鈕的顏色 ---
        function updateModeButtonUI() {
            btnToggleMode.classList.remove('btn-yellow', 'btn-green');
            if (readMode === 'flip') {
                btnToggleMode.classList.add('btn-yellow');
                modeIcon.innerHTML = `<svg viewBox="0 0 24 24"><rect x="5" y="3" width="14" height="18" rx="2"/><line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="11" x2="15" y2="11"/><line x1="9" y1="15" x2="15" y2="15"/></svg>`;
                modeText.innerText = "切換至捲動";
            } else {
                btnToggleMode.classList.add('btn-green');
                modeIcon.innerHTML = `<svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>`;
                modeText.innerText = "切換至翻頁";
            }
        }

        btnToggleMode.addEventListener('click', () => {
            readMode = readMode === 'flip' ? 'scroll' : 'flip';
            updateModeButtonUI();
            
            // 模式切換時讀取最新進度，無縫接軌
            let saved = localStorage.getItem(`comic_progress_${currentComicKey}`);
            let currentStartPage = saved ? parseInt(saved, 10) : 1;
            renderCurrentMode(currentStartPage);
        });

       function renderCurrentMode(startPage = 1) {
    if (!currentComicKey) return;
    if (pageFlip) { pageFlip.destroy(); pageFlip = null; }
    bookWrapper.innerHTML = '<div id="book"></div>';
    bookElement = document.getElementById('book');
    scrollWrapper.innerHTML = '';

    if (readMode === 'flip') {
        bookWrapper.style.display = 'flex';
        scrollWrapper.style.display = 'none';
        controlsBottom.style.display = 'flex';
        renderFlipMode(startPage);
    } else {
        bookWrapper.style.display = 'none';
        scrollWrapper.style.display = 'flex';
        controlsBottom.style.display = 'none';
        renderScrollMode(startPage);
    }

    loadImagesIntoDOM();
}
        // --- 翻頁模式 ---
        function renderFlipMode(startPage) {
            let pagesHTML = '';
            const isPortrait = window.innerHeight > window.innerWidth || window.innerWidth <= 768;
            window.panelsPerPage = isPortrait ? 2 : 1; 
            const totalFlipPages = Math.ceil(currentComicData.totalPages / window.panelsPerPage);

            for (let i = 0; i < totalFlipPages; i++) {
                let contentHTML = '';
                for (let j = 0; j < window.panelsPerPage; j++) {
                    const actualPageIndex = i * window.panelsPerPage + j + 1;
                    if (actualPageIndex > currentComicData.totalPages) break;
                    
                    const imgId = `page-img-${currentComicKey}-${actualPageIndex}`;
                    const pageText = (currentComicData.texts && currentComicData.texts[actualPageIndex - 1]) ? currentComicData.texts[actualPageIndex - 1] : '';
                    const textDiv = pageText ? `<div class="page-text" style="transition: background-color 0.5s;">${pageText}</div>` : '';
                    
                    const borderStyle = (window.panelsPerPage > 1 && j === 0 && actualPageIndex < currentComicData.totalPages) 
                        ? 'border-bottom: 4px solid var(--comic-black);' : '';

                    contentHTML += `
                        <div class="page-content" style="flex: 1; min-height: 0; width: 100%; ${borderStyle}">
                            <img id="${imgId}" src="${placeholderImg}" alt="第${actualPageIndex}頁" onerror="this.onerror=null; this.src='${errorImgSafe}'" onclick="openLightbox(this.src)">
                            ${textDiv}
                        </div>
                    `;
                }
                pagesHTML += `<div class="page"><div style="width: 100%; height: 100%; display: flex; flex-direction: column;">${contentHTML}</div></div>`;
            }
            bookElement.innerHTML = pagesHTML;
            
            setTimeout(() => {
                initPageFlip(startPage);
                bookElement.style.display = 'block';
            }, 300);
        }

        function initPageFlip(startPage) {
            const isPortrait = window.panelsPerPage === 2;
            pageFlip = new St.PageFlip(bookElement, {
                width: 700, height: isPortrait ? 960 : 480, 
                size: "stretch", minWidth: 300, maxWidth: 900, minHeight: 200, maxHeight: isPortrait ? 1500 : 700, 
                maxShadowOpacity: 0.5, showCover: true, usePortrait: true, mobileScrollSupport: false, useMouseEvents: false    
            });
            pageFlip.loadFromHTML(document.querySelectorAll('.page'));
            
            let startFlipPage = 0;
            if (startPage > 1) {
                startFlipPage = Math.ceil(startPage / window.panelsPerPage) - 1;
                // 即時跳轉至上次進度
                pageFlip.turnToPage(startFlipPage);
            }
            
            pageFlip.on('flip', (e) => { 
                updatePageInfo(e.data); 
                playFlipSound(); 
                saveFlipProgress(e.data);
            });
            updatePageInfo(startFlipPage);
        }

        function saveFlipProgress(flipPageIndex) {
            if (!currentComicKey) return;
            const panelIndex = flipPageIndex * window.panelsPerPage + 1;
            localStorage.setItem(`comic_progress_${currentComicKey}`, panelIndex);
        }

        // --- 捲動模式 (條漫) ---
       // --- 捲動模式 (條漫) ---
function renderScrollMode(startPage) {
    let html = '';
    for (let i = 1; i <= currentComicData.totalPages; i++) {
        const imgId = `page-img-${currentComicKey}-${i}`;
        const pageText = (currentComicData.texts && currentComicData.texts[i - 1]) ? currentComicData.texts[i - 1] : '';
        const textDiv = pageText ? `<div class="page-text" style="transition: background-color 0.5s;">${pageText}</div>` : '';
        
        html += `
            <div class="scroll-panel" id="scroll-panel-${currentComicKey}-${i}">
                <div class="page-content">
                    <img id="${imgId}" src="${placeholderImg}" alt="第${i}圖" onerror="this.onerror=null; this.src='${errorImgSafe}'" onclick="openLightbox(this.src)">
                    ${textDiv}
                </div>
            </div>
        `;
    }
    scrollWrapper.innerHTML = html;

    // 設置 Intersection Observer 監聽捲動進度
    if (scrollObserver) scrollObserver.disconnect();
    scrollObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const panelId = entry.target.id;
                const parts = panelId.split('-');
                const pageNum = parseInt(parts[parts.length - 1], 10);
                if (currentComicKey) {
                    localStorage.setItem(`comic_progress_${currentComicKey}`, pageNum);
                }
            }
        });
    }, { threshold: 0.5 });
    
    document.querySelectorAll('.scroll-panel').forEach(panel => scrollObserver.observe(panel));

    // 強制精準滾動修復：確保切換模式時，畫面完美對齊當前進度的圖幅
    setTimeout(() => {
        if (startPage <= 1) {
            // 如果是第 1 頁，強制回到最頂部
            window.scrollTo({ top: 0, left: 0, behavior: 'instant' });
        } else {
            // 如果是其他頁數，精準定位並扣除頂部 Header 的高度 (約 80px)
            const targetEl = document.getElementById(`scroll-panel-${currentComicKey}-${startPage}`);
            if (targetEl) {
                const headerOffset = 80; 
                const elementPosition = targetEl.getBoundingClientRect().top;
                const offsetPosition = elementPosition + window.pageYOffset - headerOffset;
                window.scrollTo({ top: offsetPosition, behavior: 'instant' });
            }
        }
    }, 150); // 設定 150ms 延遲，確保 DOM 與圖片外框已完全撐開
}

        function loadImagesIntoDOM() {
            const activeKey = currentComicKey;
            const imgVer = parseInt(localStorage.getItem('dse_img_ver') || '0');
            
            for (let i = 1; i <= currentComicData.totalPages; i++) {
                const file = currentFilesArray[i - 1]; 
                if (file && file.id) {
                    const driveUrl = `https://drive.google.com/thumbnail?id=${file.id}&sz=w${1500 + imgVer}`;
                    getCachedImageURL(driveUrl).then(localUrl => {
                        if (activeKey !== currentComicKey) return; 
                        const imgEl = document.getElementById(`page-img-${activeKey}-${i}`);
                        if (imgEl) imgEl.src = localUrl;
                    });
                }
            }
        }

        // ==========================================
        // 5. 播放器與雜項
        // ==========================================
       // --- 替換這段更新頁面資訊的函數 ---
function updatePageInfo(currentPageIndex) {
    if (!currentComicData) return;
    
    // 總頁數顯示為實際漫畫圖幅數，不再除以 2
    pageInput.max = currentComicData.totalPages;
    totalPagesSpan.textContent = currentComicData.totalPages;
    
    // 計算當前看到第幾幅圖
    let currentPanel = (currentPageIndex + 1) * window.panelsPerPage;
    // 如果計算結果超出總頁數（例如最後一頁只剩一幅圖），則顯示總頁數
    if (currentPanel > currentComicData.totalPages) {
        currentPanel = currentComicData.totalPages;
    }
    
    pageInput.value = currentPanel;
}

// --- 替換這段輸入框的監聽器 ---
pageInput.addEventListener('change', (e) => {
    if (!pageFlip) return;
    let target = parseInt(e.target.value, 10);
    if (target >= 1 && target <= parseInt(pageInput.max, 10)) {
        // 將用家輸入的圖幅數，反向轉換回實體翻頁的 Index 進行跳轉
        let flipPageIndex = Math.ceil(target / window.panelsPerPage) - 1;
        pageFlip.flip(flipPageIndex);
    }
});

        document.getElementById('btn-prev').addEventListener('click', () => { if (pageFlip) pageFlip.flipPrev(); });
        document.getElementById('btn-next').addEventListener('click', () => { if (pageFlip) pageFlip.flipNext(); });
        pageInput.addEventListener('change', (e) => {
            if (!pageFlip) return;
            let target = parseInt(e.target.value, 10);
            if (target >= 1 && target <= pageInput.max) pageFlip.flip(target - 1);
        });

        function playFlipSound() {
            const flipAudio = document.getElementById('flip-sound');
            if (flipAudio) { flipAudio.currentTime = 0; flipAudio.play().catch(()=>{}); }
        }

        function openLightbox(imgSrc) {
            if(imgSrc.includes('data:image/svg+xml')) return;
            document.getElementById('lightbox-img').src = imgSrc;
            document.getElementById('lightbox').style.display = 'flex';
        }
        function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }

        // ==========================================
        // 6. 全文搜尋系統
        // ==========================================
        const searchInput = document.getElementById('search-input');
        const searchResults = document.getElementById('search-results');

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.trim().toLowerCase();
            searchResults.innerHTML = '';
            if (!query) { searchResults.style.display = 'none'; return; }
            
            let results =[];
            for (const [key, data] of Object.entries(comicDatabase)) {
                if (!data.texts) continue;
                data.texts.forEach((text, index) => {
                    if (text.toLowerCase().includes(query)) {
                        results.push({ comicKey: key, title: data.title, page: index + 1, text: text });
                    }
                });
            }
            
            if (results.length > 0) {
                results.slice(0, 15).forEach(res => {
                    const div = document.createElement('div');
                    div.className = 'search-item';
                    const regex = new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
                    const highlighted = res.text.replace(regex, match => `<span class="highlight">${match}</span>`);
                    div.innerHTML = `<strong>${res.title} (分鏡 ${res.page})</strong>${highlighted}`;
                    div.onclick = () => { jumpToSearch(res.comicKey, res.page); searchResults.style.display = 'none'; searchInput.value = ''; };
                    searchResults.appendChild(div);
                });
            } else {
                searchResults.innerHTML = '<div class="search-item">找不到相關內容...</div>';
            }
            searchResults.style.display = 'block';
        });

        document.addEventListener('click', (e) => { if (!e.target.closest('#search-container')) searchResults.style.display = 'none'; });

        async function jumpToSearch(comicKey, panelIndex) {
            if (currentComicKey !== comicKey) {
                currentComicData = comicDatabase[comicKey];
                currentComicKey = comicKey;
                catalogView.style.display = 'none';
                readerView.style.display = 'flex';
                loading.style.display = 'block';
                readerTitle.innerText = currentComicData.title;
                
                try {
                    const fileMap = await getFileMap(currentComicData.folderId, currentComicData.folder);
                    currentFilesArray = Object.keys(fileMap)
                        .map(name => ({ name: name, id: fileMap[name] }))
                        .filter(file => parseInt(file.name.match(/\d+/) || [-1], 10) !== 0)
                        .sort((a, b) => parseInt(a.name.match(/\d+/) || [0], 10) - parseInt(b.name.match(/\d+/) ||[0], 10));
                    updateModeButtonUI();
                    
                    // 搜尋跳轉直接略過詢問視窗
                    startReading(comicKey, panelIndex);
                } catch (e) {
                    showCatalog();
                }
            } else {
                navigateReaderTo(panelIndex);
            }
            
            // 處理搜尋結果高光特效
            setTimeout(() => {
                const imgEl = document.getElementById(`page-img-${comicKey}-${panelIndex}`);
                if(imgEl) {
                    const textEl = imgEl.parentElement.querySelector('.page-text');
                    if(textEl) {
                        textEl.style.transition = 'background-color 0.2s';
                        textEl.style.backgroundColor = 'var(--comic-yellow)';
                        setTimeout(() => {
                            textEl.style.transition = 'background-color 2s';
                            textEl.style.backgroundColor = 'var(--comic-white)';
                        }, 2500);
                    }
                }
            }, readMode === 'scroll' ? 500 : 800);
        }

        function navigateReaderTo(panelIndex) {
            if (readMode === 'scroll') {
                const targetEl = document.getElementById(`scroll-panel-${currentComicKey}-${panelIndex}`);
                if (targetEl) targetEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            } else {
                if(pageFlip) {
                    const flipPageIndex = Math.ceil(panelIndex / window.panelsPerPage) - 1;
                    pageFlip.flip(flipPageIndex);
                }
            }
        }

        // ==========================================
        // 7. 更新與清理功能
        // ==========================================
        document.getElementById('btn-update').addEventListener('click', async () => {
            const btn = document.getElementById('btn-update');
            btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.32-9.83l.98 2.26"/></svg>`;
            btn.style.pointerEvents = "none";
            btn.style.opacity = "0.5";

            try {
                let imgVer = parseInt(localStorage.getItem('dse_img_ver') || '0') + 1;
                localStorage.setItem('dse_img_ver', imgVer > 50 ? 0 : imgVer);
                Object.keys(localStorage).forEach(key => { if (key.startsWith('dse_comic_map_')) localStorage.removeItem(key); });
                const db = await dbPromise; db.close();
                await new Promise(res => { const req = indexedDB.deleteDatabase(DB_NAME); req.onsuccess = res; req.onerror = res; req.onblocked = res; });
                window.location.reload();
            } catch (error) { window.location.reload(); }
        });

        window.addEventListener('DOMContentLoaded', renderCatalog);

    </script>
