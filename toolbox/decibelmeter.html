<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>分貝計</title>
<!-- 引入帶有終端機與工業感的字體 -->
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
<!-- 引入 Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
:root {
/* 工業/恐怖風格核心色票 */
--bg-color: #050608;
--metal-dark: #1a1c20;
--metal-base: #2a2d34;
--metal-light: #444952;
--screen-bg: #020406;
--primary-text-color: #5a8b96; /* 冰冷黯淡的藍綠色 */
--secondary-text-color: #3d5a63;
--warning-color: #a30000; /* 血紅色 */
--warning-glow: #ff1a1a;
--modal-bg: #141518;
}

* { box-sizing: border-box; }

body {
font-family: 'Noto Sans TC', 'Share Tech Mono', sans-serif;
margin: 0;
padding: 15px;
display: flex;
justify-content: center;
align-items: center;
min-height: 100vh;
background-color: var(--bg-color);
color: var(--primary-text-color);
overflow: hidden; /* 隱藏滾動條，讓 3D 背景滿版 */
position: relative;
transition: background-color 0.1s;
}

/* Three.js 畫布容器 */
#canvas-container {
position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
z-index: -1;
}

/* 復古 CRT / 監視器掃描線 */
body::after {
content: "";
position: fixed;
top: 0; left: 0; width: 100vw; height: 100vh;
background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%);
background-size: 100% 4px;
pointer-events: none;
z-index: 999;
opacity: 0.4;
}

/* 暗角效果 (Vignette) 增加幽閉感 */
.vignette {
position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
background: radial-gradient(circle at center, transparent 30%, #000000 120%);
pointer-events: none;
z-index: 0;
}

/* 主機體：金屬工業儀表板 */
.decibel-meter {
width: 100%;
max-width: 650px;
/* 仿金屬材質漸層與內外陰影 */
background: linear-gradient(135deg, var(--metal-light) 0%, var(--metal-base) 40%, var(--metal-dark) 100%);
border: 2px solid #000;
border-top: 2px solid #555;
border-left: 2px solid #444;
border-radius: 12px;
padding: 40px;
box-shadow: 0 30px 60px rgba(0,0,0,0.9), inset 0 0 40px rgba(0,0,0,0.6);
position: relative;
z-index: 1;
transition: all 0.1s;
}

/* 面板四角的工業螺絲 */
.decibel-meter::before {
content: '';
position: absolute;
top: 15px; left: 15px; right: 15px; bottom: 15px;
pointer-events: none;
background-image: 
    radial-gradient(circle at 0 0, #111 4px, transparent 5px),
    radial-gradient(circle at 100% 0, #111 4px, transparent 5px),
    radial-gradient(circle at 0 100%, #111 4px, transparent 5px),
    radial-gradient(circle at 100% 100%, #111 4px, transparent 5px);
background-position: 0 0, 100% 0, 0 100%, 100% 100%;
background-repeat: no-repeat;
background-size: 10px 10px;
opacity: 0.6;
}

/* 顯示器螢幕區域 (內凹玻璃感) */
.display {
background: var(--screen-bg);
border: 4px solid #0a0c0f;
border-bottom-color: #222;
border-right-color: #222;
border-radius: 8px;
padding: 30px 20px;
box-shadow: inset 0 0 30px #000, inset 0 0 10px rgba(90, 139, 150, 0.05);
position: relative;
overflow: hidden;
transition: box-shadow 0.1s;
}

/* 螢幕反光 */
.display::after {
content: '';
position: absolute;
top: -50%; left: -50%; width: 200%; height: 200%;
background: linear-gradient(to bottom right, rgba(255,255,255,0.03) 0%, transparent 40%, transparent 100%);
transform: rotate(-15deg);
pointer-events: none;
}

.current-db-display {
font-size: 7.5rem;
font-family: 'Share Tech Mono', monospace;
font-weight: 700;
line-height: 1;
margin-bottom: 30px;
text-align: center;
text-shadow: 0 0 15px rgba(90, 139, 150, 0.3);
letter-spacing: -2px;
}

.current-db-display span {
font-family: 'Noto Sans TC', sans-serif;
font-size: 2rem;
font-weight: 400;
margin-left: 5px;
color: var(--secondary-text-color);
}

.info-display {
display: grid;
gap: 15px;
margin-top: 20px;
margin-bottom: 15px;
}

.info-display.with-exceedance { grid-template-columns: 60% 40%; }
.info-display.without-exceedance { grid-template-columns: 100%; }

/* 內部數據小框 */
.info-box, .timer-box {
display: flex;
flex-direction: column;
padding: 15px;
background: #06080a;
border: 1px solid #151a20;
border-radius: 4px;
position: relative;
box-shadow: inset 0 2px 5px rgba(0,0,0,0.8);
}

.info-box.avg-highlight {
background: #080c10;
border-color: #1c2833;
}

.info-box.exceedance-counter {
background: #0a0303;
border-color: #330d0d;
}

.info-box .value, .timer-box .value {
font-family: 'Share Tech Mono', monospace;
font-size: 2.8rem;
font-weight: 700;
margin-bottom: 5px;
color: var(--primary-text-color);
text-align: center;
}

.info-box.avg-highlight .value {
color: #7ab4c2;
text-shadow: 0 0 10px rgba(122, 180, 194, 0.4);
}

.info-box.exceedance-counter .value {
color: var(--warning-color);
text-shadow: 0 0 10px rgba(163, 0, 0, 0.6);
}

.timer-box .value {
color: #5a8b96;
}

.info-box .label, .timer-box .label {
font-size: 0.95rem;
color: var(--secondary-text-color);
font-weight: bold;
letter-spacing: 1px;
text-align: center;
}

.info-box.exceedance-counter .label {
color: #7a1f1f;
}

.warning-value {
position: absolute;
bottom: 5px; right: 8px;
font-family: 'Share Tech Mono', monospace;
font-size: 0.75rem;
color: #4a1515;
}
.info-box.avg-highlight .warning-value {
color: #7ab4c2;
text-shadow: 0 0 8px rgba(122, 180, 194, 0.5);
}
.info-box.exceedance-counter .warning-value {
color: var(--warning-color);
text-shadow: 0 0 8px rgba(163, 0, 0, 0.7);
}

/* 減1次數按鈕 (工業開關風) */
.mecha-btn-sub {
position: absolute;
top: 5px; right: 5px;
background: #111;
border: 1px solid #330d0d;
color: #7a1f1f;
font-family: 'Share Tech Mono', monospace;
cursor: pointer;
padding: 2px 6px;
font-size: 0.8rem;
border-radius: 2px;
transition: all 0.1s;
box-shadow: 0 2px 0 #000;
z-index: 10;
}

.mecha-btn-sub:hover {
background: #1a0505;
color: var(--warning-color);
border-color: var(--warning-color);
}

.mecha-btn-sub:active {
transform: translateY(2px);
box-shadow: 0 0 0 #000;
}

/* 警告次數燈號 (LED) */
.exceedance-indicators {
display: flex;
justify-content: center;
gap: 6px;
margin-top: 8px;
}

.exceedance-dot {
width: 12px; height: 12px;
border-radius: 50%;
background-color: #111;
border: 1px solid #000;
box-shadow: inset 0 2px 3px rgba(0,0,0,0.8), 0 1px 0 rgba(255,255,255,0.1);
transition: all 0.2s ease;
}

.exceedance-dot.exceeded {
background-color: var(--warning-color);
border-color: var(--warning-glow);
box-shadow: 0 0 8px var(--warning-glow), inset 0 0 4px #fff;
}

/* 底部操作按鈕區 */
.controls {
display: flex;
justify-content: center;
align-items: center;
gap: 30px;
margin-top: 25px;
}

/* 金屬實體按鈕 */
.icon-btn {
background: linear-gradient(to bottom, #3a3f44, #222529);
border: 2px solid #000;
border-top-color: #555;
border-left-color: #444;
border-radius: 50%;
cursor: pointer;
padding: 18px;
color: #7ab4c2;
box-shadow: 0 5px 15px rgba(0,0,0,0.6), inset 0 2px 4px rgba(255,255,255,0.1);
transition: all 0.1s ease;
display: flex;
justify-content: center;
align-items: center;
width: 65px; height: 65px;
}

.icon-btn:hover {
background: linear-gradient(to bottom, #444a50, #2a2e33);
color: #fff;
}

.icon-btn:active {
transform: translateY(4px);
box-shadow: 0 1px 5px rgba(0,0,0,0.8), inset 0 4px 8px rgba(0,0,0,0.6);
border-top-color: #111;
border-left-color: #111;
}

.icon-btn:disabled {
cursor: not-allowed;
opacity: 0.5;
color: #333;
}

.icon-btn svg {
width: 24px; height: 24px;
fill: currentColor;
filter: drop-shadow(0 0 2px rgba(122,180,194,0.3));
}

#playPauseBtn .pause-icon { display: none; }
#playPauseBtn.playing .play-icon { display: none; }
#playPauseBtn.playing .pause-icon { display: block; }

#playPauseBtn {
background: linear-gradient(to bottom, #2b454d, #142329);
color: #a0f0ff;
border-top-color: #4a7582;
width: 80px; height: 80px;
}

#playPauseBtn.playing {
background: linear-gradient(to bottom, #4d1515, #260505);
color: #ff6666;
border-top-color: #822a2a;
}
#playPauseBtn.playing svg {
filter: drop-shadow(0 0 4px rgba(255,102,102,0.5));
}

/* =========================================
   🚨 全屏幕強烈閃爍特效 (FULL SCREEN FLASH)
   ========================================= */

/* 1. 背景全屏閃紅 */
body.warning-flash {
animation: hazard-bg-flash 0.5s infinite;
}
@keyframes hazard-bg-flash {
0%, 100% { background-color: #7a0000; } /* 強烈深紅 */
50% { background-color: var(--bg-color); }
}

/* 2. 金屬機體邊框爆紅光 */
body.warning-flash .decibel-meter {
animation: hazard-box-flash 0.5s infinite;
}
@keyframes hazard-box-flash {
0%, 100% { 
    box-shadow: 0 0 80px rgba(255, 0, 0, 0.5), inset 0 0 30px rgba(255, 0, 0, 0.4); 
    border-color: #ff3333; 
}
50% { 
    box-shadow: 0 30px 60px rgba(0,0,0,0.9), inset 0 0 40px rgba(0,0,0,0.6); 
    border-color: #000; 
}
}

/* 3. 螢幕內部閃紅光 */
body.warning-flash .display {
animation: hazard-screen-flash 0.5s infinite;
}
@keyframes hazard-screen-flash {
0%, 100% { box-shadow: inset 0 0 60px rgba(255, 0, 0, 0.7); }
50% { box-shadow: inset 0 0 30px #000; }
}


/* 設定彈窗 - 金屬終端機風格 */
.modal {
display: none;
position: fixed;
z-index: 1000;
left: 0; top: 0; width: 100%; height: 100%;
background-color: rgba(0,0,0,0.9);
backdrop-filter: blur(4px);
align-items: center;
justify-content: center;
}

.modal-content {
background-color: var(--modal-bg);
border: 2px solid #333;
border-top: 2px solid #555;
padding: 30px 40px;
width: 90%; max-width: 500px;
box-shadow: 0 20px 50px #000;
max-height: 85vh;
overflow-y: auto;
position: relative;
color: #8faeb8;
}

.modal-content::-webkit-scrollbar { width: 8px; background: #0a0c0f; }
.modal-content::-webkit-scrollbar-thumb { background: #2a343d; border-radius: 4px; }

.modal-header {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 25px;
border-bottom: 1px solid #222;
padding-bottom: 10px;
}

.modal-header h2 {
margin: 0; font-size: 1.6rem;
color: #5a8b96;
letter-spacing: 1px;
}

.close-btn {
color: #555;
font-size: 28px;
cursor: pointer;
background: none; border: none;
transition: color 0.2s;
}
.close-btn:hover { color: #fff; }

.form-group { margin-bottom: 20px; text-align: left; }
.form-group label {
display: block; margin-bottom: 8px;
font-size: 1rem; color: #698a94;
}

.form-group input[type="number"] {
width: 100%; padding: 10px;
background-color: #06080a;
border: 1px solid #1c262e;
color: #7ab4c2; font-family: 'Share Tech Mono', monospace;
font-size: 1.1rem;
box-shadow: inset 0 2px 4px #000;
}
.form-group input:focus { outline: none; border-color: #3d5a63; }

.form-group input[type="checkbox"] {
appearance: none; width: 18px; height: 18px;
background: #06080a; border: 1px solid #3d5a63;
margin-right: 10px; cursor: pointer;
position: relative;
}
.form-group input[type="checkbox"]:checked::after {
content: '■'; position: absolute;
top: -2px; left: 2px; color: #5a8b96; font-size: 14px;
}

.checkbox-group { display: flex; align-items: center; margin-top: 10px; }

.calibration-section {
margin-top: 25px; padding-top: 20px;
border-top: 1px solid #222;
}
.calibration-title {
font-size: 1.1rem; color: #5a8b96; margin-bottom: 10px;
}
.calibration-btn {
padding: 10px; width: 100%;
background: #11151a; border: 1px solid #2a3d45;
color: #5a8b96; font-weight: bold;
cursor: pointer; transition: 0.2s;
margin-bottom: 15px;
}
.calibration-btn:hover:not(:disabled) { background: #1c2b33; color: #fff; }
.calibration-info {
background: #06080a; padding: 12px;
font-size: 0.9rem; color: #4b6b75; border-left: 2px solid #2a3d45;
}

#saveSettingsBtn {
width: 100%; padding: 15px;
background: linear-gradient(to bottom, #2b454d, #142329);
border: 1px solid #111; border-top-color: #4a7582;
color: #a0f0ff; font-size: 1.2rem; font-weight: bold;
cursor: pointer; margin-top: 20px;
}
#saveSettingsBtn:hover { filter: brightness(1.2); }
#saveSettingsBtn:active { border-top-color: #111; box-shadow: inset 0 4px 8px #000; }

/* 須留堂通知 - 紅色故障風，保留原本文案 */
.detention-notice {
display: none;
position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
background: rgba(10, 0, 0, 0.95);
z-index: 2000;
justify-content: center; align-items: center;
/* 雜訊紋理背景 */
background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)" opacity="0.05"/%3E%3C/svg%3E');
}

.detention-content {
background: #050000;
border: 2px solid #ff0000;
padding: 40px; text-align: center;
box-shadow: inset 0 0 50px rgba(255,0,0,0.2), 0 0 30px rgba(255,0,0,0.4);
max-width: 450px; width: 90%;
animation: glitch-anim 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
}

.detention-icon {
font-size: 3.5rem; margin-bottom: 10px;
text-shadow: 0 0 10px #ff0000;
}

.detention-title {
font-size: 2.5rem; font-weight: 700; color: #ff0000;
margin-bottom: 15px; letter-spacing: 2px;
border-bottom: 1px solid #330000; padding-bottom: 10px;
}

.detention-message {
font-size: 1.2rem; color: #cc6666; margin-bottom: 30px; line-height: 1.5; font-weight: bold;
}

.detention-dismiss {
background: #330000; border: 1px solid #ff0000;
color: #ffcccc; padding: 12px 30px;
font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s;
}
.detention-dismiss:hover { background: #660000; color: #fff; box-shadow: 0 0 15px #ff0000; }

@keyframes glitch-anim {
0% { transform: scale(0.9) skewX(5deg); opacity: 0; filter: blur(5px); }
50% { transform: scale(1.05) skewX(-5deg); opacity: 0.8; filter: blur(0); }
100% { transform: scale(1) skewX(0); opacity: 1; }
}

@media (max-width: 768px) {
.decibel-meter { padding: 30px 20px; }
.current-db-display { font-size: 6rem; }
.info-display.with-exceedance { grid-template-columns: 1fr; }
}

.copyright-footer {
position: fixed; bottom: 0; right: 0; padding: 5px 15px; z-index: 100;
}
.copyright-footer p {
margin: 0; font-size: 12px; color: #3d5a63;
}
</style>
</head>
<body>

<!-- Three.js 背景容器 -->
<div id="canvas-container"></div>
<!-- 暗角增加氛圍 -->
<div class="vignette"></div>

<div class="decibel-meter">
<div class="display">
<div class="current-db-display">
<span id="currentDbValue">--</span><span>dB</span>
</div>
<div class="info-display with-exceedance" id="infoDisplay">
<div class="info-box avg-highlight">
<span id="avgDbValue" class="value">--</span>
<span class="label">平均分貝</span>
<span class="warning-value" id="avgWarningValue">40dB</span>
</div>
<div class="info-box exceedance-counter" id="exceedanceBox">
<span id="exceedanceValue" class="value">0</span>
<span class="label">次數</span>
<span class="warning-value" id="exceedanceWarningValue">47dB</span>
<div class="exceedance-indicators" id="exceedanceIndicators"></div>
<!-- 減 1 次數按鈕 -->
<button id="decrementExceedanceBtn" class="mecha-btn-sub" title="扣減一次超標次數">-1</button>
</div>
</div>
<div class="timer-section">
<div class="timer-box">
<span id="timerValue" class="value">15:00</span>
<span class="label">剩餘時間</span>
</div>
</div>
</div>

<div class="controls">
<button id="settingsBtn" class="icon-btn" title="設定">
<svg viewBox="0 0 24 24"><path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17-.59-1.69-.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg>
</button>
<button id="playPauseBtn" class="icon-btn" title="開始">
<svg class="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
<svg class="pause-icon" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
</button>
</div>
</div>

<!-- Settings Modal -->
<div id="settingsModal" class="modal">
<div class="modal-content">
<div class="modal-header">
<h2>設定</h2>
<span class="close-btn">&times;</span>
</div>
<div class="form-group">
<label for="durationInput">倒數時間 (分鐘)</label>
<input type="number" id="durationInput" value="15" min="1">
</div>
<div class="form-group">
<label for="thresholdInput">平均分貝警示值 (dB)</label>
<input type="number" id="thresholdInput" value="40" min="0">
</div>
<div class="form-group">
<label for="maxDbInput">單次最高分貝限制 (dB)</label>
<input type="number" id="maxDbInput" value="47" min="0">
</div>
<div class="form-group">
<label for="maxExceedanceInput">允許超過次數</label>
<input type="number" id="maxExceedanceInput" value="3" min="1" max="10">
</div>
<div class="form-group">
<div class="checkbox-group">
<input type="checkbox" id="showExceedanceBox" checked>
<label for="showExceedanceBox">啟用單次分貝值超標警示</label>
</div>
</div>

<div class="calibration-section">
    <div class="calibration-title">設備校準</div>
    <div class="calibration-info" id="calibrationInfo">
        為獲得更一致的讀數，建議您在安靜環境中進行一次性校準，這將為您的設備設定基準線以補償麥克風差異。
    </div>
    <button type="button" class="calibration-btn" id="calibrateFromNoiseBtn">從環境噪音自動校準</button>
    <div class="form-group" id="offsetGroup">
        <label for="offsetInput">分貝偏移量 (dB)</label>
        <input type="number" id="offsetInput" value="0" step="0.1" min="-50" max="50">
    </div>
</div>

<button id="saveSettingsBtn">儲存</button>
</div>
</div>

<!-- 須留堂通知 -->
<div id="detentionNotice" class="detention-notice">
<div class="detention-content">
<div class="detention-icon">⚠️</div>
<div class="detention-title">須留堂</div>
<div class="detention-message" id="detentionMessage">超標次數已達限制</div>
<button class="detention-dismiss" onclick="dismissDetentionNotice()">確認</button>
</div>
</div>


<!-- Three.js 背景邏輯 -->
<script>
// 設定 Three.js 空間
const canvasContainer = document.getElementById('canvas-container');
const scene = new THREE.Scene();
// 深邃冰冷的霧氣
scene.fog = new THREE.FogExp2(0x050608, 0.003);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 10;
camera.position.y = 2;

const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio > 1 ? 1.5 : 1); // 降低像素比以製造粗糙感
canvasContainer.appendChild(renderer.domElement);

// 建立懸浮的塵埃/孢子
const particlesGeometry = new THREE.BufferGeometry();
const particlesCount = 1500;
const posArray = new Float32Array(particlesCount * 3);

for(let i = 0; i < particlesCount * 3; i++) {
    // 讓塵埃在一個大空間內散佈
    posArray[i] = (Math.random() - 0.5) * 100;
}
particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

const particlesMaterial = new THREE.PointsMaterial({
    size: 0.05,
    color: 0x5a8b96, // 冰冷藍色塵埃
    transparent: true,
    opacity: 0.6,
    blending: THREE.AdditiveBlending
});
const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
scene.add(particlesMesh);

// 加入微弱的環境光
const ambientLight = new THREE.AmbientLight(0x1a252a, 1);
scene.add(ambientLight);

// 主要的光源 (會跟著警報閃爍紅色)
const mainLight = new THREE.PointLight(0x5a8b96, 2, 50);
mainLight.position.set(0, 5, 5);
scene.add(mainLight);

// 警報狀態全域變數，供 Three.js 迴圈讀取
let isThreejsAlarmActive = false;
let clock = new THREE.Clock();

function animateThreeJS() {
    requestAnimationFrame(animateThreeJS);
    const elapsedTime = clock.getElapsedTime();

    // 塵埃緩慢移動與旋轉 (製造恐怖空間的漂浮感)
    particlesMesh.rotation.y = elapsedTime * 0.02;
    particlesMesh.rotation.x = elapsedTime * 0.01;

    // 根據警報狀態改變光線與粒子顏色
    if (isThreejsAlarmActive) {
        // 閃爍紅光
        const flicker = Math.abs(Math.sin(elapsedTime * 10)); // 快速閃爍
        mainLight.color.setHex(0xff0000);
        mainLight.intensity = 2 + flicker * 3;
        particlesMaterial.color.setHex(0xff3333);
        
        // 確保 body 的 class 被加上以觸發 CSS 全屏閃爍
        if(!document.body.classList.contains('warning-flash')) {
            document.body.classList.add('warning-flash');
        }
    } else {
        // 恢復正常冰藍光，微弱呼吸感
        mainLight.color.setHex(0x5a8b96);
        mainLight.intensity = 1.5 + Math.sin(elapsedTime * 2) * 0.5;
        particlesMaterial.color.setHex(0x5a8b96);
        
        if(document.body.classList.contains('warning-flash')) {
            document.body.classList.remove('warning-flash');
        }
    }

    renderer.render(scene, camera);
}
animateThreeJS();

// 響應視窗縮放
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>


<!-- 分貝計核心邏輯與警報音效 -->
<script>
document.addEventListener('DOMContentLoaded', () => {
const currentDbValueEl = document.getElementById('currentDbValue');
const avgDbValueEl = document.getElementById('avgDbValue');
const timerValueEl = document.getElementById('timerValue');
const exceedanceValueEl = document.getElementById('exceedanceValue');
const avgWarningValueEl = document.getElementById('avgWarningValue');
const exceedanceWarningValueEl = document.getElementById('exceedanceWarningValue');
const exceedanceIndicatorsEl = document.getElementById('exceedanceIndicators');
const infoDisplayEl = document.getElementById('infoDisplay');
const exceedanceBoxEl = document.getElementById('exceedanceBox');
const detentionNoticeEl = document.getElementById('detentionNotice');
const detentionMessageEl = document.getElementById('detentionMessage');

const decrementExceedanceBtn = document.getElementById('decrementExceedanceBtn');

const playPauseBtn = document.getElementById('playPauseBtn');
const settingsBtn = document.getElementById('settingsBtn');
const settingsModal = document.getElementById('settingsModal');
const closeModalBtn = document.querySelector('.close-btn');
const saveSettingsBtn = document.getElementById('saveSettingsBtn');

const durationInput = document.getElementById('durationInput');
const thresholdInput = document.getElementById('thresholdInput');
const maxDbInput = document.getElementById('maxDbInput');
const maxExceedanceInput = document.getElementById('maxExceedanceInput');
const showExceedanceBox = document.getElementById('showExceedanceBox');
const offsetInput = document.getElementById('offsetInput');

const calibrateFromNoiseBtn = document.getElementById('calibrateFromNoiseBtn');
const calibrationInfo = document.getElementById('calibrationInfo');

let audioContext;
let analyser;
let microphone;
let javascriptNode;
let micStream;

// 新增：獨立的音效播放 Context 與變數
let alarmCtx;
let lastAlarmTime = 0;

let isRunning = false;
let isPaused = false;
let timerInterval;
let secondsRemaining = 15 * 60; 
let decibelThreshold = 40;
let maxDecibelLimit = 47;
let maxExceedanceCount = 3;
let currentExceedanceCount = 0;
let showExceedanceContainer = true;
let detentionNoticeShown = false;

let dbHistory = [];
let sumOfDb = 0;

let measurementStartTime = 0;
let lastExceedanceTime = 0;

// 控制次數增加時警報聲持續時間的結束時間戳記
let temporaryAlarmEndTime = 0;

let decibelOffset = 0;

const SMOOTHING_FACTOR = 0.2;
const NOISE_GATE_THRESHOLD = 0.0001;
const MIN_DB = 25;
const MAX_DB = 120;

let currentDb = MIN_DB;

window.dismissDetentionNotice = function() {
detentionNoticeEl.style.display = 'none';
};

// 實時合成的科幻金屬警報音效
function playAlarmSound(force = false) {
    if (!alarmCtx) return;
    
    const now = Date.now();
    // 預設每隔 1000 毫秒 (1秒) 播放一次，避免連續觸發太過吵雜。若傳入 force=true 則強制播放
    if (!force && now - lastAlarmTime < 1000) return; 
    lastAlarmTime = now;

    if (alarmCtx.state === 'suspended') alarmCtx.resume();

    const osc1 = alarmCtx.createOscillator();
    const osc2 = alarmCtx.createOscillator();
    const gainNode = alarmCtx.createGain();

    // 兩種不同波型創造不和諧與刺耳的工業警報感
    osc1.type = 'sawtooth';
    osc2.type = 'square';
    
    // 高音起點
    osc1.frequency.setValueAtTime(800, alarmCtx.currentTime);
    osc2.frequency.setValueAtTime(815, alarmCtx.currentTime);
    
    // 快速下沉到低音 (模擬潛艇或設施警報)
    osc1.frequency.exponentialRampToValueAtTime(300, alarmCtx.currentTime + 0.6);
    osc2.frequency.exponentialRampToValueAtTime(300, alarmCtx.currentTime + 0.6);

    // 音量控制：開頭漸入避免爆音，然後快速衰減
    gainNode.gain.setValueAtTime(0, alarmCtx.currentTime);
    gainNode.gain.linearRampToValueAtTime(0.15, alarmCtx.currentTime + 0.05); // 最大音量控制在 0.15 避免太大聲
    gainNode.gain.exponentialRampToValueAtTime(0.01, alarmCtx.currentTime + 0.6);

    osc1.connect(gainNode);
    osc2.connect(gainNode);
    gainNode.connect(alarmCtx.destination);

    osc1.start();
    osc2.start();
    osc1.stop(alarmCtx.currentTime + 0.6);
    osc2.stop(alarmCtx.currentTime + 0.6);
}

// 扣減次數按鈕邏輯
decrementExceedanceBtn.addEventListener('click', (e) => {
    e.stopPropagation(); 
    if (currentExceedanceCount > 0) {
        currentExceedanceCount--;
        exceedanceValueEl.textContent = currentExceedanceCount;
        updateExceedanceIndicators();
        
        if (currentExceedanceCount < maxExceedanceCount && detentionNoticeShown) {
            detentionNoticeShown = false;
            detentionNoticeEl.style.display = 'none';
        }
    }
});

playPauseBtn.addEventListener('click', toggleMeasurement);
settingsBtn.addEventListener('click', () => settingsModal.style.display = 'flex');
closeModalBtn.addEventListener('click', () => settingsModal.style.display = 'none');
window.addEventListener('click', (event) => {
if (event.target == settingsModal) { settingsModal.style.display = 'none'; }
});

calibrateFromNoiseBtn.addEventListener('click', calibrateFromNoise);

showExceedanceBox.addEventListener('change', (e) => {
showExceedanceContainer = e.target.checked;
updateLayoutDisplay();
});

maxExceedanceInput.addEventListener('input', () => {
maxExceedanceCount = parseInt(maxExceedanceInput.value, 10) || 3;
updateExceedanceIndicators();
updateWarningValues();
});

thresholdInput.addEventListener('input', () => {
    decibelThreshold = parseInt(thresholdInput.value, 10) || 40;
    updateWarningValues();
});
maxDbInput.addEventListener('input', () => {
    maxDecibelLimit = parseInt(maxDbInput.value, 10) || 47;
    updateWarningValues();
});

saveSettingsBtn.addEventListener('click', () => {
const durationInMinutes = parseInt(durationInput.value, 10) || 15;
secondsRemaining = durationInMinutes * 60;
decibelThreshold = parseInt(thresholdInput.value, 10) || 40;
maxDecibelLimit = parseInt(maxDbInput.value, 10) || 47;
maxExceedanceCount = parseInt(maxExceedanceInput.value, 10) || 3;
showExceedanceContainer = showExceedanceBox.checked;
decibelOffset = parseFloat(offsetInput.value) || 0;

saveSettings();

updateTimerDisplay();
updateWarningValues();
updateExceedanceIndicators();
updateLayoutDisplay();
settingsModal.style.display = 'none';

if (!isRunning) { resetValues(); }
});

function saveSettings() {
const settings = {
decibelOffset,
decibelThreshold,
maxDecibelLimit,
maxExceedanceCount,
showExceedanceContainer,
duration: parseInt(durationInput.value, 10) || 15
};
localStorage.setItem('decibelMeterSettings', JSON.stringify(settings));
}

function loadSettings() {
const saved = localStorage.getItem('decibelMeterSettings');
if (saved) {
try {
const settings = JSON.parse(saved);
decibelOffset = settings.decibelOffset || 0;
decibelThreshold = settings.decibelThreshold || 40;
maxDecibelLimit = settings.maxDecibelLimit || 47;
maxExceedanceCount = settings.maxExceedanceCount || 3;
showExceedanceContainer = settings.showExceedanceContainer !== false;

const savedDuration = settings.duration || 15;
secondsRemaining = savedDuration * 60;
durationInput.value = savedDuration;

offsetInput.value = decibelOffset;
thresholdInput.value = decibelThreshold;
maxDbInput.value = maxDecibelLimit;
maxExceedanceInput.value = maxExceedanceCount;
showExceedanceBox.checked = showExceedanceContainer;

updateWarningValues();
updateExceedanceIndicators();
updateLayoutDisplay();
} catch (e) {}
}
}

function updateWarningValues() {
avgWarningValueEl.textContent = `${decibelThreshold}dB`;
exceedanceWarningValueEl.textContent = `${maxDecibelLimit}dB × ${maxExceedanceCount}次`;
}

function updateExceedanceIndicators() {
exceedanceIndicatorsEl.innerHTML = '';
for (let i = 0; i < maxExceedanceCount; i++) {
const dot = document.createElement('div');
dot.className = 'exceedance-dot';
if (i < currentExceedanceCount) {
dot.classList.add('exceeded');
}
exceedanceIndicatorsEl.appendChild(dot);
}
}

function updateLayoutDisplay() {
if (showExceedanceContainer) {
infoDisplayEl.className = 'info-display with-exceedance';
exceedanceBoxEl.style.display = 'flex';
} else {
infoDisplayEl.className = 'info-display without-exceedance';
exceedanceBoxEl.style.display = 'none';
}
}

function toggleMeasurement() {
if (!isRunning) { startMeasurement(); } 
else { pauseMeasurement(); }
}

async function startMeasurement() {
if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
alert('您的瀏覽器不支援麥克風存取！'); return;
}
try {
micStream = await navigator.mediaDevices.getUserMedia({ 
audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } 
});

// 初始化警報用 AudioContext
if (!alarmCtx) {
    alarmCtx = new (window.AudioContext || window.webkitAudioContext)();
}
if (alarmCtx.state === 'suspended') {
    await alarmCtx.resume();
}

await setupAudioNodes(micStream);
isRunning = true; isPaused = false;
playPauseBtn.classList.add('playing');
playPauseBtn.title = '暫停';
settingsBtn.disabled = true;

resetValues();
measurementStartTime = Date.now();
startTimer();
} catch (err) {
alert('無法存取您的麥克風。請檢查權限設定。');
}
}

function pauseMeasurement() {
isPaused = !isPaused;
if (isPaused) {
playPauseBtn.classList.remove('playing');
playPauseBtn.title = '繼續';
clearInterval(timerInterval);
if (javascriptNode) javascriptNode.disconnect();
} else {
playPauseBtn.classList.add('playing');
playPauseBtn.title = '暫停';
startTimer();
if (javascriptNode && audioContext) javascriptNode.connect(audioContext.destination);
}
}

function stopMeasurement() {
isRunning = false; isPaused = false;
playPauseBtn.classList.remove('playing');
playPauseBtn.title = '開始';
settingsBtn.disabled = false;

clearInterval(timerInterval);
isThreejsAlarmActive = false; // 解除 Three.js 警報

if (micStream) micStream.getTracks().forEach(track => track.stop());
if (microphone) microphone.disconnect();
if (analyser) analyser.disconnect();
if (javascriptNode) javascriptNode.disconnect();
if(audioContext && audioContext.state !== 'closed') audioContext.close();

let shouldShowDetention = false;
let detentionReason = '';

if (currentExceedanceCount >= maxExceedanceCount) {
shouldShowDetention = true;
detentionReason = `超標次數已達限制（${currentExceedanceCount}次）`;
}

if (dbHistory.length > 0) {
const avgDb = sumOfDb / dbHistory.length;
if (avgDb > decibelThreshold) {
shouldShowDetention = true;
if (detentionReason) {
detentionReason += `\n平均分貝超標（${Math.round(avgDb)}dB）`;
} else {
detentionReason = `平均分貝超標（${Math.round(avgDb)}dB）`;
}
}
}

if (shouldShowDetention && !detentionNoticeShown) {
detentionMessageEl.innerText = detentionReason;
detentionNoticeEl.style.display = 'flex';
detentionNoticeShown = true;
}
}

async function setupAudioNodes(stream) {
audioContext = new (window.AudioContext || window.webkitAudioContext)();
analyser = audioContext.createAnalyser();
microphone = audioContext.createMediaStreamSource(stream);
javascriptNode = audioContext.createScriptProcessor(2048, 1, 1);

analyser.smoothingTimeConstant = 0.8;
analyser.fftSize = 2048;

microphone.connect(analyser);
analyser.connect(javascriptNode);
javascriptNode.connect(audioContext.destination);

javascriptNode.onaudioprocess = () => {
if(isPaused) return;
processAudioData();
};

if (audioContext.state === 'suspended') await audioContext.resume();
}

function processAudioData() {
    const bufferLength = analyser.fftSize;
    const dataArray = new Float32Array(bufferLength);
    analyser.getFloatTimeDomainData(dataArray);

    let sumOfSquares = 0.0;
    for (let i = 0; i < bufferLength; i++) { sumOfSquares += dataArray[i] * dataArray[i]; }
    const rms = Math.sqrt(sumOfSquares / bufferLength);

    if (rms < NOISE_GATE_THRESHOLD) {
        currentDb = Math.max(MIN_DB, currentDb * 0.98);
    } else {
        let rawDb = 20 * Math.log10(rms) + 94;
        rawDb += decibelOffset;
        rawDb = Math.max(MIN_DB, Math.min(MAX_DB, rawDb));
        currentDb = SMOOTHING_FACTOR * rawDb + (1 - SMOOTHING_FACTOR) * currentDb;
    }

    updateDbDisplay(currentDb);

    if (currentDb > maxDecibelLimit && showExceedanceContainer) {
        const currentTime = Date.now();
        const elapsedTime = currentTime - measurementStartTime;

        if (elapsedTime > 5000) {
            if (currentTime - lastExceedanceTime > 5000) {
                currentExceedanceCount++;
                lastExceedanceTime = currentTime;
                exceedanceValueEl.textContent = currentExceedanceCount;
                updateExceedanceIndicators();
                
                // 設定臨時警報持續時間 (3秒 = 3000 毫秒)
                temporaryAlarmEndTime = Date.now() + 3000;

                // 次數 +1 時，立即強制發出第一次警報聲
                playAlarmSound(true);

                if (currentExceedanceCount >= maxExceedanceCount && !detentionNoticeShown) {
                    detentionNoticeShown = true;
                    detentionMessageEl.textContent = '超標次數已達限制';
                    detentionNoticeEl.style.display = 'flex';
                }
            }
        }
    }

    dbHistory.push(currentDb);
    sumOfDb += currentDb;

    const avgDb = sumOfDb / dbHistory.length;
    updateAvgDbDisplay(avgDb);
    checkThreshold(avgDb);
}

async function calibrateFromNoise() {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        alert('您的瀏覽器不支援麥克風存取！'); return;
    }

    const originalBtnText = calibrateFromNoiseBtn.textContent;
    const originalInfoText = calibrationInfo.textContent;

    calibrateFromNoiseBtn.disabled = true;
    calibrateFromNoiseBtn.textContent = '校準中...';
    calibrationInfo.textContent = '正在測量環境噪音，請保持絕對安靜 5 秒鐘...';

    let tempStream; let tempAudioContext; let readings = [];
    const CALIBRATION_DURATION = 5000;
    const TARGET_QUIET_DB = 35.0;

    try {
        tempStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } });
        tempAudioContext = new (window.AudioContext || window.webkitAudioContext)();
        const tempAnalyser = tempAudioContext.createAnalyser();
        const tempMicrophone = tempAudioContext.createMediaStreamSource(tempStream);
        
        tempAnalyser.fftSize = 2048;
        tempMicrophone.connect(tempAnalyser);

        const bufferLength = tempAnalyser.fftSize;
        const dataArray = new Float32Array(bufferLength);
        
        const collectData = () => {
            tempAnalyser.getFloatTimeDomainData(dataArray);
            let sumOfSquares = 0.0;
            for (let i = 0; i < bufferLength; i++) { sumOfSquares += dataArray[i] * dataArray[i]; }
            const rms = Math.sqrt(sumOfSquares / bufferLength);

            if (rms > NOISE_GATE_THRESHOLD) { 
                const rawDb = 20 * Math.log10(rms) + 94; 
                readings.push(rawDb);
            }
        };
        
        const collectionInterval = setInterval(collectData, 100);

        setTimeout(() => {
            clearInterval(collectionInterval);
            tempStream.getTracks().forEach(track => track.stop());
            if (tempAudioContext.state !== 'closed') tempAudioContext.close();
            
            if (readings.length < 10) { 
                calibrationInfo.textContent = '校準失敗：無法測得足夠數據。請確保麥克風權限已開啟，並再試一次。';
                calibrateFromNoiseBtn.disabled = false;
                calibrateFromNoiseBtn.textContent = originalBtnText;
                return;
            }

            readings.sort((a, b) => a - b);
            const trimCount = Math.floor(readings.length * 0.2);
            const trimmedReadings = readings.slice(trimCount, -trimCount);
            const sum = trimmedReadings.reduce((acc, val) => acc + val, 0);
            const averageRawDb = sum / trimmedReadings.length;

            const newOffset = TARGET_QUIET_DB - averageRawDb;
            offsetInput.value = newOffset.toFixed(1);

            calibrationInfo.textContent = `校準完成！建議的偏移量為 ${newOffset.toFixed(1)} dB。請點擊「儲存」以套用。`;
            calibrateFromNoiseBtn.disabled = false;
            calibrateFromNoiseBtn.textContent = originalBtnText;

            setTimeout(() => { calibrationInfo.textContent = originalInfoText; }, 8000); 

        }, CALIBRATION_DURATION);

    } catch (err) {
        calibrationInfo.textContent = '校準失敗：無法存取麥克風。請檢查您的權限設定。';
        calibrateFromNoiseBtn.disabled = false;
        calibrateFromNoiseBtn.textContent = originalBtnText;
        if (tempStream) tempStream.getTracks().forEach(track => track.stop());
        if (tempAudioContext && tempAudioContext.state !== 'closed') tempAudioContext.close();
    }
}

function startTimer() {
timerInterval = setInterval(() => {
if (secondsRemaining > 0) {
secondsRemaining--;
updateTimerDisplay();
} else {
stopMeasurement();
alert('時間到！');
}
}, 1000);
}

function resetValues() {
dbHistory = []; sumOfDb = 0; currentDb = MIN_DB;
currentExceedanceCount = 0; measurementStartTime = 0; lastExceedanceTime = 0;
detentionNoticeShown = false; isThreejsAlarmActive = false;
temporaryAlarmEndTime = 0;

const durationInMinutes = parseInt(durationInput.value, 10) || 15;
secondsRemaining = durationInMinutes * 60;

updateTimerDisplay();
currentDbValueEl.textContent = '--';
avgDbValueEl.textContent = '--';
exceedanceValueEl.textContent = '0';
updateExceedanceIndicators();
detentionNoticeEl.style.display = 'none';
}

function updateTimerDisplay() {
const minutes = Math.floor(secondsRemaining / 60).toString().padStart(2, '0');
const seconds = (secondsRemaining % 60).toString().padStart(2, '0');
timerValueEl.textContent = `${minutes}:${seconds}`;
}

function updateDbDisplay(db) { currentDbValueEl.textContent = Math.round(db); }

function updateAvgDbDisplay(avg) {
if (dbHistory.length > 0) avgDbValueEl.textContent = Math.round(avg);
}

function checkThreshold(value) {
    const now = Date.now();
    // 檢查目前是否處於平均分貝超標狀態，或仍處於次數增加的 3 秒臨時警報時間內
    const isTemporaryAlarmActive = now < temporaryAlarmEndTime;

    if (value > decibelThreshold || isTemporaryAlarmActive) {
        isThreejsAlarmActive = true;
        playAlarmSound(); // 依預設間隔規律發出聲音
    } else {
        isThreejsAlarmActive = false;
    }
}

// 初始化
loadSettings();
updateTimerDisplay();
updateWarningValues();
updateExceedanceIndicators();
updateLayoutDisplay();
});
</script>
